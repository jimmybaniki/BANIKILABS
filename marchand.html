<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Application Mobile - Terminal Marchand</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome pour les icônes -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Supabase Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- jsPDF pour l'exportation des reçus/historique -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    /* Custom Scrollbar pour un look premium */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #0f172a; /* slate-900 */
    }
    ::-webkit-scrollbar-thumb {
      background: #334155; /* slate-700 */
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #475569; /* slate-600 */
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

  <!-- Zone de Notifications (Toast) -->
  <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-2"></div>

  <!-- Application Marchand -->
  <div class="min-h-screen flex flex-col bg-slate-900 text-slate-200 relative max-w-2xl mx-auto border-x border-slate-800 shadow-2xl" id="phone-1">
    <!-- Chargé dynamiquement par JS -->
  </div>

  <script>
    // --- VARIABLES RÉELLES ---
    let currentUserData = null;
    let usersData = [];
    let transactions = [];
    
    // Supabase Client Initialization
    const SUPABASE_URL = 'https://fcbsmfcbzyyeksqfajdu.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjYnNtZmNienl5ZWtzcWZhamR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MjQyNDQsImV4cCI6MjA5NjUwMDI0NH0.NoPwKmQ8sbH1o-mt-O2yQgm7P1Bv0BRoeiCa8kJ1C0E';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let facturesEnAttente = [];

    // État de navigation
    let currentUserId = null;
    let currentTab = "home";
    let isLoggedIn = false;

    // --- INITIALISATION AU CHARGEMENT ---
    window.onload = async function() {
      const storedUserId = sessionStorage.getItem('currentUserId');
      if (storedUserId) {
        currentUserId = storedUserId;
        isLoggedIn = true;
        await fetchAllUsers();
        await fetchMerchantData();
        renderPhone();
        showToast("Terminal Point de Vente (POS) prêt.", "success");
      } else {
        window.location.href = 'login.html';
      }
    };

    async function fetchAllUsers() {
      const { data } = await supabaseClient.from('users').select('*');
      usersData = (data || []).map(u => ({
        ...u,
        balance: u.balance_usd || 0,
        limit: u.limit || 0,
        balanceCDF: u.balance_cdf || 0,
        code: u.pin_code
      }));
    }

    async function fetchMerchantData() {
      const { data } = await supabaseClient.from('users').select('*').eq('id', currentUserId).single();
      if (data) {
        currentUserData = {
          ...data,
          balance: data.balance_usd || 0,
          balanceCDF: data.balance_cdf || 0,
          merchantCode: data.merchant_code,
          code: data.pin_code
        };
      }
    }

    // --- GESTION DES NOTIFICATIONS (TOAST) ---
    function showToast(message, type = "info") {
      const container = document.getElementById("toast-container");
      const toast = document.createElement("div");
      toast.className = `flex items-center gap-2 px-4 py-3 rounded-xl shadow-lg border text-sm font-semibold transition-all duration-300 transform -translate-y-2 opacity-0 z-50`;
      
      if (type === "success") {
        toast.className += " bg-emerald-950 border-emerald-800 text-emerald-300";
        toast.innerHTML = `<i class="fa-solid fa-circle-check"></i> <span>${message}</span>`;
      } else if (type === "error") {
        toast.className += " bg-rose-950 border-rose-800 text-rose-300";
        toast.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> <span>${message}</span>`;
      } else if (type === "warning") {
        toast.className += " bg-amber-950 border-amber-800 text-amber-300";
        toast.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> <span>${message}</span>`;
      } else {
        toast.className += " bg-indigo-950 border-indigo-800 text-indigo-300";
        toast.innerHTML = `<i class="fa-solid fa-circle-info"></i> <span>${message}</span>`;
      }

      container.appendChild(toast);
      
      setTimeout(() => toast.classList.remove("-translate-y-2", "opacity-0"), 50);
      setTimeout(() => {
        toast.classList.add("-translate-y-2", "opacity-0");
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    // --- RENDU DU TÉLÉPHONE MARCHAND ---
    function renderPhone() {
      const container = document.getElementById("phone-1");

      if (!isLoggedIn) {
        container.innerHTML = renderLoginScreen();
        return;
      }

      const user = currentUserData;

      // Header de l'app POS
      let headerHTML = `
        <div class="px-4 py-3 bg-slate-950/80 border-b border-slate-800 flex justify-between items-center text-xs">
          <div class="flex items-center gap-2">
            <div class="w-6 h-6 bg-[#FFD700] flex items-center justify-center rounded-full shadow-[0_0_10px_rgba(255,215,0,0.3)]">
              <span class="text-black font-black text-[9px] tracking-tighter">BL</span>
            </div>
            <span class="font-extrabold text-[10px] tracking-tight uppercase text-white">Baniki <span class="text-[#FFD700]">Labs</span></span>
          </div>
        </div>
        <div class="p-4 bg-slate-950/40 flex items-center justify-between border-b border-slate-800">
          <div class="flex items-center gap-3 cursor-pointer hover:bg-white/5 p-1 rounded-lg transition" onclick="changeTab('profile')">
            <div class="w-10 h-10 rounded-xl bg-amber-500/20 text-amber-400 border border-amber-500/30 flex items-center justify-center text-sm font-bold shadow-inner">
              <i class="fa-solid fa-store"></i>
            </div>
            <div>
              <h4 class="text-sm font-bold text-white">${user.name}</h4>
              <p class="text-[10px] text-slate-400 font-semibold uppercase tracking-wider">Compte Pro</p>
            </div>
          </div>
          <span class="text-[10px] px-2 py-1 rounded-full font-bold bg-amber-500/10 text-amber-400 border border-amber-500/20">
            ${user.status}
          </span>
        </div>
      `;

      let contentHTML = "";
      if (currentTab === "profile") {
        contentHTML = renderProfileScreen(user);
      } else {
        contentHTML = renderMerchantScreen(user, currentTab);
      }

      container.innerHTML = `
        ${headerHTML}
        <div class="flex-1 overflow-y-auto p-4 space-y-4 pb-20 relative">
          ${contentHTML}
        </div>
        ${renderMerchantFooter(currentTab)}
      `;
    }

    // --- ÉCRAN DE CONNEXION ---
    function renderLoginScreen() {
      return `
        <div class="flex flex-col items-center justify-center min-h-screen p-6 text-center">
          <div class="w-20 h-20 bg-amber-500/10 text-amber-500 rounded-3xl flex items-center justify-center text-3xl mb-6 border border-amber-500/20 shadow-xl shadow-amber-500/5">
            <i class="fa-solid fa-store"></i>
          </div>
          <h2 class="text-2xl font-black text-white mb-2">Terminal Marchand</h2>
          <p class="text-slate-400 text-sm mb-8">Veuillez vous connecter pour accéder à votre point de vente.</p>
          
          <div class="w-full space-y-4">
            <div class="text-left">
              <label class="text-[10px] text-slate-500 uppercase font-bold ml-1">Numéro de téléphone</label>
              <input type="text" id="login-phone" placeholder="243..." class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 text-white focus:border-amber-500 outline-none transition">
            </div>
            <div class="text-left">
              <label class="text-[10px] text-slate-500 uppercase font-bold ml-1">Code PIN / Accès</label>
              <input type="password" id="login-pin" placeholder="••••" class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 text-white focus:border-amber-500 outline-none transition">
            </div>
            <button onclick="handleLogin()" class="w-full py-4 bg-amber-600 hover:bg-amber-500 text-white font-bold rounded-2xl transition shadow-lg shadow-amber-900/20 mt-4">
              Ouvrir la session
            </button>
          </div>
          <p class="mt-8 text-xs text-slate-500">Besoin d'aide ? Contactez votre Super Agent.</p>
        </div>
      `;
    }

    function handleLogin() {
      const phone = document.getElementById('login-phone').value;
      const pin = document.getElementById('login-pin').value;

      // This login screen is now handled by login.html
      // If we reach here, it means the user is not logged in via sessionStorage.
      showToast("Veuillez vous connecter via la page principale.", "warning");
      window.location.href = 'login.html';
    }

    // --- NAVIGATION ---
    function changeTab(newTab) {
      currentTab = newTab;
      renderPhone();
    }

    // --- ÉCRANS DU MARCHAND ---
    function renderMerchantScreen(user, tab) {
      if (tab === "home") {
        const items = user.items || [];
        let itemsListHTML = items.length === 0 ? 
          `<p class="text-xs text-slate-500 text-center py-4">Aucun article dans le catalogue.</p>` : 
          items.map(p => `
          <div class="flex items-center justify-between p-3 mb-2 rounded-xl bg-slate-950 border border-slate-800 text-sm">
            <div class="flex items-center gap-3">
               <div class="w-8 h-8 rounded-lg bg-slate-900 flex items-center justify-center text-amber-500/50">
                 <i class="fa-solid fa-box"></i>
               </div>
               <span class="font-semibold text-white truncate max-w-[120px]">${p.name}</span>
            </div>
            <div class="flex items-center gap-3">
              <span class="font-bold text-amber-400">${p.price.toFixed(2)} $</span>
              <button onclick="genererVenteDirecte(${p.price}, '${p.name}')" class="px-3 py-1.5 bg-amber-600 hover:bg-amber-500 rounded-lg text-xs font-bold text-white transition shadow-lg shadow-amber-600/20">
                Encaisser
              </button>
            </div>
          </div>
        `).join("");

        return `
          <!-- Dashboard CA -->
          <div class="bg-gradient-to-br from-amber-600 to-orange-700 rounded-3xl p-5 shadow-xl relative overflow-hidden">
            <div class="absolute -right-6 -bottom-6 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
            
            <p class="text-xs text-amber-100 uppercase tracking-wider font-semibold">Chiffre d'Affaires</p>
            <div class="flex items-end gap-2 mt-1">
              <h2 class="text-3xl font-black text-white">${user.balance.toFixed(2)} $</h2>
            </div>
            <div class="flex items-end gap-2 border-t border-white/20 pt-2 mt-2">
              <h3 class="text-xl font-bold text-white">${(user.balanceCDF || 0).toLocaleString()} FC</h3>
            </div>
            <div class="flex justify-between items-center mt-3 text-[10px] text-amber-100/90 bg-white/10 p-2 rounded-xl">
              <span>Code Marchand : <span class="font-bold text-white text-xs ml-1">${user.merchantCode}</span></span>
              <i class="fa-solid fa-qrcode text-lg text-white"></i>
            </div>
          </div>

          <!-- Section Vente Rapide -->
          <div class="mt-6">
            <div class="flex justify-between items-center mb-3">
              <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Catalogue & Encaissement</h4>
              <button onclick="changeTab('products')" class="text-[10px] text-amber-500 hover:text-amber-400 transition bg-amber-500/10 px-2 py-1 rounded">
                <i class="fa-solid fa-plus mr-1"></i> Ajouter
              </button>
            </div>
            <div>
              ${itemsListHTML}
            </div>
          </div>
        `;
      } 
      
      else if (tab === "products") {
        return `
          <h3 class="text-base font-bold text-white flex items-center gap-2 mb-4">
            <i class="fa-solid fa-box-open text-amber-500"></i> Ajouter un Article
          </h3>
          <div class="bg-slate-950 p-5 rounded-3xl border border-slate-800 space-y-4">
            <div>
              <label class="text-xs text-slate-400 uppercase font-bold">Nom du produit / service</label>
              <input type="text" id="item-name" placeholder="Ex: Café Americano" class="w-full mt-2 bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-amber-500 transition">
            </div>
            <div>
              <label class="text-xs text-slate-400 uppercase font-bold">Prix de vente ($)</label>
              <input type="number" id="item-price" placeholder="0.00" class="w-full mt-2 bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-amber-500 transition">
            </div>
            <button onclick="ajouterProduitCommercant()" class="w-full py-3 bg-amber-600 hover:bg-amber-500 text-sm font-bold text-white rounded-xl transition shadow-lg shadow-amber-600/20 mt-2">
              Enregistrer l'article
            </button>
            <button onclick="changeTab('home')" class="w-full py-2 text-sm text-slate-400 hover:text-white transition">
              Annuler
            </button>
          </div>
        `;
      }
      
      else if (tab === "billing") {
        return `
          <h3 class="text-base font-bold text-white flex items-center gap-2 mb-4">
            <i class="fa-solid fa-file-invoice-dollar text-amber-500"></i> Générateur de Facture
          </h3>
          <div class="bg-slate-950 p-5 rounded-3xl border border-slate-800 space-y-4 text-center">
             <p class="text-xs text-slate-400 leading-relaxed text-left">
               Saisissez un montant pour générer un code de paiement unique. Votre client pourra saisir ce code ou le scanner depuis son application.
             </p>
             
             <div class="text-left mt-4">
                <label class="text-xs text-slate-400 uppercase font-bold">Montant à facturer ($)</label>
                <input type="number" id="bill-amount" placeholder="0.00" class="w-full mt-2 bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-amber-500 transition text-center text-lg font-bold">
             </div>
             
             <button onclick="genererFactureBoutique()" class="w-full py-3 bg-amber-600 hover:bg-amber-500 text-sm font-bold text-white rounded-xl transition shadow-lg shadow-amber-600/20">
               Créer la facture
             </button>

             <!-- Zone de résultat QR / Code -->
             <div id="qr-area" class="hidden pt-6 mt-4 border-t border-slate-800/80 space-y-3">
                <p class="text-[10px] text-amber-500 uppercase font-bold tracking-widest">Code Client à saisir / scanner</p>
                <div class="bg-white p-3 rounded-2xl inline-block shadow-[0_0_15px_rgba(245,158,11,0.2)]">
                   <i class="fa-solid fa-qrcode text-6xl text-slate-900"></i>
                </div>
                <p id="bill-code-display" class="text-3xl font-black text-white tracking-[0.3em] mt-2"></p>
                <p class="text-[10px] text-slate-500 italic mt-2">Ce code de paiement expire dans 15 minutes.</p>
             </div>
          </div>
        `;
      }

      else if (tab === "history") {
        const userTx = transactions.filter(t => t.from === user.id || t.to === user.id);
        let txListHTML = "";
        
        userTx.slice().reverse().forEach(tx => {
          const isIncoming = tx.to === user.id;
          const otherUser = isIncoming ? tx.from : tx.to;
          const userObj = usersData.find(u => u.id === otherUser);
          const displayName = userObj ? userObj.name : "Client Inconnu";
          
          txListHTML += `
            <div class="p-3 rounded-xl bg-slate-950 border border-slate-800 text-xs flex justify-between items-center mb-2">
              <div>
                <p class="text-white font-bold">${tx.type}</p>
                <p class="text-slate-500 mt-1">${displayName} • ${tx.date}</p>
              </div>
              <span class="font-bold ${isIncoming ? 'text-emerald-400' : 'text-rose-400'} text-sm">
                ${isIncoming ? '+' : '-'}${tx.amount.toFixed(2)}$
              </span>
            </div>
          `;
        });

        return `
          <h3 class="text-base font-bold text-white flex items-center gap-2 mb-4">
            <i class="fa-solid fa-clock-rotate-left text-amber-500"></i> Historique des Ventes
          </h3>
          <button onclick="exportHistoryPDF()" class="w-full mb-4 py-3 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white rounded-xl text-xs font-bold flex items-center justify-center gap-2 transition">
            <i class="fa-solid fa-file-pdf text-amber-500"></i> Exporter le Registre (PDF)
          </button>
          <div class="space-y-1">
            ${txListHTML || '<p class="text-center py-6 text-slate-500 text-xs">Aucune vente enregistrée.</p>'}
          </div>
        `;
      }
    }

    // --- SECONDARY SCREENS ---
    function renderProfileScreen(user) {
      return `
        <h3 class="text-base font-bold text-white mb-4 flex items-center gap-2">
          <i class="fa-solid fa-store text-amber-500"></i> Profil Boutique
        </h3>
        <div class="bg-slate-950 p-5 rounded-3xl border border-slate-800 space-y-4">
          <div class="space-y-2">
            <p class="text-xs text-slate-500 uppercase font-bold tracking-widest">Informations Commerciales</p>
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
                <p class="text-sm text-white font-semibold">${user.name}</p>
                <p class="text-xs text-slate-400 mt-2">Code POS : <span class="text-amber-400 font-bold">${user.merchantCode}</span></p>
                <p class="text-xs text-slate-400 mt-1">Tél. Pro : ${user.phone}</p>
            </div>            
            <div class="flex items-center justify-between mt-4 pt-4 border-t border-slate-800/80">
              <div>
                <p class="text-xs text-slate-500 uppercase font-bold">Code PIN Actuel</p>
                <p id="display-pin" class="text-lg text-amber-400 font-mono font-bold mt-1">••••</p>
              </div>
              <button onclick="togglePinVisibility('${user.code}')" class="w-10 h-10 rounded-full bg-slate-900 border border-slate-700 text-slate-400 hover:text-white transition flex items-center justify-center">
                <i class="fa-solid fa-eye" id="pin-icon"></i>
              </button>
            </div>
          </div>
          
          <div class="pt-4 border-t border-slate-800/80">
            <label class="text-xs text-slate-400 uppercase font-bold">Nouveau Code PIN</label>
            <input type="password" id="new-pin" placeholder="Ex: 5678" class="w-full mt-2 bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-amber-500">
            <button onclick="updateUserPin()" class="w-full mt-3 py-3 bg-amber-600 hover:bg-amber-500 text-sm font-bold text-white rounded-xl transition shadow-lg">Mettre à jour le PIN</button>
          </div>
          <button onclick="logout()" class="w-full py-3 mt-4 bg-slate-800 hover:bg-slate-700 text-sm font-bold text-white rounded-xl transition">
            <i class="fa-solid fa-right-from-bracket mr-2"></i> Déconnexion
          </button>
        </div>
        <button onclick="changeTab('home')" class="w-full py-3 mt-2 text-sm font-bold text-slate-300 hover:text-white bg-slate-800 hover:bg-slate-700 rounded-xl transition">Retour au tableau de bord</button>
      `;
    }

    // --- UTILITAIRES PROFILE ---
    function togglePinVisibility(pin) {
      const el = document.getElementById(`display-pin`);
      const icon = document.getElementById(`pin-icon`);
      if (el.innerText === "••••") {
        el.innerText = pin;
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
      } else {
        el.innerText = "••••";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
      }
    }

    function updateUserPin() {
      // Correction: Ajouter la persistance Supabase
      const newPin = document.getElementById(`new-pin`).value;
      if (newPin.length < 4) { showToast("Le code PIN doit comporter au moins 4 caractères.", "error"); return; }
      supabaseClient.from('users').update({ pin_code: newPin }).eq('id', currentUserId).then(() => {
        currentUserData.code = newPin; // Mettre à jour les données locales après succès
      showToast("Votre code PIN a été modifié avec succès.", "success");
      changeTab("profile");
      });
    }

    function logout() {
      sessionStorage.removeItem('currentUserId');
      sessionStorage.removeItem('currentUserRole');
      window.location.href = 'login.html';
    }

    // --- BARRE DE NAVIGATION INFÉRIEURE ---
    function renderMerchantFooter(activeTab) {
      return `
        <div class="absolute bottom-0 left-0 w-full bg-slate-950/90 backdrop-blur-md border-t border-slate-800 pb-safe pt-2">
            <div class="flex justify-around items-center px-2 pb-2">
                <button onclick="changeTab('home')" class="flex flex-col items-center gap-1 w-16 ${activeTab === 'home' || activeTab === 'products' ? 'text-amber-400' : 'text-slate-500 hover:text-slate-300'} transition">
                    <i class="fa-solid fa-store text-xl mb-1"></i>
                    <span class="text-[10px] font-semibold">Caisse</span>
                </button>
                <button onclick="changeTab('billing')" class="flex flex-col items-center gap-1 w-16 ${activeTab === 'billing' ? 'text-amber-400' : 'text-slate-500 hover:text-slate-300'} transition">
                    <div class="bg-slate-900 p-2.5 rounded-2xl border border-slate-800 -mt-5 mb-0.5 shadow-lg ${activeTab === 'billing' ? 'bg-amber-900/40 border-amber-500/50' : ''}">
                        <i class="fa-solid fa-qrcode text-2xl"></i>
                    </div>
                    <span class="text-[10px] font-semibold">Facture</span>
                </button>
                <button onclick="changeTab('history')" class="flex flex-col items-center gap-1 w-16 ${activeTab === 'history' ? 'text-amber-400' : 'text-slate-500 hover:text-slate-300'} transition">
                    <i class="fa-solid fa-receipt text-xl mb-1"></i>
                    <span class="text-[10px] font-semibold">Historique</span>
                </button>
            </div>
        </div>
      `;
    }

    // --- ACTIONS ET LOGIQUE DU MARCHAND ---

    function ajouterProduitCommercant() {
      const name = document.getElementById("item-name").value.trim();
      const price = parseFloat(document.getElementById("item-price").value);
      const merchant = usersData.find(u => u.id === currentUserId);

      if (!name || isNaN(price) || price <= 0) {
        showToast("Veuillez saisir un nom et un prix valide.", "error");
        return;
      }

      merchant.items.push({
        id: Date.now(),
        name: name,
        price: price
      });

      showToast(`L'article "${name}" a été ajouté au catalogue.`, "success");
      changeTab("home");
    }
    
    function genererFactureBoutique() {
      const amount = parseFloat(document.getElementById("bill-amount").value);
      if(isNaN(amount) || amount <= 0) {
        showToast("Montant de la facture invalide.", "error");
        return;
      }
      
      const billCode = Math.floor(100000 + Math.random() * 900000).toString();
      facturesEnAttente.push({ code: billCode, amount: amount, merchantId: currentUserId });
      
      document.getElementById("qr-area").classList.remove('hidden');
      document.getElementById("bill-code-display").innerText = billCode;
      
      showToast(`Facture créée. Le client peut payer ${amount}$ avec le code ${billCode}`, "success");
    }

    // Simulation d'un achat direct via l'interface POS
    function genererVenteDirecte(amount, itemName) {
      const merchant = usersData.find(u => u.id === currentUserId);
      
      // On simule qu'un client (le Client Virtuel) fait l'achat physiquement
      const client = usersData.find(u => u.role === "client" && u.status === "Actif" && u.balance >= amount);

      if (!client) {
        showToast("Échec : Le client virtuel n'a pas assez de fonds pour simuler cet achat.", "warning");
        return;
      }

      // Transaction
      client.balance -= amount;
      merchant.balance += amount;

      transactions.push({
        id: "TX-" + (1001 + transactions.length),
        from: client.id,
        to: merchant.id,
        amount: amount,
        type: `Vente (${itemName})`,
        date: "À l'instant"
      });
      
      showToast(`Paiement de ${amount.toFixed(2)}$ validé ! (Débit simulé: ${client.name})`, "success");
      renderPhone();
    }

    // --- RELEVÉ PDF DE VENTE ---
    function exportHistoryPDF() {
      const merchant = usersData.find(u => u.id === currentUserId);
      const merchantTx = transactions.filter(t => t.from === merchant.id || t.to === merchant.id);
      
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      
      doc.setFontSize(20); 
      doc.setTextColor(245, 158, 11); // Amber
      doc.text("Relevé d'Encaissement (POS)", 20, 20);
      
      doc.setFontSize(12); 
      doc.setTextColor(0, 0, 0);
      doc.text(`Enseigne : ${merchant.name}`, 20, 32);
      doc.text(`Code Marchand : ${merchant.merchantCode}`, 20, 40);
      doc.text(`Total Chiffre d'Affaires : ${merchant.balance.toFixed(2)}$`, 20, 48);
      
      doc.setDrawColor(200, 200, 200);
      doc.line(20, 55, 190, 55);
      
      doc.setFontSize(10);
      doc.text("Historique des transactions :", 20, 65);
      
      let y = 75;
      merchantTx.reverse().forEach(tx => { 
        // Pagination basique
        if(y > 280) { doc.addPage(); y = 20; }
        const isIncoming = tx.to === merchant.id;
        const sign = isIncoming ? "+" : "-";
        doc.text(`${tx.date} | ${tx.type} : ${sign}${tx.amount.toFixed(2)}$ (ID: ${tx.id})`, 20, y); 
        y += 10; 
      });
      
      doc.save(`CA_${merchant.name.replace(/\s+/g, '_')}.pdf`);
      showToast("Téléchargement du registre PDF démarré !", "success");
    }
  </script>
