<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-P84YDX128F"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
  
    gtag('config', 'G-P84YDX128F');
  </script>
  <title>Application Mobile - Agent de Terrain</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome pour les icônes -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Supabase Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- jsPDF pour l'exportation du relevé -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    /* Custom Scrollbar pour un look premium */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #0f172a; /* slate-900 */
    }
    ::-webkit-scrollbar-thumb {
      background: #334155; /* slate-700 */
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #475569; /* slate-600 */
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

  <!-- Zone de Notifications (Toast) -->
  <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-2"></div>

  <!-- Application Agent -->
  <div class="min-h-screen flex flex-col bg-slate-900 text-slate-200 relative max-w-2xl mx-auto border-x border-slate-800 shadow-2xl" id="phone-1">
    <!-- Chargé dynamiquement par JS -->
  </div>

  <script>
    let currentUserData = null;
    let usersData = [];
    let managedClients = [];
    let transactions = [];
    
    // Supabase Client Initialization
    const SUPABASE_URL = 'https://fcbsmfcbzyyeksqfajdu.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjYnNtZmNienl5ZWtzcWZhamR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MjQyNDQsImV4cCI6MjA5NjUwMDI0NH0.NoPwKmQ8sbH1o-mt-O2yQgm7P1Bv0BRoeiCa8kJ1C0E';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // État de navigation
    const phoneId = "phone-1";
    let currentAgentId = null;
    let currentTab = "home";
    let isLoggedIn = false;
    let tempTargetClient = null;

    // --- INITIALISATION AU CHARGEMENT ---
    window.onload = async function() {
      const storedUserId = sessionStorage.getItem('currentUserId');
      if (storedUserId) {
        currentAgentId = storedUserId;
        isLoggedIn = true;
        await fetchAllUsers();
        await fetchAgentData();
        renderPhone();
        showToast("Session Agent active. Réseau opérationnel.", "success");
      } else {
        window.location.href = 'login.html';
      }
    };

    async function fetchAllUsers() {
      const { data } = await supabaseClient.from('users').select('*');
      usersData = (data || []).map(u => ({
        ...u,
        balance: u.balance_usd || 0,
        limit: u.limit || 0,
        balanceCDF: u.balance_cdf || 0,
        code: u.pin_code
      }));
    }

    async function fetchAgentData() {
      const { data } = await supabaseClient.from('users').select('*').eq('id', currentAgentId).single();
      if (data) {
        currentUserData = {
          ...data,
          balance: data.balance_usd || 0,
          balanceCDF: data.balance_cdf || 0,
          code: data.pin_code,
          commission: data.commission || 0
        };
      }
      
      // Récupérer aussi les clients gérés par cet agent
      const { data: clients } = await supabaseClient.from('users').select('*').eq('managedBy', currentAgentId);
      managedClients = (clients || []).map(c => ({
        ...c,
        balance: c.balance_usd || 0,
        balanceCDF: c.balance_cdf || 0,
        code: c.pin_code
      }));
    }

    // --- GESTION DES NOTIFICATIONS (TOAST) ---
    function showToast(message, type = "info") {
      const container = document.getElementById("toast-container");
      const toast = document.createElement("div");
      toast.className = `flex items-center gap-2 px-4 py-3 rounded-xl shadow-lg border text-sm font-semibold transition-all duration-300 transform -translate-y-2 opacity-0`;
      
      if (type === "success") {
        toast.className += " bg-emerald-950 border-emerald-800 text-emerald-300";
        toast.innerHTML = `<i class="fa-solid fa-circle-check"></i> <span>${message}</span>`;
      } else if (type === "error") {
        toast.className += " bg-rose-950 border-rose-800 text-rose-300";
        toast.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> <span>${message}</span>`;
      } else if (type === "warning") {
        toast.className += " bg-amber-950 border-amber-800 text-amber-300";
        toast.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> <span>${message}</span>`;
      } else {
        toast.className += " bg-indigo-950 border-indigo-800 text-indigo-300";
        toast.innerHTML = `<i class="fa-solid fa-circle-info"></i> <span>${message}</span>`;
      }

      container.appendChild(toast);
      
      setTimeout(() => toast.classList.remove("-translate-y-2", "opacity-0"), 50);
      setTimeout(() => {
        toast.classList.add("-translate-y-2", "opacity-0");
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    // --- RENDU DU TÉLÉPHONE AGENT ---
    function renderPhone() {
      const container = document.getElementById(phoneId);

      if (!isLoggedIn) {
        container.innerHTML = renderLoginScreen();
        return;
      }

      const user = currentUserData;

      // Header de l'app
      let headerHTML = `
        <div class="px-4 py-3 bg-slate-950/80 border-b border-slate-800 flex justify-between items-center text-xs">
          <div class="flex items-center gap-2">
            <div class="w-6 h-6 bg-[#FFD700] flex items-center justify-center rounded-full shadow-[0_0_10px_rgba(255,215,0,0.3)]">
              <span class="text-black font-black text-[9px] tracking-tighter">BL</span>
            </div>
            <span class="font-extrabold text-[10px] tracking-tight uppercase text-white">Baniki <span class="text-[#FFD700]">Labs</span></span>
          </div>
        </div>
        <div class="p-4 bg-slate-950/40 flex items-center justify-between border-b border-slate-800">
          <div class="flex items-center gap-3 cursor-pointer hover:bg-white/5 p-1 rounded-lg transition" onclick="changeTab('profile')">
            <div class="w-10 h-10 rounded-full bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 flex items-center justify-center text-sm font-bold">
              ${user.name.substring(0, 2).toUpperCase()}
            </div>
            <div>
              <h4 class="text-sm font-bold text-white">${user.name}</h4>
              <p class="text-[10px] text-slate-400 font-semibold uppercase tracking-wider">Agent de Terrain</p>
            </div>
          </div>
          <span class="text-[10px] px-2 py-1 rounded-full font-bold bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">
            ${user.status}
          </span>
        </div>
      `;

      let contentHTML = "";
      if (currentTab === "profile") {
        contentHTML = renderProfileScreen(user);
      } else {
        contentHTML = renderAgentScreen(user, currentTab);
      }

      container.innerHTML = `
        ${headerHTML}
        <div class="flex-1 overflow-y-auto p-4 space-y-4 pb-20">
          ${contentHTML}
        </div>
        ${renderAgentFooter(currentTab)}
      `;
    }

    // --- ÉCRAN DE CONNEXION ---
    function renderLoginScreen() {
      return `
        <div class="flex flex-col items-center justify-center min-h-screen p-6 text-center">
          <div class="w-20 h-20 bg-emerald-500/10 text-emerald-500 rounded-full flex items-center justify-center text-3xl mb-6 border border-emerald-500/20">
            <i class="fa-solid fa-handshake-angle"></i>
          </div>
          <h2 class="text-2xl font-black text-white mb-2">Portail Agent</h2>
          <p class="text-slate-400 text-sm mb-8">Entrez vos accès pour gérer les opérations guichet.</p>
          
          <div class="w-full space-y-4">
            <div class="text-left">
              <label class="text-[10px] text-slate-500 uppercase font-bold ml-1">Téléphone Professionnel</label>
              <input type="text" id="login-phone" placeholder="243..." class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 text-white focus:border-emerald-500 outline-none transition">
            </div>
            <div class="text-left">
              <label class="text-[10px] text-slate-500 uppercase font-bold ml-1">Code Agent / PIN</label>
              <input type="password" id="login-pin" placeholder="••••" class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 text-white focus:border-emerald-500 outline-none transition">
            </div>
            <button onclick="handleLogin()" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-2xl transition shadow-lg mt-4">
              Accéder au Guichet
            </button>
          </div>
          <p class="mt-8 text-xs text-slate-500">Contactez le Super Agent pour réinitialiser vos accès.</p>
        </div>
      `;
    }

    function handleLogin() {
      const phone = document.getElementById('login-phone').value;
      const pin = document.getElementById('login-pin').value;

      // This login screen is now handled by login.html
      // If we reach here, it means the user is not logged in via sessionStorage.
      showToast("Veuillez vous connecter via la page principale.", "warning");
      window.location.href = 'login.html';
    }

    // --- NAVIGATION ---
    function changeTab(newTab) {
      currentTab = newTab;
      renderPhone();
    }

    // --- ÉCRANS DE L'AGENT ---
    function renderAgentScreen(user, tab) {
      if (tab === "home") {
        return `
          <!-- Solde et Commissions -->
          <div class="bg-gradient-to-br from-emerald-600 to-teal-700 rounded-3xl p-5 shadow-xl relative overflow-hidden">
            <div class="absolute -right-6 -bottom-6 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
            <p class="text-xs text-emerald-100 uppercase tracking-wider font-semibold">Commissions Récoltées</p>
            <div class="flex justify-between items-end mt-1">
              <h2 class="text-3xl font-black text-white">${user.commission.toFixed(2)} $</h2>
              <div class="text-right">
                <p class="text-[10px] text-emerald-100 uppercase font-bold">Encaisse Physique</p>
                <p class="text-xs font-black text-white">${user.balance.toFixed(2)} $ / ${(user.balanceCDF || 0).toLocaleString()} FC</p>
              </div>
            </div>
            <div class="mt-4 pt-2 border-t border-white/20 text-[10px] text-emerald-100 flex justify-between">
              <span>Code Agent: ${user.code}</span>
              <span>Région: Kinshasa</span>
            </div>
          </div>

          <!-- Services de Terrain -->
          <p class="text-xs text-emerald-400 font-bold uppercase tracking-wider mt-6 mb-2">Opérations Guichet</p>
          <div class="grid grid-cols-2 gap-3">
            <button onclick="changeTab('deposit')" class="p-4 bg-slate-950 hover:bg-slate-900 border border-slate-800 rounded-2xl transition flex flex-col items-start gap-2 text-left group">
              <div class="w-10 h-10 rounded-xl bg-emerald-500/10 text-emerald-400 flex items-center justify-center group-hover:bg-emerald-500/20 transition">
                <i class="fa-solid fa-money-bill-transfer text-lg"></i>
              </div>
              <div>
                <span class="text-sm font-bold text-white block">Dépôt Cash</span>
                <span class="text-[10px] text-slate-400">Créditer un client</span>
              </div>
            </button>

            <button onclick="changeTab('withdraw')" class="p-4 bg-slate-950 hover:bg-slate-900 border border-slate-800 rounded-2xl transition flex flex-col items-start gap-2 text-left group">
              <div class="w-10 h-10 rounded-xl bg-emerald-500/10 text-emerald-400 flex items-center justify-center group-hover:bg-emerald-500/20 transition">
                <i class="fa-solid fa-hand-holding-dollar text-lg"></i>
              </div>
              <div>
                <span class="text-sm font-bold text-white block">Retrait Cash</span>
                <span class="text-[10px] text-slate-400">Remettre des espèces</span>
              </div>
            </button>
          </div>

          <!-- Liste des Clients Gérés -->
          <div class="mt-6">
            <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Clients rattachés</h4>
            <div class="space-y-2">
              ${managedClients.map(u => `
                <div class="p-3 bg-slate-950 rounded-2xl border border-slate-800 flex justify-between items-center">
                  <div>
                    <span class="text-sm font-bold text-white block">${u.name}</span>
                    <span class="text-[10px] text-slate-500">Tél : ${u.phone} • Solde : ${u.balance.toFixed(2)}$</span>
                  </div>
                  <button onclick="preparerChangerCodeClient('${u.id}')" class="w-8 h-8 rounded-full bg-emerald-500/10 text-emerald-400 hover:bg-emerald-500/20 transition flex items-center justify-center" title="Changer le PIN">
                    <i class="fa-solid fa-key text-xs"></i>
                  </button>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      } 
      
      else if (tab === "deposit") {
        const clients = usersData.filter(u => u.role === "client");
        let optionsHTML = clients.map(c => `<option value="${c.id}">${c.name} (${c.phone})</option>`).join("");
        return `
          <h3 class="text-base font-bold text-white flex items-center gap-2 mb-4">
            <i class="fa-solid fa-money-bill-transfer text-emerald-400"></i> Effectuer un Dépôt Client
          </h3>
          <div class="bg-slate-950 p-5 rounded-3xl border border-slate-800 space-y-4">
            <div>
              <label class="text-xs text-slate-400 uppercase font-bold">Sélectionner le Client</label>
              <select id="deposit-client" class="w-full mt-2 bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white focus:outline-none">
                ${optionsHTML}
              </select>
            </div>
            <div>
              <label class="text-xs text-slate-400 uppercase font-bold">Montant reçu en espèces ($)</label>
              <input type="number" id="deposit-amount" placeholder="0.00" class="w-full mt-2 bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white focus:outline-none">
            </div>
            <button onclick="validerOperationAgent('deposit')" class="w-full py-3 bg-emerald-600 hover:bg-emerald-500 text-sm font-bold text-white rounded-xl transition shadow-lg shadow-emerald-600/20">
              Valider et créditer le compte
            </button>
            <button onclick="changeTab('home')" class="w-full py-2 text-sm text-slate-400 hover:text-white text-center block">
              Annuler
            </button>
          </div>
        `;
      } 
      
      else if (tab === "withdraw") {
        const clients = usersData.filter(u => u.role === "client");
        let optionsHTML = clients.map(c => `<option value="${c.id}">${c.name} (Max: ${c.balance.toFixed(2)}$)</option>`).join("");
        return `
          <h3 class="text-base font-bold text-white flex items-center gap-2 mb-4">
            <i class="fa-solid fa-hand-holding-dollar text-emerald-400"></i> Traiter un Retrait Client
          </h3>
          <div class="bg-slate-950 p-5 rounded-3xl border border-slate-800 space-y-4">
            <div>
              <label class="text-xs text-slate-400 uppercase font-bold">Sélectionner le Client</label>
              <select id="withdraw-client" class="w-full mt-2 bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white focus:outline-none">
                ${optionsHTML}
              </select>
            </div>
            <div>
              <label class="text-xs text-slate-400 uppercase font-bold">Montant à décaisser ($)</label>
              <input type="number" id="withdraw-amount" placeholder="0.00" class="w-full mt-2 bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white focus:outline-none">
            </div>
            <button onclick="validerOperationAgent('withdraw')" class="w-full py-3 bg-emerald-600 hover:bg-emerald-500 text-sm font-bold text-white rounded-xl transition shadow-lg shadow-emerald-600/20">
              Autoriser le décaissement physique
            </button>
            <button onclick="changeTab('home')" class="w-full py-2 text-sm text-slate-400 hover:text-white text-center block">
              Annuler
            </button>
          </div>
        `;
      } 
      
      else if (tab === "new-user") {
        return `
          <h3 class="text-base font-bold text-white flex items-center gap-2 mb-4">
            <i class="fa-solid fa-user-plus text-sky-400"></i> Enrôlement Express (KYC)
          </h3>
          <div class="bg-slate-950 p-5 rounded-3xl border border-slate-800 space-y-4">
            <div>
              <label class="text-xs text-slate-400 uppercase font-bold">Nom et Prénom du client</label>
              <input type="text" id="new-name" placeholder="Ex: Alice Mbemba" class="w-full mt-1 bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white focus:outline-none">
            </div>
            
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="text-[10px] text-slate-400 uppercase font-bold">Téléphone (ID)</label>
                <input type="text" id="new-phone" placeholder="243..." class="w-full mt-1 bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white focus:outline-none">
              </div>
              <div>
                <label class="text-[10px] text-slate-400 uppercase font-bold">Pièce d'Identité</label>
                <input type="text" id="new-doc" placeholder="N° Carte / Passeport" class="w-full mt-1 bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white focus:outline-none">
              </div>
            </div>

            <div>
              <label class="text-xs text-slate-400 uppercase font-bold">Photo d'Identité & KYC</label>
              <div class="flex gap-4 items-center mt-2">
                <div id="new-photo-preview-container" class="w-16 h-16 bg-slate-900 rounded-2xl flex items-center justify-center overflow-hidden border border-slate-700">
                  <img id="new-photo-preview" src="" alt="Aperçu" class="hidden w-full h-full object-cover">
                  <i id="new-photo-placeholder" class="fa-solid fa-image text-slate-500 text-xl"></i>
                </div>
                <input type="hidden" id="new-photo-url">
                <input type="file" id="photo-file-input" class="hidden" accept="image/*" onchange="handleFileSelect(this, 'new-photo')">
                <div class="flex gap-2">
                  <button onclick="document.getElementById('photo-file-input').click()" class="w-10 h-10 rounded-xl bg-slate-800 text-white hover:bg-slate-700 flex items-center justify-center transition" title="Uploader KYC">
                    <i class="fa-solid fa-camera"></i>
                  </button>
                </div>
              </div>
            </div>

            <div>
              <label class="text-xs text-slate-400 uppercase font-bold">Dépôt Initial de Démarrage ($)</label>
              <input type="number" id="new-deposit" placeholder="0.00 (Espèces confiées)" class="w-full mt-1 bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white focus:outline-none">
            </div>

            <button onclick="creerClientExpress()" class="w-full py-3 bg-emerald-600 hover:bg-emerald-500 text-sm font-bold text-white rounded-xl transition shadow-lg mt-2">
              Finaliser l'inscription KYC
            </button>
          </div>
        `;
      } 
      
      else if (tab === "manage-pin") {
        const target = usersData.find(u => u.id === tempTargetClient);
        return `
          <h3 class="text-base font-bold text-white mb-4 flex items-center gap-2">
            <i class="fa-solid fa-key text-emerald-400"></i> Modification Code PIN Client
          </h3>
          <div class="bg-slate-950 p-5 rounded-3xl border border-slate-800 space-y-4">
            <div class="bg-slate-900 p-3 rounded-xl border border-slate-800 mb-2">
              <span class="text-xs text-slate-400 uppercase font-bold block">Client Ciblé</span>
              <span class="text-sm font-bold text-white block mt-1">${target ? target.name : 'Client inconnu'}</span>
              <span class="text-xs text-slate-500">Tél : ${target ? target.phone : 'N/A'}</span>
            </div>
            <div>
              <label class="text-xs text-slate-400 uppercase font-bold">Nouveau code temporaire</label>
              <input type="password" id="client-new-pin" placeholder="Saisir au moins 4 chiffres" class="w-full mt-2 bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white focus:outline-none">
            </div>
            <button onclick="agentUpdateClientPin()" class="w-full py-3 bg-emerald-600 hover:bg-emerald-500 text-sm font-bold text-white rounded-xl transition shadow-lg">
              Sauvegarder le nouveau PIN
            </button>
            <button onclick="changeTab('home')" class="w-full py-2 text-sm text-slate-400 hover:text-white text-center block">
              Annuler
            </button>
          </div>
        `;
      } 
      
      else if (tab === "history") {
        const agentTx = transactions.filter(t => t.from === user.id || t.to === user.id);
        let txListHTML = "";
        
        agentTx.slice().reverse().forEach(tx => {
          const isOutgoing = tx.from === user.id;
          const otherUser = usersData.find(u => u.id === (isOutgoing ? tx.to : tx.from));
          txListHTML += `
            <div class="p-3 mb-2 rounded-xl bg-slate-950 border border-slate-800 text-xs flex justify-between items-center">
              <div>
                <p class="text-white font-bold capitalize">${tx.type}</p>
                <p class="text-slate-500 mt-1">${otherUser ? otherUser.name : 'Réseau'} • ${tx.date}</p>
              </div>
              <span class="font-bold ${isOutgoing ? 'text-rose-400' : 'text-emerald-400'}">
                ${isOutgoing ? '-' : '+'}${tx.amount.toFixed(2)}$
              </span>
            </div>
          `;
        });

        return `
          <h3 class="text-base font-bold text-white flex items-center gap-2 mb-4">
            <i class="fa-solid fa-clock-rotate-left text-emerald-400"></i> Journal de Guichet
          </h3>
          <button onclick="exportHistoryPDF()" class="w-full mb-4 py-3 bg-slate-800 border border-slate-700 hover:bg-slate-700 text-xs font-bold text-white rounded-xl flex items-center justify-center gap-2 transition">
            <i class="fa-solid fa-file-pdf text-rose-500"></i> Télécharger Relevé Hebdomadaire
          </button>
          <div class="space-y-1">
            ${txListHTML || '<p class="text-center py-6 text-slate-500 text-xs">Aucune transaction enregistrée.</p>'}
          </div>
        `;
      }
    }

    // --- SECONDARY SCREENS ---
    function renderProfileScreen(user) {
      return `
        <h3 class="text-base font-bold text-white mb-4 flex items-center gap-2">
          <i class="fa-solid fa-user-circle text-emerald-400"></i> Mon Profil Agent
        </h3>
        <div class="bg-slate-950 p-5 rounded-3xl border border-slate-800 space-y-4">
          <div class="space-y-2">
            <p class="text-xs text-slate-500 uppercase font-bold tracking-widest">Poste & Réseau</p>
            <div class="bg-slate-900 p-3 rounded-xl border border-slate-800">
                <p class="text-sm text-white font-semibold">${user.name}</p>
                <p class="text-xs text-slate-400 mt-1">Matricule : ${user.id}</p>
                <p class="text-xs text-slate-400">Code Guichet : ${user.code}</p>
            </div>            
            <div class="flex items-center justify-between mt-4 pt-4 border-t border-slate-800/80">
              <div>
                <p class="text-xs text-slate-500 uppercase font-bold">Code PIN Actuel</p>
                <p id="display-pin" class="text-lg text-emerald-400 font-mono font-bold mt-1">••••</p>
              </div>
              <button onclick="togglePinVisibility('${user.code}')" class="w-10 h-10 rounded-full bg-slate-900 border border-slate-700 text-slate-400 hover:text-white transition flex items-center justify-center">
                <i class="fa-solid fa-eye" id="pin-icon"></i>
              </button>
            </div>
          </div>
          
          <div class="pt-4 border-t border-slate-800/80">
            <label class="text-xs text-slate-400 uppercase font-bold">Nouveau Code PIN</label>
            <input type="password" id="new-pin" placeholder="Ex: 5678" class="w-full mt-2 bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-emerald-500">
            <button onclick="updateUserPin()" class="w-full mt-3 py-3 bg-emerald-600 hover:bg-emerald-500 text-sm font-bold text-white rounded-xl transition shadow-lg">Mettre à jour le PIN</button>
          </div>
          <button onclick="logout()" class="w-full py-3 mt-4 bg-slate-800 hover:bg-slate-700 text-sm font-bold text-white rounded-xl transition">
            <i class="fa-solid fa-right-from-bracket mr-2"></i> Déconnexion
          </button>
        </div>
        <button onclick="changeTab('home')" class="w-full py-2 text-sm text-slate-400 hover:text-white text-center block">Retour</button>
      `;
    }

    // --- UTILITAIRES PROFILE ---
    function togglePinVisibility(pin) {
      const el = document.getElementById(`display-pin`);
      const icon = document.getElementById(`pin-icon`);
      if (el.innerText === "••••") {
        el.innerText = pin;
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
      } else {
        el.innerText = "••••";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
      }
    }

    async function updateUserPin() {
      const newPin = document.getElementById(`new-pin`).value;
      if (newPin.length < 4) { showToast("Le code PIN doit comporter au moins 4 caractères.", "error"); return; }
      const user = usersData.find(u => u.id === currentAgentId);
      await supabaseClient.from('users').update({ pin_code: newPin }).eq('id', currentAgentId);
      user.code = newPin;
      showToast("Votre code PIN a été modifié avec succès.", "success");
      changeTab("profile");
    }

    function logout() {
      sessionStorage.removeItem('currentUserId');
      sessionStorage.removeItem('currentUserRole');
      window.location.href = 'login.html';
    }

    // --- FOOTER NAVIGATION AGENT ---
    function renderAgentFooter(activeTab) {
      return `
        <div class="absolute bottom-0 left-0 w-full bg-slate-950/90 backdrop-blur-md border-t border-slate-800 pb-safe pt-2">
            <div class="flex justify-around items-center px-2 pb-2">
                <button onclick="changeTab('home')" class="flex flex-col items-center gap-1 w-16 ${activeTab === 'home' || activeTab === 'deposit' || activeTab === 'withdraw' || activeTab === 'manage-pin' ? 'text-emerald-400' : 'text-slate-500 hover:text-slate-300'} transition">
                    <i class="fa-solid fa-handshake-angle text-xl mb-1"></i>
                    <span class="text-[10px] font-semibold">Guichet</span>
                </button>
                <button onclick="changeTab('new-user')" class="flex flex-col items-center gap-1 w-16 ${activeTab === 'new-user' ? 'text-emerald-400' : 'text-slate-500 hover:text-slate-300'} transition">
                    <div class="bg-slate-900 p-2 rounded-full border border-slate-800 -mt-4 mb-0.5 shadow-lg ${activeTab === 'new-user' ? 'bg-emerald-900/40 border-emerald-500/50' : ''}">
                        <i class="fa-solid fa-user-plus text-xl"></i>
                    </div>
                    <span class="text-[10px] font-semibold">Enrôlement</span>
                </button>
                <button onclick="changeTab('history')" class="flex flex-col items-center gap-1 w-16 ${activeTab === 'history' ? 'text-emerald-400' : 'text-slate-500 hover:text-slate-300'} transition">
                    <i class="fa-solid fa-clock-rotate-left text-xl mb-1"></i>
                    <span class="text-[10px] font-semibold">Journal</span>
                </button>
            </div>
        </div>
      `;
    }

    // --- ACTIONS ET LOGIQUE AGENT ---

    async function validerOperationAgent(type) {
      const agent = usersData.find(u => u.id === currentAgentId);
      
      if (type === 'deposit') {
        const clientId = document.getElementById("deposit-client").value;
        const amount = parseFloat(document.getElementById("deposit-amount").value);
        const client = usersData.find(u => u.id === clientId);

        if (isNaN(amount) || amount <= 0) {
          showToast("Veuillez saisir un montant de dépôt valide.", "error");
          return;
        }

        const newClientBal = client.balance + amount;
        const newAgentBal = agent.balance + amount;

        // Action de dépôt : Crédit numérique contre dépôt d'espèces physiques
        await supabaseClient.from('users').update({ balance_usd: newClientBal }).eq('id', clientId);
        await supabaseClient.from('users').update({ balance_usd: newAgentBal }).eq('id', agent.id);
        client.balance = newClientBal;
        agent.balance = newAgentBal;
        // Commission agent de terrain (1.5% du dépôt)
        const comm = amount * 0.015;
        agent.commission += comm;

        transactions.push({
          id: "TX-" + Date.now(),
          from: agent.id,
          to: client.id,
          amount: amount,
          type: "Dépôt physique",
          date: "À l'instant"
        });

        showToast(`Dépôt physique réussi ! +${amount}$ crédités à ${client.name}. Commission : +${comm.toFixed(2)}$`, "success");
        changeTab('home');
      } 
      
      else if (type === 'withdraw') {
        const clientId = document.getElementById("withdraw-client").value;
        const amount = parseFloat(document.getElementById("withdraw-amount").value);
        const client = usersData.find(u => u.id === clientId);

        if (isNaN(amount) || amount <= 0) {
          showToast("Montant invalide.", "error");
          return;
        }
        if (client.balance < amount) {
          showToast("Le solde du client est insuffisant pour ce retrait.", "error");
          return;
        }

        if (amount > client.limit) {
          showToast("Le montant dépasse le plafond autorisé de ce client.", "error");
          return;
        }

        const newClientBal = client.balance - amount;
        const newAgentBal = agent.balance - amount;

        // Action de retrait : débit numérique contre remise d'espèces physiques
        await supabaseClient.from('users').update({ balance_usd: newClientBal }).eq('id', clientId);
        await supabaseClient.from('users').update({ balance_usd: newAgentBal }).eq('id', agent.id);
        client.balance = newClientBal;
        agent.balance = newAgentBal;
        // Commission agent (1.0% du retrait)
        const comm = amount * 0.01;
        agent.commission += comm;

        transactions.push({
          id: "TX-" + Date.now(),
          from: client.id,
          to: agent.id,
          amount: amount,
          type: "Retrait espèces",
          date: "À l'instant"
        });

        showToast(`Retrait cash de ${amount}$ exécuté pour ${client.name}. Commission : +${comm.toFixed(2)}$`, "success");
        changeTab('home');
      }
    }

    async function creerClientExpress() {
      const name = document.getElementById("new-name").value.trim();
      const phoneInput = document.getElementById("new-phone").value.trim();
      const deposit = parseFloat(document.getElementById("new-deposit").value);
      const doc = document.getElementById("new-doc").value.trim();
      const photo = document.getElementById("new-photo-url").value.trim();
      const agent = usersData.find(u => u.id === currentAgentId);

      if (!name || !phoneInput || !doc || !photo || isNaN(deposit) || deposit < 0) {
        showToast("Veuillez remplir correctement tous les critères KYC.", "error");
        return;
      }

      // Vérifier doublon
      const exists = usersData.find(u => u.phone === phoneInput);
      if (exists) {
        showToast("Ce numéro de téléphone est déjà enregistré.", "error");
        return;
      }

      const newUser = {
        name: name,
        role: "client",
        balance_usd: deposit,
        phone: phoneInput,
        status: "Actif",
        limit: 1500,
        kyc_doc: doc,
        photo_url: photo,
        managedBy: agent.id
      };

      const { error } = await supabaseClient.from('users').insert([newUser]);
      if (!error) {
        const enrollmentBonus = 5.00;
        agent.commission += enrollmentBonus;
        showToast(`Client ${name} enregistré avec succès dans le réseau.`, "success");
        await fetchAllUsers();
        changeTab('home');
      } else {
        showToast("Erreur lors de l'enrôlement Supabase.", "error");
      }
    }

    // --- CHANGEMENT DE CODE PIN CLIENT ---
    function preparerChangerCodeClient(clientId) {
      tempTargetClient = clientId;
      changeTab('manage-pin');
    }

    async function agentUpdateClientPin() {
      const newPin = document.getElementById("client-new-pin").value;
      if (newPin.length < 4) {
        showToast("Le code doit avoir au moins 4 caractères.", "error");
        return;
      }
      
      const client = usersData.find(u => u.id === tempTargetClient);
      await supabaseClient.from('users').update({ pin_code: newPin }).eq('id', tempTargetClient);
      if(client) {
         client.code = newPin;
         showToast(`Code PIN de ${client.name} mis à jour par l'agent.`, "success");
      }
      
      tempTargetClient = null;
      changeTab('home');
    }

    // --- GESTION RÉELLE DES IMAGES SUPABASE STORAGE ---
    async function handleFileSelect(input, inputIdSuffix) {
      const file = input.files[0];
      if (!file) return;

      showToast("Téléchargement de l'image vers le cloud...", "info");
      
      const fileExt = file.name.split('.').pop();
      const fileName = `${Date.now()}.${fileExt}`;
      const filePath = `kyc/${fileName}`;

      const { data, error } = await supabaseClient.storage
        .from('pesa_images')
        .upload(filePath, file);

      if (error) {
        showToast("Erreur Storage: " + error.message, "error");
        return;
      }

      const { data: urlData } = supabaseClient.storage
        .from('pesa_images')
        .getPublicUrl(filePath);

      const imageUrl = urlData.publicUrl;
      const previewImg = document.getElementById(`${inputIdSuffix}-preview`);
      const hiddenInput = document.getElementById(`${inputIdSuffix}-url`);
      const placeholder = document.getElementById(`${inputIdSuffix}-placeholder`);

      previewImg.src = imageUrl;
      previewImg.classList.remove('hidden');
      if (placeholder) placeholder.classList.add('hidden');
      hiddenInput.value = imageUrl;
      showToast("Document enregistré avec succès.", "success");
    }

    // --- RELEVÉ PDF DE GUICHET ---
    function exportHistoryPDF() {
      const user = usersData.find(u => u.id === currentAgentId);
      const agentTx = transactions.filter(t => t.from === user.id || t.to === user.id);
      
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.setFontSize(18); 
      doc.text("Journal de Caisse - Agent de Terrain", 20, 20);
      
      doc.setFontSize(12); 
      doc.text(`Identité : ${user.name} (${user.id})`, 20, 32);
      doc.text(`Commissions Totales : ${user.commission.toFixed(2)}$`, 20, 40);
      doc.text(`Fonds en caisse : ${user.balance.toFixed(2)}$ / ${(user.balanceCDF || 0).toLocaleString()} FC`, 20, 48);
      
      doc.setDrawColor(200, 200, 200);
      doc.line(20, 56, 190, 56);
      
      doc.text("Détail des opérations récentes :", 20, 66);
      let y = 76;
      agentTx.reverse().forEach(tx => { 
        doc.text(`${tx.date} - ${tx.type} : ${tx.amount.toFixed(2)}$ (ID: ${tx.id})`, 20, y); 
        y += 10; 
      });
      
      doc.save(`Rapport_Guichet_${user.name}.pdf`);
      showToast("Téléchargement du relevé de guichet démarré !", "success");
    }
  </script>
