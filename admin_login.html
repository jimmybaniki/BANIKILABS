<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Baniki Labs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center font-sans p-4">
  <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl ring-1 ring-white/10">
    <div class="text-center mb-8">
      <div class="flex flex-col items-center gap-3 mb-6">
        <div class="w-16 h-16 bg-rose-600 flex items-center justify-center rounded-full shadow-[0_0_25px_rgba(225,29,72,0.4)]">
          <i class="fa-solid fa-user-shield text-white text-2xl"></i>
        </div>
        <span class="font-extrabold text-2xl tracking-tight uppercase">Baniki <span class="text-rose-500">Admin</span></span>
      </div>
      <h1 class="text-sm font-bold text-slate-500 uppercase tracking-widest">Console Manager</h1>
      <p class="text-sm text-slate-400 mt-2">Accès restreint aux administrateurs réseau</p>
    </div>

    <form id="admin-form" class="space-y-6">
      <div>
        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Email Administrateur</label>
        <input type="email" id="email" required class="w-full bg-slate-950 border border-slate-800 rounded-xl py-3 px-4 text-sm text-white focus:outline-none focus:ring-2 focus:ring-rose-500 transition" placeholder="Saisir email">
      </div>
      <div>
        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Mot de passe</label>
        <input type="password" id="password" required class="w-full bg-slate-950 border border-slate-800 rounded-xl py-3 px-4 text-sm text-white focus:outline-none focus:ring-2 focus:ring-rose-500 transition" placeholder="••••••••">
      </div>
      <div id="error-message" class="hidden bg-rose-950/50 border border-rose-800 text-rose-300 text-xs p-3 rounded-lg">
        <span>Identifiants incorrects.</span>
      </div>
      <button type="submit" class="w-full py-3 bg-rose-600 hover:bg-rose-500 text-white font-bold rounded-xl shadow-lg transition-all">
        Ouvrir le Simulateur
      </button>
    </form>
  </div>

  <script>
    const SUPABASE_URL = 'https://fcbsmfcbzyyeksqfajdu.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjYnNtZmNienl5ZWtzcWZhamR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MjQyNDQsImV4cCI6MjA5NjUwMDI0NH0.NoPwKmQ8sbH1o-mt-O2yQgm7P1Bv0BRoeiCa8kJ1C0E';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('admin-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error-message');

      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

      if (error) {
        errorEl.classList.remove('hidden');
        document.getElementById('admin-form').classList.add('animate-shake');
        setTimeout(() => document.getElementById('admin-form').classList.remove('animate-shake'), 400);
        return; // Stop execution if authentication fails
      } else {
        // Vérifier si c'est bien un admin
        const { data: profile, error: profileFetchError } = await supabaseClient.from('users').select('role').eq('id', data.user.id).single();

        if (profileFetchError || !profile) {
          console.error("Error fetching user profile:", profileFetchError);
          errorEl.querySelector('span').innerText = "Erreur lors de la récupération du profil utilisateur ou profil non trouvé.";
          errorEl.classList.remove('hidden');
          document.getElementById('admin-form').classList.add('animate-shake');
          setTimeout(() => document.getElementById('admin-form').classList.remove('animate-shake'), 400);
          await supabaseClient.auth.signOut(); // Ensure user is logged out if profile cannot be verified
          return; // Stop execution if profile cannot be fetched
        }

        if (profile && (profile.role === 'admin' || profile.role === 'support')) {
          sessionStorage.setItem('authenticated', 'true');
          window.location.href = 'main.html';
        } else {
          await supabaseClient.auth.signOut();
          errorEl.querySelector('span').innerText = "Accès refusé : Ce compte n'est pas un administrateur.";
          errorEl.classList.remove('hidden');
        }
      }
    });
  </script>
</body>
</html>
