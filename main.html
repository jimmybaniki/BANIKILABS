    const SUPABASE_URL = 'https://fcbsmfcbzyyeksqfajdu.supabase.co';

    async function fetchUsersFromSupabase() {
      try {
        const { data, error } = await supabaseClient
          .from('users') // Assuming a 'users' table exists in Supabase
          .select('*');

        if (error) {
          console.error('Error fetching users from Supabase:', error.message);
          // showToast('Erreur de connexion à la base de données Supabase. Utilisation des données locales.', 'error'); // Handled by caller
          return null;
        }
        if (data && data.length > 0) {
          // console.log('Users fetched from Supabase:', data); // Handled by caller
          return data.map(u => ({
            ...u,
            role: (u.role || "").toLowerCase(), // Normalise en minuscules pour les comparaisons

            balanceCDF: u.balance_cdf || 0,

            merchantCode: u.merchant_code,

            limit: u.limit || 0, // Ajout de la propriété 'limit'
            items: u.items || [] // Assure que items est toujours une liste, même vide
          }));
        } else {
          // console.log('No users found in Supabase. Using local data.'); // Handled by caller
          return null; // Fallback to local data
        }
      } catch (e) {

        transactions = initialTxs.map(tx => ({

    // --- FONCTION DE RAFRAÎCHISSEMENT INDIVIDUEL ---
    async function refreshPhoneData(phoneId) {
      showToast(`Rafraîchissement des données pour ${phoneId}...`, "info");

      if (fetchedUsers) {

      }

    }

    // --- SYNCHRONISATION TEMPS RÉEL ---
    function setupRealtimeSubscription() {
      // S'abonner aux changements sur la table 'users'
      supabaseClient
        .channel('db-changes')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'users' }, async (payload) => {
          console.log('Mise à jour utilisateur reçue:', payload);
          // On rafraîchit les données locales
          const fetchedUsers = await fetchUsersFromSupabase();
          if (fetchedUsers) {
            usersData = fetchedUsers;
            renderAllPhones();
            updateGlobalStats();
          }
        })
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'transactions' }, (payload) => {
          console.log('Nouvelle transaction reçue:', payload);
          const tx = payload.new;
          const mappedTx = {
            ...tx,
            from: tx.from_user_id,
            to: tx.to_user_id,
            date: new Date(tx.created_at).toLocaleDateString()
          };
          transactions.push(mappedTx);
          showToast(`Nouvelle transaction détectée : ${payload.new.type}`, "info");
          renderAllPhones();
        })
        .subscribe();
    }

    // --- UTILITAIRES ---
    function calculateTransactionFee(amount, isTransfer) {
      let baseFee = 0;
      if (amount <= 5) baseFee = 0.10;
      else if (amount <= 20) baseFee = 0.25;
      else if (amount <= 50) baseFee = 0.50;
      else if (amount <= 100) baseFee = 1.00;
      else baseFee = amount * 0.015; 

      return isTransfer ? baseFee * 1.5 : baseFee;
    }

    function toFC(usd) {
      return (usd * RATE_MARKET).toLocaleString('fr-FR') + " FC";
    }

    function updateRateDisplay() {
      const el = document.getElementById("global-stats-txt");
      if (el) el.innerText = `Taux Marché : 1$ = ${RATE_MARKET} FC`;

      document.getElementById("profit-change-txt").innerText = Math.round(networkProfits.exchange).toLocaleString() + " FC";
    }

    // --- GESTION DES NOTIFICATIONS (TOAST) ---
    function showToast(message, type = "info") {
      const container = document.getElementById("toast-container");
      const toast = document.createElement("div");
      toast.className = `flex items-center gap-2 px-4 py-3 rounded-xl shadow-lg border text-xs font-semibold transition-all duration-300 transform translate-y-2 opacity-0`;
      
      if (type === "success") {
        toast.className += " bg-emerald-950 border-emerald-800 text-emerald-300";
        toast.innerHTML = `<i class="fa-solid fa-circle-check"></i> <span>${message}</span>`;
      } else if (type === "error") {
        toast.className += " bg-rose-950 border-rose-800 text-rose-300";
        toast.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> <span>${message}</span>`;
      } else if (type === "warning") {
        toast.className += " bg-amber-950 border-amber-800 text-amber-300";
        toast.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> <span>${message}</span>`;
      } else {
        toast.className += " bg-indigo-950 border-indigo-800 text-indigo-300";
        toast.innerHTML = `<i class="fa-solid fa-circle-info"></i> <span>${message}</span>`;
      }

      container.appendChild(toast);
      
      // Animation d'entrée
      setTimeout(() => {
        toast.classList.remove("translate-y-2", "opacity-0");
      }, 50);

      // Animation de sortie et suppression
      setTimeout(() => {
        toast.classList.add("translate-y-2", "opacity-0");
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    // --- GESTION DU MODAL DE RECHERCHE D'UTILISATEUR ---
    function openSearchModal(phoneId) {
      activePhoneForSearch = phoneId;
      document.getElementById("search-modal").classList.remove("hidden");
      document.getElementById("user-search-input").value = "";
      document.getElementById("user-search-input").focus();
      filterUsersList();
    }

    function closeSearchModal() {
      document.getElementById("search-modal").classList.add("hidden");
      activePhoneForSearch = "";
    }

    function filterUsersList() {
      const query = document.getElementById("user-search-input").value.toLowerCase();
      const listContainer = document.getElementById("search-results-list");
      listContainer.innerHTML = "";

      // Filtrer les utilisateurs qui ne sont pas déjà assignés au téléphone en cours de modification (facultatif)
      const filtered = usersData.filter(user => {
        return user.name.toLowerCase().includes(query) || 
               user.role.toLowerCase().includes(query) || 
               user.id.toLowerCase().includes(query);
      });

      if (filtered.length === 0) {
        listContainer.innerHTML = `<p class="text-xs text-slate-500 text-center py-4">Aucun utilisateur trouvé.</p>`;
        return;
      }

      filtered.forEach(user => {
        let badgeColor = "bg-slate-800 text-slate-300";
        let icon = "fa-user";
        if (user.role === "client") { badgeColor = "bg-sky-500/10 text-sky-400"; icon = "fa-user"; }
        else if (user.role === "merchant") { badgeColor = "bg-amber-500/10 text-amber-400"; icon = "fa-store"; }
        else if (user.role === "agent") { badgeColor = "bg-emerald-500/10 text-emerald-400"; icon = "fa-user-tie"; }
        else if (user.role === "admin") { badgeColor = "bg-rose-500/10 text-rose-400"; icon = "fa-user-shield"; }
        else if (user.role === "support") { badgeColor = "bg-indigo-500/10 text-indigo-400"; icon = "fa-headset"; }
        else if (user.role === "regulator") { badgeColor = "bg-fuchsia-500/10 text-fuchsia-400"; icon = "fa-scale-balanced"; }
        else if (user.role === "super_agent") { badgeColor = "bg-teal-500/10 text-teal-400"; icon = "fa-users-line"; }

        const div = document.createElement("button");
        div.className = "w-full flex items-center justify-between p-3 rounded-xl bg-slate-950 hover:bg-indigo-950/40 border border-slate-800 hover:border-indigo-500/30 transition text-left";
        div.onclick = () => selectUserForPhone(user.id);
        
        div.innerHTML = `
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full ${badgeColor} flex items-center justify-center text-sm">
              <i class="fa-solid ${icon}"></i>
            </div>
            <div>
              <p class="text-sm font-semibold text-white">${user.name}</p>
              <p class="text-xs text-slate-400">${user.id} • ${user.phone || 'Sans tel'}</p>
            </div>
          </div>
          <span class="text-[10px] uppercase font-bold px-2 py-0.5 rounded ${badgeColor}">${user.role}</span>
        `;
        listContainer.appendChild(div);
      });
    }

    function selectUserForPhone(userId) {
      if (!activePhoneForSearch) return;
      
      // Assigner le nouvel utilisateur au téléphone concerné
      phoneAssignments[activePhoneForSearch] = userId;
      // Réinitialiser la navigation du téléphone à l'accueil
      phoneNavState[activePhoneForSearch] = "home";
      
      const user = usersData.find(u => u.id === userId);
      showToast(`Téléphone configuré sur le compte de : ${user.name}`, "info");
      
      closeSearchModal();
      renderPhone(activePhoneForSearch);
    }

    // --- RENDU GÉNÉRAL DES TÉLÉPHONES ---
    function renderAllPhones() {
      Object.keys(phoneAssignments).forEach(phoneId => {
        renderPhone(phoneId);
      });
    }

    // --- RENDU INDIVIDUEL D'UN TÉLÉPHONE ---
    function renderPhone(phoneId) {
      const container = document.getElementById(phoneId);
      if (!container) return;

      const expectedRoles = {
        "phone-1": "client", 
        "phone-2": "client", 
        "phone-3": "merchant",
        "phone-4": "agent", 
        "phone-5": "admin", 
        "phone-6": "support",
        "phone-7": "regulator", 
        "phone-8": "super_agent"
      };

      const targetRole = expectedRoles[phoneId];
      let user;

      // Logique de sélection dynamique
      if (phoneId === "phone-1") {
        user = usersData.find(u => (u.role || "").toLowerCase() === "client"); 
      } else if (phoneId === "phone-2") {
        const allClients = usersData.filter(u => (u.role || "").toLowerCase() === "client");
        user = allClients[1] || allClients[0]; 
      } else {
        user = usersData.find(u => (u.role || "").toLowerCase() === targetRole);
      }

      if (!user) {
        console.error(`Aucun utilisateur trouvé pour le rôle: ${targetRole}`);
        container.innerHTML = `
          <div class="p-4 flex flex-col items-center justify-center h-full text-center">
            <i class="fa-solid fa-bug text-rose-500 text-3xl mb-2"></i>
            <p class="text-sm font-semibold">Utilisateur non trouvé</p>
            <button onclick="openSearchModal('${phoneId}')" class="mt-4 px-3 py-1.5 bg-indigo-600 text-xs rounded-lg hover:bg-indigo-500 transition">
              Choisir un compte
            </button>
          </div>
        `;
        return;
      }

      const activeTab = phoneNavState[phoneId];

      // Construction de l'interface en fonction du rôle
      let headerHTML = `
        <div class="px-4 py-2 bg-slate-950/60 border-b border-slate-800 flex justify-between items-center text-xs">
          <button onclick="openSearchModal('${phoneId}')" class="flex items-center gap-1.5 text-indigo-400 hover:text-indigo-300 font-medium transition max-w-[180px] truncate">
            <i class="fa-solid fa-magnifying-glass text-[10px]"></i>
            <span class="truncate">Chercher/Connecter</span>
          </button>
          <button onclick="refreshPhoneData('${phoneId}')" class="flex items-center gap-1.5 text-slate-400 hover:text-white font-medium transition">
            <i class="fa-solid fa-arrows-rotate text-[10px]"></i>
            <span class="truncate">Rafraîchir</span>
          </button>
        </div>
        <div class="p-3 bg-slate-950/20 flex items-center justify-between border-b border-slate-800">
          <div class="flex items-center gap-2 cursor-pointer hover:bg-white/5 p-1 rounded-lg transition" onclick="changeTab('${phoneId}', 'profile')">
            <div class="w-8 h-8 rounded-full ${getRoleColorClass(user.role)} flex items-center justify-center text-xs font-bold">
              ${user.name.substring(0, 2).toUpperCase()}
            </div>
            <div>
              <h4 class="text-xs font-bold text-white max-w-[130px] truncate">${user.name}</h4>
              <p class="text-[9px] text-slate-400 font-semibold uppercase tracking-wider">${user.role}</p>
            </div>
          </div>
          <span class="text-[9px] px-2 py-0.5 rounded-full font-bold ${user.status === 'Actif' || user.status === 'En Ligne' ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-rose-500/10 text-rose-400 border border-rose-500/20'}">
            ${user.status}
          </span>
        </div>
      `;

      let contentHTML = "";
      let footerHTML = "";

      // Vérifier le statut de l'utilisateur (sauf pour l'assistance technique et l'admin)
      if ((user.status === "Suspendu" || user.status === "Gelé (Régulateur)") && user.role !== "admin" && user.role !== "support" && activeTab !== "support") {
        contentHTML = renderSuspendedScreen(phoneId, user);
      } else {
        if (activeTab === "profile") {
          contentHTML = renderProfileScreen(phoneId, user);
        } else {
        // Sélectionner l'écran selon le rôle et l'onglet actif
        switch (user.role) {
          case "client":
            contentHTML = renderClientScreen(phoneId, user, activeTab);
            footerHTML = renderClientFooter(phoneId, activeTab);
            break;
          case "merchant":
            contentHTML = renderMerchantScreen(phoneId, user, activeTab);
            footerHTML = renderMerchantFooter(phoneId, activeTab);
            break;
          case "agent":
            contentHTML = renderAgentScreen(phoneId, user, activeTab);
            footerHTML = renderAgentFooter(phoneId, activeTab);
            break;
          case "admin":
            contentHTML = renderAdminScreen(phoneId, user, activeTab);
            footerHTML = renderAdminFooter(phoneId, activeTab);
            break;
          case "support":
            contentHTML = renderSupportScreen(phoneId, user, activeTab);
            footerHTML = renderSupportFooter(phoneId, activeTab);
            break;
          case "regulator":
            contentHTML = renderRegulatorScreen(phoneId, user, activeTab);
            footerHTML = renderRegulatorFooter(phoneId, activeTab);
            break;
          case "super_agent":
            contentHTML = renderSuperAgentScreen(phoneId, user, activeTab);
            footerHTML = renderSuperAgentFooter(phoneId, activeTab);
            break;
        }
        }
      }

      container.innerHTML = `
        ${headerHTML}
        <div class="flex-1 overflow-y-auto p-4 space-y-4">
          ${contentHTML}
        </div>
        ${footerHTML}
      `;
    }

    function renderProfileScreen(phoneId, user) {
      const currentPin = user.code || "1234";
      return `
        <h3 class="text-sm font-bold text-white mb-2 flex items-center gap-2">
          <i class="fa-solid fa-user-circle text-indigo-400"></i> Mon Profil
        </h3>
        <div class="bg-slate-950 p-4 rounded-2xl border border-slate-800 space-y-4">
          <div class="space-y-1">
            <p class="text-[10px] text-slate-500 uppercase font-bold">Informations Compte</p>
            <p class="text-xs text-white">ID : ${user.id}</p>
            <p class="text-xs text-white">Tél : ${user.phone || 'N/A'}</p>
            <div class="flex items-center justify-between mt-2 pt-2 border-t border-slate-800/50">
              <div>
                <p class="text-[10px] text-slate-500 uppercase font-bold">Code PIN Actuel</p>
                <p id="${phoneId}-display-pin" class="text-xs text-indigo-400 font-mono font-bold text-slate-600 italic">Protégé par le système</p>
              </div>
              <button onclick="togglePinVisibility('${phoneId}', '${currentPin}')" class="text-slate-500 hover:text-white transition">
                <i class="fa-solid fa-eye" id="${phoneId}-pin-icon"></i>
              </button>
            </div>
          </div>
          <div class="pt-3 border-t border-slate-800">
            <label class="text-[10px] text-slate-400 uppercase font-bold">Modifier mon Code PIN / Accès</label>
            <input type="password" id="${phoneId}-new-pin" placeholder="Nouveau code" class="w-full mt-1 bg-slate-900 border border-slate-800 rounded-lg p-2 text-xs text-white">
            <button onclick="updateUserPin('${phoneId}', '${user.id}')" class="w-full mt-3 py-2 bg-indigo-600 hover:bg-indigo-500 text-xs font-bold text-white rounded-xl transition">Mettre à jour</button>
          </div>
          <button onclick="changeTab('${phoneId}', 'home')" class="w-full py-1 text-xs text-slate-500 hover:text-white transition">Retour à l'accueil</button>
        </div>
      `;
    }

    function getRoleColorClass(role) {
      switch (role) {
        case "client": return "bg-sky-500/20 text-sky-400 border border-sky-500/30";
        case "merchant": return "bg-amber-500/20 text-amber-400 border border-amber-500/30";
        case "agent": return "bg-emerald-500/20 text-emerald-400 border border-emerald-500/30";
        case "admin": return "bg-rose-500/20 text-rose-400 border border-rose-500/30";
        case "support": return "bg-indigo-500/20 text-indigo-400 border border-indigo-500/30";
        case "regulator": return "bg-fuchsia-500/20 text-fuchsia-400 border border-fuchsia-500/30";
        case "super_agent": return "bg-teal-500/20 text-teal-400 border border-teal-500/30";
        default: return "bg-slate-700 text-slate-300";
      }
    }

    // --- ÉCRAN DE COMPTE SUSPENDU ---
    function renderSuspendedScreen(phoneId, user) {
      return `
        <div class="flex flex-col items-center justify-center text-center py-12 space-y-4">
          <div class="w-16 h-16 rounded-full bg-rose-500/10 border border-rose-500/30 flex items-center justify-center text-rose-500 animate-bounce">
            <i class="fa-solid fa-user-slash text-2xl"></i>
          </div>
          <div>
            <h3 class="text-base font-bold text-white">Compte ${user.status}</h3>
            <p class="text-xs text-slate-400 mt-1 max-w-[220px] mx-auto">
              Votre accès a été restreint. Toute opération financière est bloquée.
            </p>
          </div>
          <button onclick="ouvrirTicketDepuisSuspense('${phoneId}', '${user.id}')" class="w-full py-2 bg-rose-600 hover:bg-rose-500 text-xs font-bold text-white rounded-xl transition shadow-lg shadow-rose-600/20 flex items-center justify-center gap-2">
            <i class="fa-solid fa-headset"></i> Ouvrir un Ticket d'Assistance
          </button>
        </div>
      `;
    }

    function ouvrirTicketDepuisSuspense(phoneId, userId) {
      const user = usersData.find(u => u.id === userId);
      const newTicketId = "T-" + (101 + supportTickets.length);
      
      // Éviter les doublons
      const ticketExiste = supportTickets.find(t => t.userId === userId && t.status === "Ouvert");
      if (ticketExiste) {
        showToast("Un ticket est déjà en cours de traitement pour ce compte.", "warning");
        return;
      }

      supportTickets.push({
        id: newTicketId,
        userId: userId,
        userName: user.name,
        issue: "Contestation de suspension de compte",
        severity: "high",
        status: "Ouvert",
        timestamp: "À l'instant"
      });

      showToast(`Ticket ${newTicketId} ouvert ! Résolvez-le sur le Téléphone Support (Appareil 6).`, "success");
      renderPhone("phone-6"); // Mettre à jour le téléphone du support si affiché
      renderPhone(phoneId);
    }


    // ==========================================
    // 1. MODULE CLIENT
    // ==========================================
    function renderClientScreen(phoneId, user, tab) {
      if (tab === "home") {
        // Liste des transactions de ce client
        const userTransactions = transactions.filter(t => t.from === user.id || t.to === user.id);
        let txListHTML = `<div class="flex justify-between items-center mb-1">
                            <h4 class="text-[10px] font-bold text-slate-400 uppercase">Dernières transactions</h4>
                          </div>`;
        
        if (userTransactions.length === 0) {
          txListHTML += `<p class="text-[10px] text-slate-500 text-center py-2">Aucune transaction.</p>`;
        } else {
          userTransactions.slice(-4).reverse().forEach(tx => {
            const isOutgoing = tx.from === user.id;
            const otherUser = usersData.find(u => u.id === (isOutgoing ? tx.to : tx.from));
            const icon = isOutgoing ? "fa-arrow-up-right-from-square text-rose-400" : "fa-arrow-down-left-from-circle text-emerald-400";
            txListHTML += `

                  <div>
                    <p class="font-semibold text-white truncate max-w-[110px]">${otherUser ? otherUser.name : 'Inconnu'}</p>
                    <p class="text-[9px] text-slate-500">${tx.type}</p>
                  </div>
                </div>
                <span class="font-bold ${isOutgoing ? 'text-rose-400' : 'text-emerald-400'}">${isOutgoing ? '-' : '+'}${tx.amount.toFixed(2)} $</span>

        return `

              <div class="flex items-end gap-2 border-t border-white/10 pt-1">

            <div class="flex justify-between items-center mt-2 text-[9px] text-sky-100/70">
              <span>ID: ${user.id}</span>
              <span class="bg-white/10 px-1.5 py-0.5 rounded">Plafond: ${user.limit} $</span>
            </div>
          </div>

          <!-- Actions Rapides -->
          <div class="grid grid-cols-4 gap-2">
              <button onclick="changeTab('${phoneId}', 'envoi')" class="flex flex-col items-center gap-1">
                <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center text-sky-400 border border-slate-700">
                  <i class="fa-solid fa-paper-plane text-xs"></i>
                </div>
                <span class="text-[9px] font-bold">Envoi</span>
              </button>
              <button onclick="changeTab('${phoneId}', 'retrait')" class="flex flex-col items-center gap-1">
                <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center text-emerald-400 border border-slate-700">
                  <i class="fa-solid fa-money-bill-transfer text-xs"></i>
                </div>
                <span class="text-[9px] font-bold">Retrait</span>
              </button>
              <button onclick="changeTab('${phoneId}', 'marchand')" class="flex flex-col items-center gap-1">
                <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center text-amber-400 border border-slate-700">
                  <i class="fa-solid fa-store text-xs"></i>
                </div>

              </button>
              <button onclick="changeTab('${phoneId}', 'facture')" class="flex flex-col items-center gap-1">

                  <i class="fa-solid fa-file-invoice-dollar text-xs"></i>

                <span class="text-[9px] font-bold">Facture</span>

              <button onclick="changeTab('${phoneId}', 'exchange')" class="flex flex-col items-center gap-1">

                  <i class="fa-solid fa-right-left text-xs"></i>
                </div>
                <span class="text-[9px] font-bold">Change</span>
              </button>
              <button onclick="changeTab('${phoneId}', 'savings')" class="flex flex-col items-center gap-1">

            <i class="fa-solid fa-hand-holding-dollar text-emerald-500"></i> Retrait d'espèces
          </h3>
          <div class="bg-slate-950 p-4 rounded-2xl border border-slate-800 space-y-3">

              <input type="text" id="${phoneId}-agent-phone" placeholder="243..." class="w-full mt-1 bg-slate-900 border border-slate-800 rounded-lg p-2 text-xs text-white">

            <div>
              <label class="text-[9px] text-slate-400 uppercase font-bold">Montant à retirer ($)</label>

              Annuler
            </button>
          </div>
        `;

      else if (tab === "marchand") {
        return `

            <i class="fa-solid fa-store text-amber-500"></i> Payer un Marchand
          </h3>
          <div class="bg-slate-950 p-4 rounded-2xl border border-slate-800 space-y-3">
            <div>
              <label class="text-[10px] text-slate-400 uppercase font-bold">Code Marchand ou Facture</label>
              <input type="text" id="${phoneId}-pay-mcode" placeholder="Saisir code numérique..." class="w-full mt-1 bg-slate-900 border border-slate-800 rounded-lg p-2 text-xs text-white">
            </div>
            <div>
              <label class="text-[10px] text-slate-400 uppercase font-bold">Montant ($)</label>
              <input type="number" id="${phoneId}-pay-mamount" placeholder="0.00" class="w-full mt-1 bg-slate-900 border border-slate-800 rounded-lg p-2 text-xs text-white">

    async function executerVirementClient(phoneId, senderId) {
      const destNum = document.getElementById(`${phoneId}-transfer-num`).value.trim();
      const amount = parseFloat(document.getElementById(`${phoneId}-transfer-amount`).value);
      const sender = usersData.find(u => u.id === senderId);
      const dest = usersData.find(u => u.phone === destNum);

      if (sender.status === "Gelé (Régulateur)") {
        showToast("Action refusée : Vos fonds sont saisis par le Régulateur.", "error");
        return;
      }

      if (!dest) {
        showToast("Numéro de destinataire introuvable.", "error");
        return;
      }

      if (isNaN(amount) || amount <= 0) {
        showToast("Veuillez saisir un montant valide.", "error");
        return;
      }
      if (sender.balance < amount) {
        showToast("Solde insuffisant.", "error");
        return;
      }
      if (amount > sender.limit) {
        showToast("Le montant dépasse votre plafond autorisé.", "error");
        return;
      }

      // Calcul des frais dynamiques
      const systemFee = calculateTransactionFee(amount, true);

      // Traitement Supabase
      const newSenderBal = sender.balance - (amount + systemFee);
      const newDestBal = dest.balance + amount;

      await supabaseClient.from('users').update({ balance_usd: newSenderBal }).eq('id', senderId);
      await supabaseClient.from('users').update({ balance_usd: newDestBal }).eq('id', dest.id);
      
      await supabaseClient.from('transactions').insert([{ 
        from_user_id: senderId, 
        to_user_id: dest.id, 
        amount: amount, 
        type: "virement" 
      }]);

      networkProfits.txFees += systemFee;

      showToast(`Virement de ${amount.toFixed(2)} $ réussi vers ${dest.name} (Frais: ${systemFee.toFixed(2)}$)`, "success");
      
      // Mettre à jour l'ensemble des téléphones affichés (au cas où le destinataire y figure)
      updateGlobalStats();
      renderAllPhones();
    }

    function updatePhoneFeeDisplay(phoneId, type) {
      const amountInput = document.getElementById(`${phoneId}-${type}-amount`);
      const infoDiv = document.getElementById(`${phoneId}-${type}-fee-info`);
      if (!amountInput || !infoDiv) return;
      
      const amount = parseFloat(amountInput.value);
      if (isNaN(amount) || amount <= 0) {
        infoDiv.innerHTML = type === 'withdraw' ? "Les frais de retrait seront calculés ici." : "";
        infoDiv.className = type === 'withdraw' ? "p-2 bg-slate-900 border border-dashed border-slate-700 rounded-lg text-[8px] text-slate-500 text-center" : "";
        return;
      }
      
      const isTransfer = type === 'transfer';
      const fee = calculateTransactionFee(amount, isTransfer);
      const colorClass = isTransfer ? 'text-sky-400' : 'text-emerald-400';
      
      infoDiv.innerHTML = `<span class="${colorClass} font-bold">Frais : ${fee.toFixed(2)} $</span><br><span class="text-[8px]">Total : ${(amount + fee).toFixed(2)} $</span>`;
      infoDiv.className = "p-2 bg-slate-900 border border-dashed border-slate-700 rounded-lg text-[10px] text-slate-400 text-center mt-1";
    }

    async function executeDigitalWithdrawal(phoneId, clientId) {
      const agentPhone = document.getElementById(`${phoneId}-agent-phone`).value.trim();
      const amount = parseFloat(document.getElementById(`${phoneId}-withdraw-amount`).value);
      const clientPin = document.getElementById(`${phoneId}-client-pin`).value.trim();
      const client = usersData.find(u => u.id === clientId);

      if (!agentPhone || !amount || !clientPin) {
        showToast("Veuillez remplir tous les champs.", "error");
        return;
      }

      if (client.code !== clientPin) {
        showToast("Code PIN incorrect.", "error");
        return;
      }

      const agent = usersData.find(u => u.phone === agentPhone && u.role === 'agent');
      if (!agent) {
        showToast("Agent introuvable avec ce numéro.", "error");
        return;
      }

      if (amount > client.limit) {
        showToast("Le montant dépasse le plafond autorisé du client.", "error");
        return;
      }

      const withdrawalFee = calculateTransactionFee(amount, false);
      const totalAmountToDeduct = amount + withdrawalFee;

      if (client.balance < totalAmountToDeduct) {
        showToast("Solde insuffisant (frais inclus).", "error");
        return;
      }

      // Update client balance
      const newClientBalance = client.balance - totalAmountToDeduct;
      const { error: clientUpdateError } = await supabaseClient.from('users').update({ balance_usd: newClientBalance }).eq('id', client.id);

      if (clientUpdateError) {
        showToast("Erreur lors de la mise à jour client.", "error");
        return;
      }

      // Update agent balance
      const newAgentBalance = agent.balance + amount;
      await supabaseClient.from('users').update({ balance_usd: newAgentBalance }).eq('id', agent.id);

      // Record transaction
      await supabaseClient.from('transactions').insert([
        { from_user_id: client.id, to_user_id: agent.id, amount: amount, type: "retrait_digital", fee: withdrawalFee }
      ]);

      networkProfits.txFees += withdrawalFee;
      showToast(`Retrait de ${amount.toFixed(2)}$ réussi via l'agent ${agent.name}. Frais: ${withdrawalFee.toFixed(2)}$`, "success");
      
      updateGlobalStats();
      renderAllPhones();
    }

    async function payerMarchandClient(phoneId, senderId) {
      const mCode = document.getElementById(`${phoneId}-pay-mcode`).value.trim();
      const amount = parseFloat(document.getElementById(`${phoneId}-pay-mamount`).value);
      const sender = usersData.find(u => u.id === senderId);
      const merchant = usersData.find(u => u.merchantCode === mCode);

      if (!merchant) {
        showToast("Code Marchand incorrect.", "error");
        return;
      }
      if (sender.balance < amount) {
        showToast("Solde insuffisant.", "error");
        return;
      }

      const newSenderBal = sender.balance - amount;
      const newMerchantBal = merchant.balance + amount;

      await supabaseClient.from('users').update({ balance_usd: newSenderBal }).eq('id', senderId);
      await supabaseClient.from('users').update({ balance_usd: newMerchantBal }).eq('id', merchant.id);

      await supabaseClient.from('transactions').insert([{ 
        from_user_id: senderId, 
        to_user_id: merchant.id, 
        amount: amount, 
        type: "achat" 
      }]);

      showToast(`Paiement de ${amount} $ à ${merchant.name} réussi.`, "success");
      renderAllPhones();
    }

    function executerChangeClient(phoneId, userId) {
      const direction = document.getElementById(`${phoneId}-ex-direction`).value;
      const amount = parseFloat(document.getElementById(`${phoneId}-ex-amount`).value);
      const user = usersData.find(u => u.id === userId);

      if (isNaN(amount) || amount <= 0) {
        showToast("Montant invalide.", "error");
        return;
      }

      let profitCDF = 0;

      if (direction === "usd_to_cdf") {
        // Le client vend du USD (Le système achète au taux bas RATE_BUY)
        if (user.balance < amount) {
          showToast("Solde Dollars insuffisant.", "error");
          return;
        }
        let converted = amount * RATE_BUY;
        // Bénéfice = (Valeur Marché - Valeur Achat)
        profitCDF = (amount * RATE_MARKET) - (amount * RATE_BUY);
        
        user.balance -= amount;
        user.balanceCDF = (user.balanceCDF || 0) + converted;
        showToast(`Change réussi : -${amount}$ → +${converted.toLocaleString()} FC`, "success");
      } else {
        // Le client achète du USD (Le système vend au taux haut RATE_SELL)
        if ((user.balanceCDF || 0) < amount) {
          showToast("Solde Francs Congolais insuffisant.", "error");
          return;
        }
        let converted = amount / RATE_SELL;
        // Bénéfice = Ce que le client a payé - Valeur réelle du USD donné
        profitCDF = amount - (converted * RATE_MARKET);
        user.balanceCDF -= amount;
        user.balance = (user.balance || 0) + converted;
        showToast(`Change réussi : -${amount.toLocaleString()} FC → +${converted.toFixed(2)}$`, "success");
      }

      transactions.push({
        id: "EX-" + Date.now(),
        from: userId,
        to: userId,
        amount: amount,
        type: "Opération de Change",
        date: "Aujourd'hui"
      });

      networkProfits.exchange += profitCDF;
      updateGlobalStats();
      
      renderPhone(phoneId);
    }

    function gererEpargne(phoneId, userId, type) {
      const currency = document.getElementById(`${phoneId}-sv-currency`).value;
      const amount = parseFloat(document.getElementById(`${phoneId}-sv-amount`).value);
      const user = usersData.find(u => u.id === userId);

      if (isNaN(amount) || amount <= 0) {
        showToast("Montant invalide.", "error");
        return;
      }

      if (type === 'deposit') {
        const balanceField = currency === "USD" ? "balance" : "balanceCDF";
        const savingsField = currency === "USD" ? "savingsUSD" : "savingsCDF";

        if ((user[balanceField] || 0) < amount) {
          showToast("Solde insuffisant pour épargner.", "error");
          return;
        }
        user[balanceField] -= amount;
        user[savingsField] = (user[savingsField] || 0) + amount;
        showToast(`Dépôt dans le coffre-fort réussi (${amount} ${currency}).`, "success");
      } else {
        const balanceField = currency === "USD" ? "balance" : "balanceCDF";
        const savingsField = currency === "USD" ? "savingsUSD" : "savingsCDF";

        if ((user[savingsField] || 0) < amount) {
          showToast("Fonds insuffisants dans le coffre-fort.", "error");
          return;
        }
        user[savingsField] -= amount;
        user[balanceField] = (user[balanceField] || 0) + amount;
        showToast(`Retrait du coffre-fort réussi (${amount} ${currency}).`, "success");
      }

      renderPhone(phoneId);
    }

    function simulerScanQRCode(phoneId, userId) {
      showToast("Ouverture de la caméra pour scanner le QR Code...", "info");

      // Simulate QR code scanning by prompting the user for input
      const scannedCode = prompt("Veuillez entrer le code scanné (Code Marchand ou Facture):");

      if (!scannedCode) {
        showToast("Scan annulé ou code vide.", "warning");
        return;
      }

      // Try to find a merchant by merchantCode
      const merchant = usersData.find(u => u.role === "merchant" && u.merchantCode === scannedCode);

      if (merchant) {
        const amountStr = prompt(`Code Marchand "${merchant.name}" détecté. Veuillez entrer le montant à payer en USD:`);
        const amount = parseFloat(amountStr);

        if (isNaN(amount) || amount <= 0) {
          showToast("Montant invalide pour le paiement.", "error");
          return;
        }

        // Populate the input fields and call the existing payment function
        document.getElementById(`${phoneId}-pay-mcode`).value = scannedCode;
        document.getElementById(`${phoneId}-pay-mamount`).value = amount;
        payerMarchandClient(phoneId, userId);

      } else {
        // Try to find a pending invoice by billCode
        const facture = facturesEnAttente.find(f => f.code === scannedCode);

        if (facture) {
          document.getElementById(`${phoneId}-pay-mcode`).value = scannedCode;
          payerFactureClient(phoneId, userId);
        } else {
          showToast("QR Code non reconnu comme un code marchand ou une facture valide.", "error");
        }
      }
    }

    function ajouterProduitCommercant(phoneId, merchantId) {
      const name = document.getElementById(`${phoneId}-item-name`).value.trim();
      const price = parseFloat(document.getElementById(`${phoneId}-item-price`).value);
      const merchant = usersData.find(u => u.id === merchantId);

      if (!name || isNaN(price) || price <= 0) {
        showToast("Informations de produit incorrectes.", "error");
        return;
      }

      merchant.items.push({
        id: Date.now(),
        name: name,
        price: price
      });

      showToast(`Article "${name}" ajouté avec succès.`, "success");
      changeTab(phoneId, "home");
    }
    
    function genererFactureBoutique(phoneId, merchantId) {
      const amount = parseFloat(document.getElementById(`${phoneId}-bill-amount`).value);
      if(isNaN(amount) || amount <= 0) return;
      const billCode = Math.floor(100000 + Math.random() * 900000).toString();
      facturesEnAttente.push({ code: billCode, amount: amount, merchantId: merchantId });
      
      document.getElementById(`${phoneId}-qr-area`).classList.remove('hidden');
      document.getElementById(`${phoneId}-bill-code-display`).innerText = billCode;
      
      showToast(`Facture de ${amount}$ créée. Code: ${billCode}`, "info");
    }

    function genererVenteDirecte(phoneId, amount, itemName) {
      // Pour simuler la vente directe d'un produit, on propose de débiter le client 1 ou client 2
      const merchant = usersData.find(u => u.id === phoneAssignments[phoneId]);
      
      // On va débiter automatiquement un client qui a assez d'argent pour la simulation
      const client = usersData.find(u => u.role === "client" && u.status === "Actif" && u.balance >= amount);

      if (!client) {
        showToast("Aucun client actif simulé n'a le solde nécessaire pour cet achat.", "warning");
        return;
      }

      // Transaction
      client.balance -= amount;
      merchant.balance += amount;

      transactions.push({
        id: "TX-" + (1001 + transactions.length),
        from: client.id,
        to: merchant.id,
        amount: amount,
        type: `achat (${itemName})`,
        date: "Aujourd'hui"
      });
      showToast(`Achat de ${amount.toFixed(2)} $ complété ! Débité de ${client.name}`, "success");
      renderAllPhones();
    }
    
    function payerFactureClient(phoneId, senderId) {
      const billCode = document.getElementById(`${phoneId}-pay-mcode`).value.trim();
      const facture = facturesEnAttente.find(f => f.code === billCode);
      const sender = usersData.find(u => u.id === senderId);
      
      if(!facture) { showToast("Code de facture invalide ou expiré.", "error"); return; }
      if(sender.balance < facture.amount) { showToast("Solde insuffisant.", "error"); return; }
      
      const merchant = usersData.find(u => u.id === facture.merchantId);
      sender.balance -= facture.amount;
      merchant.balance += facture.amount;
      
      transactions.push({
        id: "BILL-" + billCode,
        from: senderId,
        to: merchant.id,
        amount: facture.amount,
        type: "Paiement Facture",
        date: "Aujourd'hui"
      });
      
      facturesEnAttente = facturesEnAttente.filter(f => f.code !== billCode);
      showToast(`Facture payée : ${facture.amount}$ à ${merchant.name}`, "success");
      renderAllPhones();
    }

    async function validerOperationAgent(phoneId, type) {
      const agent = usersData.find(u => u.id === phoneAssignments[phoneId]);
      
      if (type === 'deposit') {
        const clientId = document.getElementById(`${phoneId}-deposit-client`).value;
        const amount = parseFloat(document.getElementById(`${phoneId}-deposit-amount`).value);
        const client = usersData.find(u => u.id === clientId);

        if (isNaN(amount) || amount <= 0) {
          showToast("Veuillez saisir un montant de dépôt valide.", "error");
          return;
        }
        
        const newClientBal = client.balance + amount;
        const newAgentBal = agent.balance + amount;

        // Action de dépôt physique : L'agent récolte les espèces et augmente le solde numérique du client
        await supabaseClient.from('users').update({ balance_usd: newClientBal }).eq('id', clientId);
        await supabaseClient.from('users').update({ balance_usd: newAgentBal }).eq('id', agent.id);
        client.balance = newClientBal;
        agent.balance = newAgentBal;
        // Commission agent (1.5% du montant)
        const comm = amount * 0.015;
        agent.commission += comm;
        showToast(`Dépôt physique réussi ! +${amount}$ crédités à ${client.name}. Commission : +${comm.toFixed(2)}$`, "success");
      } 
      
      else if (type === 'withdraw') {
        const clientId = document.getElementById(`${phoneId}-withdraw-client`).value;
        const amount = parseFloat(document.getElementById(`${phoneId}-withdraw-amount`).value);
        const client = usersData.find(u => u.id === clientId);

        if (isNaN(amount) || amount <= 0) {
          showToast("Montant invalide.", "error");
          return;
        }
        if (client.balance < amount) {
          showToast("Le solde du client est insuffisant pour ce retrait.", "error");
          return;
        }
        if (amount > client.limit) {
          showToast("Opération refusée : Le montant dépasse le plafond du client.", "error");
          return;
        }

        const newClientBal = client.balance - amount;
        const newAgentBal = agent.balance - amount;

        // Action de retrait : L'agent décompte le solde numérique du client et donne du cash physique
        await supabaseClient.from('users').update({ balance_usd: newClientBal }).eq('id', clientId);
        await supabaseClient.from('users').update({ balance_usd: newAgentBal }).eq('id', agent.id);
        client.balance = newClientBal;
        agent.balance = newAgentBal;
        
        // Commission agent (1% du montant)
        const comm = amount * 0.01;
        agent.commission += comm;
        showToast(`Retrait cash de ${amount}$ autorisé pour ${client.name}. Commission : +${comm.toFixed(2)}$`, "success");
      }
      renderAllPhones();
    }

    async function creerClientExpress(phoneId) {
      const name = document.getElementById(`${phoneId}-new-name`).value.trim();
      let phoneInput = document.getElementById(`${phoneId}-new-phone`).value.trim();
      const deposit = parseFloat(document.getElementById(`${phoneId}-new-deposit`).value);
      const doc = document.getElementById(`${phoneId}-new-doc`).value.trim();
      const photo = document.getElementById(`${phoneId}-new-photo-url`).value.trim();
      const agent = usersData.find(u => u.id === phoneAssignments[phoneId]);

      if (!name || !phoneInput || !doc || !photo || isNaN(deposit) || deposit < 0) {
        showToast("Champs manquants ou invalides.", "error");
        return;
      }

      // Gestion du numéro personnalisé ou auto
      if (phoneInput) {
        const exists = usersData.find(u => u.phone === phoneInput);
        if (exists) {
          showToast("Ce numéro est déjà attribué. Choisissez-en un autre.", "error");
          return;
        }
      } else {
        lastPhoneSequence++;
        phoneInput = lastPhoneSequence.toString();
      }

      // Vérifier si le numéro de téléphone existe déjà
      const phoneExists = usersData.some(u => u.phone === phoneInput);
      if (phoneExists) {
        showToast("Ce numéro de téléphone est déjà utilisé par un autre compte.", "error");
        return;
      }

      const newUser = {
        name: name,
        role: "client",
        balance_usd: deposit,
        phone: phoneInput,
        status: "En attente d'approbation", // Initial status for KYC
        limit: 1500, // Plafond par défaut enregistré en DB
        kyc_doc: doc,
        photo_url: photo,
        managedBy: agent.id
      };

      const { error } = await supabaseClient.from('users').insert([newUser]);
      if (!error) {
        agent.commission += 5.00;
        showToast(`Compte de ${name} créé et enregistré dans la base de données.`, "success");
        const updated = await fetchUsersFromSupabase();
        if (updated) usersData = updated;
        changeTab(phoneId, "home");
      } else {
        showToast("Erreur lors de l'enregistrement du nouveau client.", "error");
      }
    }

    // Fonction maîtresse pour résoudre tous les soucis d'un coup ou au cas par cas
    function resoudreTicket(phoneId, ticketId) {
      const ticket = supportTickets.find(t => t.id === ticketId);
      if (!ticket) return;

      const user = usersData.find(u => u.id === ticket.userId);

      // Traiter intelligemment l'incident en fonction de la situation
      if (user.status === "Suspendu") {
        user.status = "Actif"; // Rétablir le compte s'il était suspendu
        showToast(`[Support] Compte de ${user.name} rétabli et réactivé !`, "success");
      }

      // Si le problème concerne le plafond, on l'augmente directement pour lui rendre service
      if (ticket.issue.includes("Plafond") && user.limit !== undefined) {
        user.limit += 2000;
        showToast(`[Support] Plafond de ${user.name} élevé à ${user.limit} $ !`, "success");
      }

      // S'il s'agit d'un échec de virement ou solde, on lui offre un geste commercial bonus symbolique de 10 $
      if (ticket.issue.includes("Échec") && user.balance !== undefined) {
        user.balance += 10.00;
        showToast(`[Support] Geste de 10.00 $ crédité à ${user.name} !`, "success");
        showToast(`[Support] Geste de 10.00 $ crédité à ${user.name} !`, "success");
      }

      ticket.status = "Résolu";
      showToast(`Ticket ${ticketId} marqué résolu avec succès !`, "success");

      // Mettre à jour tous les téléphones (les changements s'appliquent immédiatement partout)
      renderAllPhones();
    }

    function simulerAlerteSupport() {
      // Simule un nouvel appel client entrant
      const randomClient = usersData.filter(u => u.role === "client")[Math.floor(Math.random() * 3)];

      supportTickets.push({

      }
      const regulator = usersData.find(u => u.id === regulatorId);

      if (pin !== (regulator.code || "0000")) {

      } else {
        regulator.balanceCDF = (regulator.balanceCDF || 0) + amount;
      }
      
      transactions.push({
        id: "MINT-" + Math.floor(1000 + Math.random() * 9000),
        from: "BCC",
        to: regulatorId,
        amount: amount,
        currency: currency,
        type: "frapper_monnaie",
        date: "Aujourd'hui"
      });
      
      showToast(`Émission de ${amount.toLocaleString()} ${currency} effectuée !`, "success");

    }

    function validerFloatRegulateur(phoneId, regulatorId) {
      const destId = document.getElementById(`${phoneId}-float-dest`).value;
      const amount = parseFloat(document.getElementById(`${phoneId}-float-amount`).value);
      const currency = document.getElementById(`${phoneId}-float-currency`).value;

      if (isNaN(amount) || amount <= 0) {
        showToast("Montant invalide.", "error");
        return;
      }
      const regulator = usersData.find(u => u.id === regulatorId);
      const dest = usersData.find(u => u.id === destId);

      const pin = prompt("Veuillez saisir votre code PIN pour confirmer l'envoi de float :");
      if (pin !== (regulator.code || "0000")) {
        showToast("Code PIN incorrect. Opération annulée.", "error");
        return;
      }

      const currentTreasury = (currency === "USD") ? regulator.balance : regulator.balanceCDF;
      
      if (currentTreasury < amount) {
        showToast("Fonds insuffisants dans le Trésor.", "error");
        return;
      }
      if (currency === "USD") {
        regulator.balance -= amount;
        dest.balance += amount;
      } else {
        regulator.balanceCDF -= amount;
        dest.balanceCDF = (dest.balanceCDF || 0) + amount;
      }
      
      transactions.push({
        id: "FLT-" + Math.floor(1000 + Math.random() * 9000),
        from: regulatorId,
        to: destId,
        amount: amount,
        currency: currency,
        type: "injection_float",
        date: "Aujourd'hui"
      });
      
      showToast(`Float de ${amount.toLocaleString()} ${currency} injecté vers ${dest.name}.`, "success");
      changeTab(phoneId, 'home');
      renderAllPhones();
    }

    async function allouerFloat(phoneId, superAgentId) {
      const targetAgentId = document.getElementById(`${phoneId}-float-agent`).value;
      const amount = parseFloat(document.getElementById(`${phoneId}-float-amount`).value);
      const currency = document.getElementById(`${phoneId}-float-currency`).value;
      
      const superAgent = usersData.find(u => u.id === superAgentId);
      const targetAgent = usersData.find(u => u.id === targetAgentId);

      const pin = prompt("Veuillez saisir votre code PIN Master pour confirmer l'allocation :");
      if (pin !== (superAgent.code || "9999")) {
        showToast("Code PIN incorrect. Opération annulée.", "error");
        return;
      }

      if (isNaN(amount) || amount <= 0) {
        showToast("Montant invalide.", "error");
        return;
      }
      const currentTreasury = (currency === "USD") ? superAgent.balance : superAgent.balanceCDF;
      if (currentTreasury < amount) {
        showToast("Vos liquidités master sont insuffisantes.", "error");
        return;
      }

      if (currency === "USD") {
        await supabaseClient.from('users').update({ balance_usd: superAgent.balance - amount }).eq('id', superAgentId);
        await supabaseClient.from('users').update({ balance_usd: targetAgent.balance + amount }).eq('id', targetAgentId);
      } else {
        await supabaseClient.from('users').update({ balance_cdf: superAgent.balanceCDF - amount }).eq('id', superAgentId);
        await supabaseClient.from('users').update({ balance_cdf: (targetAgent.balanceCDF || 0) + amount }).eq('id', targetAgentId);
      }

      // Commission bonus pour le super agent sur chaque allocation (0.5%)
      const bonus = amount * 0.005;
      superAgent.commission += bonus;

      showToast(`Allocation de ${amount.toLocaleString()} ${currency} envoyée à ${targetAgent.name}. Bonus : +${bonus.toFixed(2)}$`, "success");
      
      await supabaseClient.from('transactions').insert([{ 
        from_user_id: superAgentId, 
        to_user_id: targetAgentId, 
        amount: amount, 
        type: "allocation_float" 
      }]);

      changeTab(phoneId, "home");
      renderAllPhones();
    }
    
    function rejectClientBySuperAgent(phoneId, superAgentId, clientId) {
      const rejectionReason = document.getElementById(`${phoneId}-rejection-reason`).value.trim();
      if (!rejectionReason) {
        showToast("Veuillez fournir un motif de rejet.", "error");
        return;
      }

      const client = usersData.find(u => u.id === clientId);
      if (client) {
        client.status = "Rejeté";
        client.rejectionReason = rejectionReason;
        client.rejectedBy = superAgentId;

        const creatingAgent = usersData.find(u => u.id === client.managedBy);
        showToast(`Client ${client.name} rejeté par Super Agent. Motif: ${rejectionReason}. L'agent ${creatingAgent?.name || 'inconnu'} a été notifié.`, "error");
      } else {
        showToast("Client introuvable pour le rejet.", "error");
      }
      delete tempTargetUserForRejection[phoneId];
      changeTab(phoneId, "approvals");
      renderAllPhones();
    }

    function exportHistoryPDF(userId) {
      const user = usersData.find(u => u.id === userId);
      if (user.role === 'client') {
        showToast("L'exportation PDF est réservée aux comptes professionnels et administratifs.", "error");
        return;
      }
      const userTx = transactions.filter(t => t.from === userId || t.to === userId);
      
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.setFontSize(18); doc.text("Relevé de Transactions", 20, 20);
      doc.setFontSize(12); doc.text(`Titulaire : ${user.name} (${user.role})`, 20, 30);
      doc.text(`Solde Actuel : ${user.balance.toFixed(2)}$ / ${user.balanceCDF.toLocaleString()} FC`, 20, 40);
      
      let y = 60;
      userTx.reverse().forEach(tx => { doc.text(`${tx.date} - ${tx.type} : ${tx.amount.toFixed(2)}$ (ID: ${tx.id})`, 20, y); y += 10; });
      doc.save(`Historique_${user.name}.pdf`);
      showToast("Génération du PDF réussie !", "success");
    }

      }, 1500);
    }

    function simulerUploadImage(phoneId, inputIdSuffix) {
      showToast("Ouverture du gestionnaire de fichiers...", "info");
      setTimeout(() => {
        const imageUrl = "https://api.dicebear.com/7.x/identicon/svg?seed=" + Math.random();
        const previewImg = document.getElementById(`${phoneId}-${inputIdSuffix}-preview`);
        const hiddenInput = document.getElementById(`${phoneId}-${inputIdSuffix}-url`);
        const placeholder = document.getElementById(`${phoneId}-${inputIdSuffix}-placeholder`);

        if (previewImg && hiddenInput) {
          previewImg.src = imageUrl;
          previewImg.classList.remove('hidden');
          if (placeholder) placeholder.classList.add('hidden');
          hiddenInput.value = imageUrl;
          showToast("Fichier sélectionné avec succès !", "success");
        }
      }, 1000);
    }
  </script>
</body>
