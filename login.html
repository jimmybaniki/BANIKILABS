<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin | BANIKI LABS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --gold: #FFD700;
            --bg-dark: #080808;
            --bg-card: #121212;
            --text-main: #f9fafb;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            transition: background-color 0.4s ease;
        }

        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 2.5rem;
            padding: 3rem;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-circle {
            width: 80px;
            height: 80px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
        }

        .logo-circle span {
            color: black;
            font-weight: black;
            font-size: 2rem;
            letter-spacing: -0.05em;
        }

        .logo-section h1 {
            font-size: 1.875rem;
            font-weight: 900;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
        }

        .logo-section p {
            color: #9ca3af;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            font-size: 0.875rem;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-main);
        }

        .form-group input {
            width: 100%;
            padding: 1rem 1.25rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 1.25rem;
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-group input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            font-size: 0.875rem;
        }

        .remember-forgot label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            margin: 0;
        }

        .remember-forgot a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .remember-forgot a:hover {
            color: #ffd700;
        }

        input[type="checkbox"] {
            width: 1rem;
            height: 1rem;
            cursor: pointer;
            accent-color: var(--gold);
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: var(--gold);
            color: black;
            border: none;
            border-radius: 1.25rem;
            font-weight: 900;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 2rem 0;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.875rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 215, 0, 0.1);
        }

        .signup-link {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.875rem;
        }

        .signup-link a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 700;
            transition: color 0.2s ease;
        }

        .signup-link a:hover {
            color: #ffd700;
        }

        .back-link {
            position: absolute;
            top: 2rem;
            left: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }

        .back-link:hover {
            color: var(--gold);
            gap: 0.75rem;
        }

        .error-message {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 1rem;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .success-message {
            display: none;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
            padding: 1rem;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <a href="index.html" class="back-link">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            Retour
        </a>

        <div class="login-card">
            <div class="logo-section">
                <div class="logo-circle">
                    <span>BL</span>
                </div>
                <h1>Connexion <span style="color: var(--gold);">Admin</span></h1>
                <p>Accédez à votre espace de gestion</p>
            </div>

            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Adresse Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="admin@banikilabs.com" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="••••••••" 
                        required
                    >
                </div>

                <div class="remember-forgot">
                    <label>
                        <input type="checkbox" id="remember" name="remember">
                        Se souvenir de moi
                    </label>
                    <a href="#forgot">Mot de passe oublié ?</a>
                </div>

                <button type="submit" class="login-btn">
                    Connexion
                </button>
            </form>

            <div class="divider">OU</div>

            <div class="signup-link">
                Besoin d'aide ? <a href="mailto:admin@banikilabs.com">Contactez le support</a>
            </div>
        </div>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');
            const successMsg = document.getElementById('successMessage');

            // Réinitialiser les messages
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            // Validation basique
            if (!email || !password) {
                errorMsg.innerHTML = '⚠️ Veuillez remplir tous les champs';
                errorMsg.style.display = 'block';
                return;
            }

            // Simuler une connexion réussie
            successMsg.innerHTML = '✓ Connexion réussie. Redirection...';
            successMsg.style.display = 'block';

            // Redirection après 1.5 secondes
            setTimeout(() => {
                window.location.href = 'admin.html';
            }, 1500);
        }

        // Pré-remplissage pour démonstration
        window.addEventListener('load', () => {
            const savedEmail = localStorage.getItem('adminEmail');
            if (savedEmail) {
                document.getElementById('email').value = savedEmail;
                document.getElementById('remember').checked = true;
            }
        });

        // Sauvegarder l'email si "Se souvenir" est coché
        document.getElementById('loginForm').addEventListener('submit', function() {
            if (document.getElementById('remember').checked) {
                localStorage.setItem('adminEmail', document.getElementById('email').value);
            } else {
                localStorage.removeItem('adminEmail');
            }
        });
    </script>
</body>
</html>
