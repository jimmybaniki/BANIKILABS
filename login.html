<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Simulateur Multi-Appareils</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Supabase Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center font-sans p-4 transition-colors duration-500" id="login-body">
  <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl ring-1 ring-white/10">
    <div class="text-center mb-8">
      <div class="flex flex-col items-center gap-3 mb-6">
        <div class="w-16 h-16 bg-sky-600 flex items-center justify-center rounded-full shadow-[0_0_25px_rgba(2,132,199,0.4)]">
          <i class="fa-solid fa-mobile-screen-button text-white text-2xl"></i>
        </div>
        <span class="font-extrabold text-2xl tracking-tight uppercase">Baniki <span class="text-sky-500">Mobile</span></span>
      </div>
      <h1 class="text-sm font-bold text-slate-500 uppercase tracking-widest">Portail Utilisateur</h1>
      <p class="text-sm text-slate-400 mt-2">Accédez à votre compte via votre numéro</p>
    </div>

    <form id="login-form" class="space-y-6">
      <div>
        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Numéro de téléphone</label>
        <div class="relative">
          <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
          <input type="text" id="phone" required class="w-full bg-slate-950 border border-slate-800 rounded-xl py-3 pl-11 pr-4 text-sm text-white focus:outline-none focus:ring-2 focus:ring-sky-500 transition" placeholder="Saisir numéro">
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Code PIN Secret</label>
        <div class="relative">
          <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
          <input type="password" id="pin" required class="w-full bg-slate-950 border border-slate-800 rounded-xl py-3 pl-11 pr-4 text-sm text-white focus:outline-none focus:ring-2 focus:ring-sky-500 transition" placeholder="••••">
        </div>
      </div>

      <div id="error-message" class="hidden bg-rose-950/50 border border-rose-800 text-rose-300 text-xs p-3 rounded-lg flex items-center gap-2">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span>Identifiants invalides. Veuillez réessayer.</span>
      </div>

      <button type="submit" id="login-btn" class="w-full py-3 bg-sky-600 hover:bg-sky-500 text-white font-bold rounded-xl shadow-lg transition-all">
        Accéder à mon espace
      </button>
    </form>

    <div class="mt-8 pt-6 border-t border-slate-800 text-center">
      <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Propriété de BanikiLabs © 2024</p>
    </div>
  </div>

  <script>
    // Supabase Client Initialization
    const SUPABASE_URL = 'https://fcbsmfcbzyyeksqfajdu.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjYnNtZmNienl5ZWtzcWZhamR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MjQyNDQsImV4cCI6MjA5NjUwMDI0NH0.NoPwKmQ8sbH1o-mt-O2yQgm7P1Bv0BRoeiCa8kJ1C0E';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const phoneSaisi = document.getElementById('phone').value.trim();
      const pinSaisi = document.getElementById('pin').value.trim();
      const errorEl = document.getElementById('error-message');
      const formEl = document.getElementById('login-form');

      errorEl.classList.add('hidden');

      // Recherche de l'utilisateur dans la table 'users' par téléphone et PIN
      const { data: user, error } = await supabaseClient
        .from('users')
        .select('*')
        .eq('phone', phoneSaisi)
        .eq('pin_code', pinSaisi)
        .single();

      if (error || !user) {
        errorEl.querySelector('span').innerText = "Numéro de téléphone ou PIN incorrect.";
        errorEl.classList.remove('hidden');
        formEl.classList.add('animate-shake');
        setTimeout(() => formEl.classList.remove('animate-shake'), 400);
      } else {
        // Authentification réussie (locale au simulateur)
        // On stocke l'ID utilisateur pour les pages suivantes
        sessionStorage.setItem('currentUserId', user.id);
        sessionStorage.setItem('currentUserRole', user.role); // Store role for potential future checks

        // Redirection intelligente selon le rôle
        const roleRoutes = {
          'client': 'client.html',
          'agent': 'agent.html',
          'merchant': 'marchand.html',
          'super_agent': 'superagent.html'
        };
        
        window.location.href = roleRoutes[user.role] || 'client.html';
      }
    });
  </script>
</body>
</html>
