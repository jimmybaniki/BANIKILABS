<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Créateur de CV Pro - Adaptatif & Moderne</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- html2pdf.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@300;400;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            /* Variables de couleur dynamiques pour le CV */
            --cv-primary: #eab308; /* Default Yellow */
            --cv-text: #111827;
        }

        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; -webkit-tap-highlight-color: transparent;}
        
        /* Custom Scrollbar pour un look premium */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Styles spécifiques pour les CVs */
        .cv-container { 
            width: 210mm; 
            min-height: 297mm; /* Format A4 */
            background: white; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); 
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        /* Style Français */
        .cv-fr { font-family: 'Roboto', sans-serif; }
        .cv-fr .header { border-bottom: 4px solid var(--cv-primary); padding-bottom: 1rem; margin-bottom: 1.5rem; display: flex; gap: 2rem; align-items: center;}
        .cv-fr .section-title { color: #000; border-bottom: 2px solid var(--cv-primary); margin-bottom: 0.75rem; padding-bottom: 0.25rem; font-weight: 700; text-transform: uppercase; font-size: 1.1rem; display: flex; align-items: center; gap: 8px;}
        .cv-fr .photo-container { width: 120px; height: 120px; border-radius: 50%; overflow: hidden; border: 3px solid var(--cv-primary); flex-shrink: 0; background: #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.1);}
        .cv-fr .photo-container img { width: 100%; height: 100%; object-fit: cover; }
        .cv-fr .primary-text { color: var(--cv-primary); }

        /* Style Américain (Resume) */
        .cv-us { font-family: 'Inter', sans-serif; color: #111827; line-height: 1.5; }
        .cv-us .header { text-align: center; border-bottom: 2px solid #111827; padding-bottom: 1.25rem; margin-bottom: 1.25rem; }
        .cv-us .header h1 { font-size: 2.25rem; font-weight: 700; margin-bottom: 0.25rem; letter-spacing: -0.02em; text-transform: uppercase; color: var(--cv-primary); }
        .cv-us .header-contact { font-size: 0.85rem; color: #374151; display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 8px;}
        .cv-us .section-title { font-size: 1.05rem; font-weight: 700; text-transform: uppercase; border-bottom: 1px solid var(--cv-primary); margin-bottom: 0.75rem; padding-bottom: 0.2rem; margin-top: 1.25rem; letter-spacing: 0.05em; color: var(--cv-primary);}
        .cv-us .photo-container { display: none; } /* Pas de photo standardisée sur CV US */

        /* Utilitaires */
        .cv-item { margin-bottom: 1rem; page-break-inside: avoid;}
        .cv-item-header { display: flex; justify-content: space-between; align-items: baseline; font-weight: 600;}
        .cv-item-subtitle { font-style: italic; color: #4b5563; margin-bottom: 0.25rem; }
        .cv-list { list-style-type: disc; padding-left: 1.5rem; margin-top: 0.5rem; }
        .cv-list li { margin-bottom: 0.25rem; line-height: 1.4;}

        /* Loader */
        .loader { border: 2px solid rgba(255,255,255,0.3); border-top: 2px solid #fff; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle;}
        .loader-dark { border-color: rgba(0,0,0,0.2); border-top-color: #000; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Effets de formulaire */
        .input-group input, .input-group textarea { transition: all 0.2s; }
        .input-group input:focus, .input-group textarea:focus { transform: translateY(-1px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        
        /* Grille de fond pour l'aperçu */
        .bg-grid { background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; }

        /* Pour l'impression PDF */
        @media print {
            body { background: white; }
            .no-print { display: none !important; }
            .cv-container { box-shadow: none !important; margin: 0; width: 100% !important; height: auto; transform: none !important; }
            #cv-scale-wrapper { transform: none !important; margin: 0 !important; width: 100% !important; }
            #cv-preview-area { padding: 0; margin: 0; background: white; }
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-gray-800">

    <!-- Navbar -->
    <nav class="bg-gray-900 border-b border-gray-800 px-4 md:px-6 py-3 flex justify-between items-center z-20 shadow-lg no-print">
        <div class="flex items-center gap-2">
            <div class="bg-gradient-to-br from-yellow-400 to-orange-500 p-1.5 rounded-lg shadow-sm">
                <i data-lucide="file-text" class="text-white w-5 h-5"></i>
            </div>
            <h1 class="text-lg md:text-xl font-bold text-white hidden sm:block tracking-wide">CV MasterPro</h1>
        </div>
        
        <div class="flex gap-2 md:gap-4 items-center flex-1 justify-end">
            <!-- Sélecteur de couleur (Nouveau) -->
            <div class="hidden md:flex items-center gap-1 bg-gray-800 p-1 rounded-lg border border-gray-700">
                <button onclick="setTheme('#eab308')" class="w-6 h-6 rounded-full bg-yellow-500 hover:scale-110 transition-transform shadow-sm"></button>
                <button onclick="setTheme('#3b82f6')" class="w-6 h-6 rounded-full bg-blue-500 hover:scale-110 transition-transform shadow-sm"></button>
                <button onclick="setTheme('#10b981')" class="w-6 h-6 rounded-full bg-emerald-500 hover:scale-110 transition-transform shadow-sm"></button>
                <button onclick="setTheme('#ec4899')" class="w-6 h-6 rounded-full bg-pink-500 hover:scale-110 transition-transform shadow-sm"></button>
                <button onclick="setTheme('#8b5cf6')" class="w-6 h-6 rounded-full bg-purple-500 hover:scale-110 transition-transform shadow-sm"></button>
            </div>

            <!-- Styles FR/US -->
            <div class="flex bg-gray-800 p-1 rounded-lg border border-gray-700">
                <button id="btn-style-fr" class="px-3 md:px-4 py-1.5 text-xs md:text-sm font-medium rounded-md bg-white shadow-sm text-black transition-all">FR Style</button>
                <button id="btn-style-us" class="px-3 md:px-4 py-1.5 text-xs md:text-sm font-medium rounded-md text-gray-400 hover:text-white transition-all">US Style</button>
            </div>
            
            <!-- Sélecteur de langue -->
            <select id="lang-selector" class="bg-gray-800 text-white border border-gray-700 text-xs md:text-sm rounded-md px-2 py-1.5 outline-none focus:border-gray-500 font-medium cursor-pointer">
                <option value="fr">🇫🇷</option>
                <option value="en">🇬🇧</option>
            </select>

            <!-- Export -->
            <button id="btn-download" class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white px-3 md:px-4 py-1.5 rounded-lg text-sm font-bold flex items-center gap-2 transition-all shadow-md">
                <i data-lucide="download" class="w-4 h-4"></i>
                <span class="hidden md:inline">Exporter PDF</span>
            </button>
        </div>
    </nav>

    <!-- Main Content Layout (Responsive Split) -->
    <div class="flex-1 flex overflow-hidden relative">
        
        <!-- Panneau de gauche : Formulaire -->
        <div id="edit-panel" class="w-full lg:w-5/12 xl:w-1/3 bg-white border-r border-gray-200 overflow-y-auto no-print flex flex-col z-10 transition-transform duration-300">
            <div class="p-5 md:p-6 space-y-8 flex-1">
                
                <!-- Paramètres rapides mobiles (Thème + Photo) -->
                <div class="lg:hidden flex justify-between items-center bg-gray-50 p-3 rounded-lg border border-gray-200 mb-4">
                    <span class="text-sm font-bold text-gray-700">Thème :</span>
                    <div class="flex items-center gap-2">
                        <button onclick="setTheme('#eab308')" class="w-6 h-6 rounded-full bg-yellow-500 shadow-sm"></button>
                        <button onclick="setTheme('#3b82f6')" class="w-6 h-6 rounded-full bg-blue-500 shadow-sm"></button>
                        <button onclick="setTheme('#10b981')" class="w-6 h-6 rounded-full bg-emerald-500 shadow-sm"></button>
                    </div>
                </div>

                <!-- Section Informations Personnelles -->
                <section>
                    <h2 class="text-lg font-bold text-gray-900 mb-4 flex items-center gap-2 border-b pb-2">
                        <i data-lucide="user" class="w-5 h-5 text-indigo-500"></i> Infos Personnelles
                    </h2>
                    <div class="space-y-4 input-group">
                        <!-- Photo Upload -->
                        <div class="flex items-center gap-4 bg-gray-50 p-3 rounded-lg border border-gray-200 border-dashed">
                            <div class="w-12 h-12 rounded-full bg-gray-200 border border-gray-300 overflow-hidden flex-shrink-0" id="photo-preview-mini">
                                <i data-lucide="image" class="w-6 h-6 m-3 text-gray-400"></i>
                            </div>
                            <div class="flex-1">
                                <label class="block text-xs font-bold text-gray-700 mb-1" id="lbl-photo">Photo de profil</label>
                                <input type="file" id="input-photo" accept="image/*" class="w-full text-xs text-gray-500 file:mr-4 file:py-1 file:px-3 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer">
                            </div>
                            <button id="btn-remove-photo" class="text-red-500 hover:text-red-700 hidden" title="Supprimer la photo"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Prénom</label>
                                <input type="text" id="input-firstname" value="Jean" class="w-full border border-gray-300 bg-gray-50 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-400 focus:bg-white outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Nom</label>
                                <input type="text" id="input-lastname" value="Dupont" class="w-full border border-gray-300 bg-gray-50 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-400 focus:bg-white outline-none">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">Titre Professionnel</label>
                            <input type="text" id="input-title" value="Développeur Full Stack" class="w-full border border-gray-300 bg-gray-50 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-400 focus:bg-white outline-none">
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Email</label>
                                <input type="email" id="input-email" value="jean.dupont@email.com" class="w-full border border-gray-300 bg-gray-50 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-400 focus:bg-white outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Téléphone</label>
                                <input type="text" id="input-phone" value="+33 6 12 34 56 78" class="w-full border border-gray-300 bg-gray-50 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-400 focus:bg-white outline-none">
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Localisation</label>
                                <input type="text" id="input-location" value="Paris, France" class="w-full border border-gray-300 bg-gray-50 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-400 focus:bg-white outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">LinkedIn / Site</label>
                                <input type="text" id="input-linkedin" value="linkedin.com/in/jeandupont" class="w-full border border-gray-300 bg-gray-50 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-400 focus:bg-white outline-none">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">Résumé</label>
                            <textarea id="input-summary" rows="3" class="w-full border border-gray-300 bg-gray-50 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-400 focus:bg-white outline-none resize-none">Passionné par le développement avec 5 ans d'expérience. Création d'applications web robustes et scalables. Aime relever des défis techniques.</textarea>
                        </div>
                    </div>
                </section>

                <!-- Section Expériences -->
                <section>
                    <div class="flex justify-between items-center mb-4 border-b pb-2">
                        <h2 class="text-lg font-bold text-gray-900 flex items-center gap-2">
                            <i data-lucide="briefcase" class="w-5 h-5 text-indigo-500"></i> Expériences
                        </h2>
                        <button id="add-exp-btn" class="text-sm bg-indigo-50 text-indigo-700 hover:bg-indigo-100 px-3 py-1 rounded-full font-bold transition-colors flex items-center gap-1"><i data-lucide="plus" class="w-4 h-4"></i> Ajouter</button>
                    </div>
                    <div id="experiences-container" class="space-y-4">
                        <div class="exp-item bg-white border border-gray-200 p-4 rounded-xl shadow-sm relative group input-group transition-all hover:shadow-md">
                            <button class="remove-exp-btn absolute -top-2 -right-2 bg-white text-gray-400 hover:text-red-500 rounded-full p-1 shadow border border-gray-200 hidden group-hover:block transition-all"><i data-lucide="x" class="w-4 h-4"></i></button>
                            <div class="grid grid-cols-2 gap-3 mb-3">
                                <div class="col-span-2 sm:col-span-1"><label class="text-xs text-gray-500 font-semibold">Poste</label><input type="text" class="exp-title w-full p-2 border border-gray-200 rounded-md text-sm focus:ring-2 focus:ring-indigo-400 outline-none bg-gray-50 focus:bg-white" value="Lead Developer"></div>
                                <div class="col-span-2 sm:col-span-1"><label class="text-xs text-gray-500 font-semibold">Entreprise</label><input type="text" class="exp-company w-full p-2 border border-gray-200 rounded-md text-sm focus:ring-2 focus:ring-indigo-400 outline-none bg-gray-50 focus:bg-white" value="Tech Solutions"></div>
                                <div><label class="text-xs text-gray-500 font-semibold">Dates</label><input type="text" class="exp-dates w-full p-2 border border-gray-200 rounded-md text-sm focus:ring-2 focus:ring-indigo-400 outline-none bg-gray-50 focus:bg-white" value="2020 - Présent"></div>
                                <div><label class="text-xs text-gray-500 font-semibold">Lieu</label><input type="text" class="exp-loc w-full p-2 border border-gray-200 rounded-md text-sm focus:ring-2 focus:ring-indigo-400 outline-none bg-gray-50 focus:bg-white" value="Paris"></div>
                            </div>
                            <div>
                                <div class="flex justify-between items-center mb-2">
                                    <label class="text-xs text-gray-500 font-semibold">Description (Tirets)</label>
                                    <button class="improve-text-btn text-xs bg-gradient-to-r from-purple-600 to-indigo-600 text-white px-2.5 py-1 rounded-full shadow hover:shadow-lg transition-all flex items-center gap-1 font-medium">
                                        <i data-lucide="sparkles" class="w-3 h-3 text-yellow-300"></i> Améliorer (IA)
                                    </button>
                                </div>
                                <textarea class="exp-desc w-full p-2.5 border border-gray-200 rounded-md text-sm focus:ring-2 focus:ring-indigo-400 outline-none bg-gray-50 focus:bg-white resize-y min-h-[80px]">- Refonte complète de l'architecture front-end
- Management d'une équipe de 3 développeurs
- Optimisation des performances (+40% rapidité)</textarea>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Section Formations -->
                <section>
                    <div class="flex justify-between items-center mb-4 border-b pb-2">
                        <h2 class="text-lg font-bold text-gray-900 flex items-center gap-2">
                            <i data-lucide="graduation-cap" class="w-5 h-5 text-indigo-500"></i> Formations
                        </h2>
                        <button id="add-edu-btn" class="text-sm bg-indigo-50 text-indigo-700 hover:bg-indigo-100 px-3 py-1 rounded-full font-bold transition-colors flex items-center gap-1"><i data-lucide="plus" class="w-4 h-4"></i> Ajouter</button>
                    </div>
                    <div id="education-container" class="space-y-4">
                        <div class="edu-item bg-white border border-gray-200 p-4 rounded-xl shadow-sm relative group input-group transition-all hover:shadow-md">
                            <button class="remove-edu-btn absolute -top-2 -right-2 bg-white text-gray-400 hover:text-red-500 rounded-full p-1 shadow border border-gray-200 hidden group-hover:block transition-all"><i data-lucide="x" class="w-4 h-4"></i></button>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="col-span-2"><label class="text-xs text-gray-500 font-semibold">Diplôme</label><input type="text" class="edu-degree w-full p-2 border border-gray-200 rounded-md text-sm focus:ring-2 focus:ring-indigo-400 outline-none bg-gray-50 focus:bg-white" value="Master Ingénierie Web"></div>
                                <div><label class="text-xs text-gray-500 font-semibold">École</label><input type="text" class="edu-school w-full p-2 border border-gray-200 rounded-md text-sm focus:ring-2 focus:ring-indigo-400 outline-none bg-gray-50 focus:bg-white" value="Sorbonne Université"></div>
                                <div><label class="text-xs text-gray-500 font-semibold">Dates</label><input type="text" class="edu-dates w-full p-2 border border-gray-200 rounded-md text-sm focus:ring-2 focus:ring-indigo-400 outline-none bg-gray-50 focus:bg-white" value="2015 - 2020"></div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Section Compétences -->
                <section>
                    <h2 class="text-lg font-bold text-gray-900 mb-4 flex items-center gap-2 border-b pb-2">
                        <i data-lucide="code" class="w-5 h-5 text-indigo-500"></i> <span id="title-skills-sec">Compétences</span>
                    </h2>
                    <div class="input-group">
                        <label class="block text-xs text-gray-500 mb-1 font-medium" id="lbl-skills-help">Séparez par des virgules</label>
                        <textarea id="input-skills" rows="3" class="w-full border border-gray-300 bg-gray-50 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-400 focus:bg-white outline-none resize-none">JavaScript, React, Node.js, Python, SQL, Git, Docker, Agile</textarea>
                    </div>
                </section>

                <!-- Section Langues -->
                <section>
                    <h2 class="text-lg font-bold text-gray-900 mb-4 flex items-center gap-2 border-b pb-2">
                        <i data-lucide="globe" class="w-5 h-5 text-indigo-500"></i> <span id="title-lang-sec">Langues</span>
                    </h2>
                    <div class="input-group">
                        <label class="block text-xs text-gray-500 mb-1 font-medium" id="lbl-lang-help">Séparez par des virgules (ex: Français (Natif))</label>
                        <textarea id="input-languages" rows="2" class="w-full border border-gray-300 bg-gray-50 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-400 focus:bg-white outline-none resize-none">Français (Maternel), Anglais (Courant, C1)</textarea>
                    </div>
                </section>
                
                <div class="pb-20 lg:pb-0"></div> <!-- Espace pour le bouton mobile -->
            </div>
        </div>

        <!-- Panneau de droite : Prévisualisation -->
        <div id="preview-panel" class="w-full lg:w-7/12 xl:w-2/3 bg-grid overflow-y-auto p-4 md:p-8 flex justify-center hidden lg:flex absolute lg:relative inset-0 z-0">
            
            <!-- Scale Wrapper (Gère le zoom pour l'écran) -->
            <div id="cv-scale-wrapper" class="origin-top flex justify-center h-max pb-10">
                <!-- Conteneur du CV (celui qui sera exporté en PDF) -->
                <div id="cv-document" class="cv-container cv-fr p-10 md:p-[40mm]">
                    
                    <!-- En-tête injecté -->
                    <div class="header" id="cv-header"></div>

                    <!-- Résumé injecté -->
                    <div class="mb-6" id="cv-summary-section">
                        <p id="cv-summary-text" class="text-sm leading-relaxed"></p>
                    </div>

                    <!-- Grille principale -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8" id="cv-main-layout">
                        <!-- Colonne Principale -->
                        <div class="md:col-span-2">
                            <h3 class="section-title"><i data-lucide="briefcase" class="w-5 h-5 hidden fr-icon"></i> <span id="cv-title-exp">Expérience Professionnelle</span></h3>
                            <div id="cv-experiences-list"></div>
                        </div>

                        <!-- Colonne Secondaire -->
                        <div>
                            <div class="mb-6">
                                <h3 class="section-title"><i data-lucide="graduation-cap" class="w-5 h-5 hidden fr-icon"></i> <span id="cv-title-edu">Formation</span></h3>
                                <div id="cv-education-list"></div>
                            </div>

                            <div class="mb-6">
                                <h3 class="section-title"><i data-lucide="award" class="w-5 h-5 hidden fr-icon"></i> <span id="cv-title-skills">Compétences</span></h3>
                                <ul id="cv-skills-list" class="flex flex-wrap gap-2 text-sm"></ul>
                            </div>

                            <div class="mt-6">
                                <h3 class="section-title"><i data-lucide="message-circle" class="w-5 h-5 hidden fr-icon"></i> <span id="cv-title-lang">Langues</span></h3>
                                <ul id="cv-languages-list" class="space-y-1 text-sm text-gray-700"></ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bouton de bascule Mobile (Flottant) -->
        <button id="mobile-toggle-btn" class="lg:hidden fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-black text-white px-6 py-3 rounded-full shadow-2xl font-bold flex items-center gap-2 z-50 hover:bg-gray-800 transition-colors border border-gray-700">
            <i data-lucide="eye" class="w-5 h-5"></i>
            <span>Voir le CV</span>
        </button>

    </div>

    <!-- Modal d'alerte global -->
    <div id="msg-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-[100] p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white p-6 rounded-2xl shadow-2xl max-w-sm w-full transform scale-95 transition-transform duration-300" id="msg-modal-box">
            <div class="flex items-center gap-3 mb-2 text-indigo-600">
                <i data-lucide="info" class="w-6 h-6"></i>
                <h3 id="msg-title" class="text-xl font-bold text-gray-900">Message</h3>
            </div>
            <p id="msg-text" class="text-gray-600 mb-6 leading-relaxed"></p>
            <button onclick="closeModal()" class="w-full bg-gray-900 text-white px-4 py-2.5 rounded-xl hover:bg-gray-800 font-medium transition-colors">Compris</button>
        </div>
    </div>

    <script>
        // Init icones
        lucide.createIcons();

        // Variables Globales
        let currentStyle = 'fr'; 
        let currentLang = 'fr'; 
        let isPreviewModeMobile = false;
        let uploadedImageBase64 = null; // Stocke la photo uploadée

        // Textes d'interface
        const i18n = {
            fr: {
                appTitle: "CV MasterPro",
                styleFr: "FR Style",
                styleUs: "US Style",
                exportPdf: "Exporter PDF",
                personalInfo: "Infos Personnelles",
                photoLbl: "Photo de profil",
                firstName: "Prénom",
                lastName: "Nom",
                jobTitle: "Titre Professionnel",
                email: "Email",
                phone: "Téléphone",
                location: "Localisation",
                linkedin: "LinkedIn / Site",
                summary: "Résumé",
                experience: "Expériences",
                addBtn: "Ajouter",
                position: "Poste",
                company: "Entreprise",
                dates: "Dates",
                city: "Lieu",
                descTirets: "Description (Tirets)",
                education: "Formations",
                degree: "Diplôme",
                school: "École",
                skillsSec: "Compétences",
                skillsHelp: "Séparez par des virgules",
                langSec: "Langues",
                langHelp: "Séparez par des virgules",
                cvExpTitle: "Expérience Professionnelle",
                cvEduTitle: "Formation",
                cvSkillsTitle: "Compétences",
                cvLangTitle: "Langues",
                improveBtn: "Améliorer (IA)",
                viewCv: "Voir le CV",
                editCv: "Éditer CV"
            },
            en: {
                appTitle: "Resume Maker",
                styleFr: "FR Style",
                styleUs: "US Style",
                exportPdf: "Export PDF",
                personalInfo: "Personal Info",
                photoLbl: "Profile Photo",
                firstName: "First Name",
                lastName: "Last Name",
                jobTitle: "Job Title",
                email: "Email",
                phone: "Phone",
                location: "Location",
                linkedin: "LinkedIn / Site",
                summary: "Summary",
                experience: "Experience",
                addBtn: "Add",
                position: "Position",
                company: "Company",
                dates: "Dates",
                city: "City",
                descTirets: "Description (Bulleted)",
                education: "Education",
                degree: "Degree",
                school: "School",
                skillsSec: "Skills",
                skillsHelp: "Comma-separated",
                langSec: "Languages",
                langHelp: "Comma-separated",
                cvExpTitle: "Professional Experience",
                cvEduTitle: "Education",
                cvSkillsTitle: "Skills",
                cvLangTitle: "Languages",
                improveBtn: "Improve (AI)",
                viewCv: "View Resume",
                editCv: "Edit Form"
            }
        };

        // UI Modals
        function showMessage(title, message) {
            const modal = document.getElementById('msg-modal');
            const box = document.getElementById('msg-modal-box');
            document.getElementById('msg-title').innerText = title;
            document.getElementById('msg-text').innerText = message;
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            // Timeout for animation
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                box.classList.remove('scale-95');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('msg-modal');
            const box = document.getElementById('msg-modal-box');
            modal.classList.add('opacity-0');
            box.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        }

        // --- GESTION COULEURS ---
        function setTheme(colorHex) {
            document.documentElement.style.setProperty('--cv-primary', colorHex);
        }

        // --- GESTION DU STYLE FR / US ---
        const btnFr = document.getElementById('btn-style-fr');
        const btnUs = document.getElementById('btn-style-us');
        const cvDoc = document.getElementById('cv-document');
        const cvMainLayout = document.getElementById('cv-main-layout');

        function setStyle(style) {
            currentStyle = style;
            const activeClasses = "px-3 md:px-4 py-1.5 text-xs md:text-sm font-medium rounded-md bg-white shadow-sm text-black transition-all";
            const inactiveClasses = "px-3 md:px-4 py-1.5 text-xs md:text-sm font-medium rounded-md text-gray-400 hover:text-white transition-all bg-transparent";

            if (style === 'fr') {
                btnFr.className = activeClasses;
                btnUs.className = inactiveClasses;
                cvDoc.classList.remove('cv-us');
                cvDoc.classList.add('cv-fr');
                cvMainLayout.classList.add('md:grid-cols-3');
                cvMainLayout.children[0].classList.add('md:col-span-2');
                document.querySelectorAll('.fr-icon').forEach(icon => icon.classList.remove('hidden'));
            } else {
                btnUs.className = activeClasses;
                btnFr.className = inactiveClasses;
                cvDoc.classList.remove('cv-fr');
                cvDoc.classList.add('cv-us');
                cvMainLayout.classList.remove('md:grid-cols-3');
                cvMainLayout.children[0].classList.remove('md:col-span-2');
                document.querySelectorAll('.fr-icon').forEach(icon => icon.classList.add('hidden'));
            }
            updatePreview();
        }

        btnFr.addEventListener('click', () => setStyle('fr'));
        btnUs.addEventListener('click', () => setStyle('us'));

        // --- STREAMING_CHUNK: Traduction, Photo Upload & Mise à l'échelle ---
        
        // Sélecteur de langue
        document.getElementById('lang-selector').addEventListener('change', (e) => {
            currentLang = e.target.value;
            applyTranslations();
            updatePreview();
        });

        function applyTranslations() {
            const t = i18n[currentLang];
            
            // UI Basics
            document.getElementById('btn-style-fr').textContent = t.styleFr;
            document.getElementById('btn-style-us').textContent = t.styleUs;
            document.querySelector('#btn-download span').textContent = t.exportPdf;
            
            // Labels
            document.getElementById('lbl-photo').textContent = t.photoLbl;
            document.getElementById('input-firstname').previousElementSibling.textContent = t.firstName;
            document.getElementById('input-lastname').previousElementSibling.textContent = t.lastName;
            document.getElementById('input-title').previousElementSibling.textContent = t.jobTitle;
            document.getElementById('input-email').previousElementSibling.textContent = t.email;
            document.getElementById('input-phone').previousElementSibling.textContent = t.phone;
            document.getElementById('input-location').previousElementSibling.textContent = t.location;
            document.getElementById('input-linkedin').previousElementSibling.textContent = t.linkedin;
            document.getElementById('input-summary').previousElementSibling.textContent = t.summary;

            document.getElementById('lbl-skills-help').textContent = t.skillsHelp;
            document.getElementById('lbl-lang-help').textContent = t.langHelp;
            
            document.getElementById('add-exp-btn').innerHTML = `<i data-lucide="plus" class="w-4 h-4"></i> ${t.addBtn}`;
            document.getElementById('add-edu-btn').innerHTML = `<i data-lucide="plus" class="w-4 h-4"></i> ${t.addBtn}`;

            // Dynamics
            document.querySelectorAll('.exp-item').forEach(item => {
                const labels = item.querySelectorAll('label');
                if(labels.length >= 5) {
                    labels[0].textContent = t.position; labels[1].textContent = t.company;
                    labels[2].textContent = t.dates; labels[3].textContent = t.city;
                    labels[4].textContent = t.descTirets;
                }
                const btnImpr = item.querySelector('.improve-text-btn');
                if(btnImpr && !btnImpr.disabled) btnImpr.innerHTML = `<i data-lucide="sparkles" class="w-3 h-3 text-yellow-300"></i> ${t.improveBtn}`;
            });

            document.querySelectorAll('.edu-item').forEach(item => {
                const labels = item.querySelectorAll('label');
                if(labels.length >= 3) {
                    labels[0].textContent = t.degree; labels[1].textContent = t.school; labels[2].textContent = t.dates;
                }
            });

            // CV Titles
            document.getElementById('cv-title-exp').textContent = t.cvExpTitle;
            document.getElementById('cv-title-edu').textContent = t.cvEduTitle;
            document.getElementById('cv-title-skills').textContent = t.cvSkillsTitle;
            document.getElementById('cv-title-lang').textContent = t.cvLangTitle;

            // Mobile Toggle
            const mobileBtn = document.getElementById('mobile-toggle-btn');
            if(isPreviewModeMobile) {
                mobileBtn.innerHTML = `<i data-lucide="edit-3" class="w-5 h-5"></i><span>${t.editCv}</span>`;
            } else {
                mobileBtn.innerHTML = `<i data-lucide="eye" class="w-5 h-5"></i><span>${t.viewCv}</span>`;
            }

            lucide.createIcons();
        }

        // Photo Upload Logic
        const photoInput = document.getElementById('input-photo');
        const removePhotoBtn = document.getElementById('btn-remove-photo');
        const miniPreview = document.getElementById('photo-preview-mini');

        photoInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    uploadedImageBase64 = event.target.result;
                    miniPreview.innerHTML = `<img src="${uploadedImageBase64}" class="w-full h-full object-cover">`;
                    removePhotoBtn.classList.remove('hidden');
                    updatePreview();
                }
                reader.readAsDataURL(file);
            }
        });

        removePhotoBtn.addEventListener('click', () => {
            uploadedImageBase64 = null;
            photoInput.value = "";
            miniPreview.innerHTML = `<i data-lucide="image" class="w-6 h-6 m-3 text-gray-400"></i>`;
            removePhotoBtn.classList.add('hidden');
            lucide.createIcons();
            updatePreview();
        });

        // Fonction pour gérer le Zoom automatique sur mobile / petits écrans
        function scaleCV() {
            const previewArea = document.getElementById('preview-panel');
            const cvScaleWrapper = document.getElementById('cv-scale-wrapper');
            const cvDoc = document.getElementById('cv-document');
            
            if(!previewArea || previewArea.classList.contains('hidden')) return;

            // L'A4 fait 210mm. En pixels avec une densité standard, disons ~794px.
            // On récupère la largeur exacte en px du rendu.
            const targetWidth = cvDoc.offsetWidth || 794; 
            const containerWidth = previewArea.clientWidth - 32; // 32px padding sécurisé

            if (containerWidth < targetWidth && containerWidth > 0) {
                const scale = containerWidth / targetWidth;
                cvScaleWrapper.style.transform = `scale(${scale})`;
                // Ajustement de la hauteur pour ne pas avoir un scroll géant
                const scaledHeight = cvDoc.offsetHeight * scale;
                cvScaleWrapper.style.height = `${scaledHeight}px`;
                cvScaleWrapper.style.marginBottom = '20px';
            } else {
                cvScaleWrapper.style.transform = 'none';
                cvScaleWrapper.style.height = 'auto';
                cvScaleWrapper.style.marginBottom = '0';
            }
        }

        window.addEventListener('resize', scaleCV);

        // Mobile Toggle Bouton Logic
        document.getElementById('mobile-toggle-btn').addEventListener('click', () => {
            const editPanel = document.getElementById('edit-panel');
            const previewPanel = document.getElementById('preview-panel');
            const btn = document.getElementById('mobile-toggle-btn');
            const t = i18n[currentLang];

            isPreviewModeMobile = !isPreviewModeMobile;

            if (isPreviewModeMobile) {
                editPanel.classList.add('hidden');
                previewPanel.classList.remove('hidden');
                previewPanel.classList.add('flex'); // pour centrer
                btn.innerHTML = `<i data-lucide="edit-3" class="w-5 h-5"></i><span>${t.editCv}</span>`;
                setTimeout(scaleCV, 50); // Attendre affichage pour scale
            } else {
                editPanel.classList.remove('hidden');
                previewPanel.classList.add('hidden');
                previewPanel.classList.remove('flex');
                btn.innerHTML = `<i data-lucide="eye" class="w-5 h-5"></i><span>${t.viewCv}</span>`;
            }
            lucide.createIcons();
        });

        // --- STREAMING_CHUNK: Moteur de rendu du CV (updatePreview) ---
        function updatePreview() {
            // Récupération des valeurs
            const fname = document.getElementById('input-firstname').value;
            const lname = document.getElementById('input-lastname').value;
            const title = document.getElementById('input-title').value;
            const email = document.getElementById('input-email').value;
            const phone = document.getElementById('input-phone').value;
            const loc = document.getElementById('input-location').value;
            const linkedin = document.getElementById('input-linkedin').value;
            const summary = document.getElementById('input-summary').value;

            // En-tête
            const headerEl = document.getElementById('cv-header');
            
            // Image source : uploadée ou placeholder d'initiale
            let imgSrc = uploadedImageBase64;
            if(!imgSrc) {
                const initials = (fname.charAt(0) + lname.charAt(0)).toUpperCase() || 'CV';
                imgSrc = `https://placehold.co/150x150/f1f5f9/94a3b8?text=${initials}`;
            }

            if (currentStyle === 'fr') {
                let contactHTML = `
                    ${email ? `<p class="flex items-center gap-1.5"><i data-lucide="mail" class="w-3.5 h-3.5 primary-text"></i> ${email}</p>` : ''}
                    ${phone ? `<p class="flex items-center gap-1.5"><i data-lucide="phone" class="w-3.5 h-3.5 primary-text"></i> ${phone}</p>` : ''}
                    ${loc ? `<p class="flex items-center gap-1.5"><i data-lucide="map-pin" class="w-3.5 h-3.5 primary-text"></i> ${loc}</p>` : ''}
                    ${linkedin ? `<p class="flex items-center gap-1.5"><i data-lucide="link" class="w-3.5 h-3.5 primary-text"></i> ${linkedin}</p>` : ''}
                `;

                headerEl.innerHTML = `
                    <div class="photo-container shadow-md">
                        <img src="${imgSrc}" alt="Photo">
                    </div>
                    <div class="flex-1">
                        <h1 class="text-[2.5rem] font-black text-gray-900 tracking-tight uppercase leading-none">${fname} <span class="primary-text">${lname}</span></h1>
                        <h2 class="text-xl text-gray-700 mt-2 mb-4 font-medium">${title}</h2>
                        <div class="text-sm text-gray-600 grid grid-cols-2 gap-y-1.5">
                            ${contactHTML}
                        </div>
                    </div>
                `;
            } else {
                let contactParts = [];
                if(loc) contactParts.push(`<span>${loc}</span>`);
                if(phone) contactParts.push(`<span>${phone}</span>`);
                if(email) contactParts.push(`<span class="font-medium">${email}</span>`);
                if(linkedin) contactParts.push(`<span>${linkedin}</span>`);
                
                headerEl.innerHTML = `
                    <h1>${fname} ${lname}</h1>
                    <div class="text-lg text-gray-800 font-semibold mb-3">${title}</div>
                    <div class="header-contact">
                        ${contactParts.join('<span class="mx-2 text-gray-300">|</span>')}
                    </div>
                `;
            }

            // Résumé
            const summaryEl = document.getElementById('cv-summary-section');
            if (summary.trim() !== "") {
                summaryEl.style.display = "block";
                document.getElementById('cv-summary-text').innerText = summary;
                document.getElementById('cv-summary-text').className = currentStyle === 'fr' ? "text-sm leading-relaxed text-gray-700 text-justify" : "text-[0.95rem] leading-relaxed text-gray-800 text-justify";
            } else {
                summaryEl.style.display = "none";
            }

            // Expériences
            const expListEl = document.getElementById('cv-experiences-list');
            expListEl.innerHTML = '';
            document.querySelectorAll('.exp-item').forEach(item => {
                const eTitle = item.querySelector('.exp-title').value;
                const eComp = item.querySelector('.exp-company').value;
                const eDates = item.querySelector('.exp-dates').value;
                const eLoc = item.querySelector('.exp-loc').value;
                const eDesc = item.querySelector('.exp-desc').value;

                if(eTitle || eComp) {
                    const listItems = eDesc.split('\n').filter(line => line.trim() !== '').map(line => `<li class="pl-1">${line.replace(/^- /, '')}</li>`).join('');
                    if (currentStyle === 'fr') {
                        expListEl.innerHTML += `
                            <div class="cv-item">
                                <div class="cv-item-header">
                                    <span class="text-base text-gray-900">${eTitle}</span>
                                    <span class="text-sm font-medium primary-text bg-gray-50 px-2 py-0.5 rounded">${eDates}</span>
                                </div>
                                <div class="cv-item-subtitle text-sm font-medium mt-1">
                                    ${eComp} ${eLoc ? `<span class="text-gray-400 font-normal">| ${eLoc}</span>` : ''}
                                </div>
                                <ul class="cv-list text-sm text-gray-700 mt-2 space-y-1">
                                    ${listItems}
                                </ul>
                            </div>
                        `;
                    } else {
                        expListEl.innerHTML += `
                            <div class="mb-5">
                                <div class="flex justify-between items-baseline mb-0.5">
                                    <span class="font-bold text-gray-900 text-[1.05rem]">${eTitle}</span>
                                    <span class="text-[0.9rem] font-semibold text-gray-800 whitespace-nowrap">${eDates}</span>
                                </div>
                                <div class="text-[0.95rem] italic text-gray-700 mb-2 font-medium">
                                    ${eComp}${eLoc ? `, ${eLoc}` : ''}
                                </div>
                                <ul class="list-disc pl-5 text-[0.9rem] text-gray-800 space-y-1 marker:text-gray-400">
                                    ${listItems}
                                </ul>
                            </div>
                        `;
                    }
                }
            });

            // Formations
            const eduListEl = document.getElementById('cv-education-list');
            eduListEl.innerHTML = '';
            document.querySelectorAll('.edu-item').forEach(item => {
                const eDeg = item.querySelector('.edu-degree').value;
                const eSchool = item.querySelector('.edu-school').value;
                const eDates = item.querySelector('.edu-dates').value;

                if(eDeg || eSchool) {
                    if (currentStyle === 'fr') {
                        eduListEl.innerHTML += `
                            <div class="cv-item mb-4">
                                <div class="cv-item-header text-sm text-gray-900 font-bold mb-0.5">${eDeg}</div>
                                <div class="text-sm text-gray-700">${eSchool}</div>
                                <div class="text-xs font-medium primary-text mt-1">${eDates}</div>
                            </div>
                        `;
                    } else {
                        eduListEl.innerHTML += `
                            <div class="mb-4">
                                <div class="flex justify-between items-baseline">
                                    <span class="font-bold text-gray-900 text-[1rem]">${eSchool}</span>
                                    <span class="text-[0.9rem] font-semibold text-gray-800 whitespace-nowrap">${eDates}</span>
                                </div>
                                <div class="text-[0.95rem] italic text-gray-700">${eDeg}</div>
                            </div>
                        `;
                    }
                }
            });

            // Compétences
            const skillsStr = document.getElementById('input-skills').value;
            const skillsListEl = document.getElementById('cv-skills-list');
            skillsListEl.innerHTML = '';
            skillsListEl.className = currentStyle === 'fr' ? "flex flex-wrap gap-2 text-sm" : "text-[0.95rem] text-gray-800 leading-relaxed";

            if(skillsStr.trim() !== "") {
                const skills = skillsStr.split(',').map(s => s.trim()).filter(s => s !== "");
                if (currentStyle === 'fr') {
                    skills.forEach(skill => {
                        skillsListEl.innerHTML += `<li class="bg-gray-100 text-gray-800 px-2.5 py-1 rounded-md border border-gray-200 font-medium">${skill}</li>`;
                    });
                } else {
                    skillsListEl.innerHTML = `<li>${skills.join(' <span class="mx-2 text-gray-400 font-bold">•</span> ')}</li>`;
                }
            }

            // Langues
            const langStr = document.getElementById('input-languages').value;
            const langListEl = document.getElementById('cv-languages-list');
            langListEl.innerHTML = '';
            langListEl.className = currentStyle === 'fr' ? "space-y-1.5 text-sm text-gray-700" : "text-[0.95rem] text-gray-800 leading-relaxed";

            if(langStr.trim() !== "") {
                const langs = langStr.split(',').map(s => s.trim()).filter(s => s !== "");
                if (currentStyle === 'fr') {
                    langs.forEach(lang => { langListEl.innerHTML += `<li class="flex items-center gap-2"><div class="w-1.5 h-1.5 rounded-full bg-[var(--cv-primary)]"></div>${lang}</li>`; });
                } else {
                    langListEl.innerHTML = `<li>${langs.join(' <span class="mx-2 text-gray-400 font-bold">•</span> ')}</li>`;
                }
            }

            lucide.createIcons();
            scaleCV(); // Assurer le scale si le contenu a modifié la taille
        }

        // --- STREAMING_CHUNK: Événements, API IA, et Export PDF ---
        
        function attachInputListeners() {
            document.querySelectorAll('input, textarea').forEach(input => {
                input.removeEventListener('input', updatePreview);
                input.addEventListener('input', updatePreview);
            });

            document.querySelectorAll('.remove-exp-btn').forEach(btn => {
                btn.onclick = function() { this.closest('.exp-item').remove(); updatePreview(); };
            });
            document.querySelectorAll('.remove-edu-btn').forEach(btn => {
                btn.onclick = function() { this.closest('.edu-item').remove(); updatePreview(); };
            });

            document.querySelectorAll('.improve-text-btn').forEach(btn => {
                btn.onclick = function() { improveText(this.closest('div').nextElementSibling, this); };
            });
        }

        // Ajout section dynamique
        document.getElementById('add-exp-btn').addEventListener('click', () => {
            const container = document.getElementById('experiences-container');
            const item = document.createElement('div');
            item.className = 'exp-item bg-white border border-gray-200 p-4 rounded-xl shadow-sm relative group input-group transition-all hover:shadow-md';
            item.innerHTML = document.querySelector('.exp-item').innerHTML; // Clone structure
            // Reset values
            item.querySelectorAll('input').forEach(inp => inp.value = "");
            item.querySelector('textarea').value = "- Nouvelle mission";
            container.appendChild(item);
            applyTranslations();
            attachInputListeners();
        });

        document.getElementById('add-edu-btn').addEventListener('click', () => {
            const container = document.getElementById('education-container');
            const item = document.createElement('div');
            item.className = 'edu-item bg-white border border-gray-200 p-4 rounded-xl shadow-sm relative group input-group transition-all hover:shadow-md';
            item.innerHTML = document.querySelector('.edu-item').innerHTML;
            item.querySelectorAll('input').forEach(inp => inp.value = "");
            container.appendChild(item);
            applyTranslations();
            attachInputListeners();
        });

        // Amélioration IA (Simulée pour démo si pas d'API KEY, mais fonctionnelle si clé injectée)
        async function improveText(textareaElement, buttonElement) {
            const originalText = textareaElement.value;
            if (originalText.trim() === "") return;
            const originalBtnContent = buttonElement.innerHTML;
            
            buttonElement.innerHTML = `<span class="loader loader-dark"></span>`;
            buttonElement.disabled = true;

            try {
                // Remplacer par clé API Gemini réelle. Sans clé, je fais un formatage basique simulant l'IA pour l'UX.
                const apiKey = ""; 
                if(!apiKey) {
                    // Simulation
                    await new Promise(r => setTimeout(r, 1000));
                    textareaElement.value = originalText.split('\n').filter(l=>l.trim()).map(l => {
                        let text = l.replace(/^- /, '');
                        return `- A géré et optimisé : ${text}`; // Fake AI
                    }).join('\n');
                    updatePreview();
                    buttonElement.innerHTML = `<i data-lucide="check" class="w-4 h-4 text-emerald-500"></i>`;
                } else {
                    // Appel Réel API
                    const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;
                    const prompt = `Améliore professionnellement ces puces pour un CV, commence par un tiret (-) :\n${originalText}`;
                    const response = await fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) });
                    const result = await response.json();
                    textareaElement.value = result.candidates[0].content.parts[0].text.trim();
                    updatePreview();
                    buttonElement.innerHTML = `<i data-lucide="check" class="w-4 h-4 text-emerald-500"></i>`;
                }
            } catch (error) {
                showMessage("Erreur", "Service indisponible pour le moment.");
                buttonElement.innerHTML = `<i data-lucide="alert-circle" class="w-4 h-4 text-red-500"></i>`;
            } finally {
                lucide.createIcons();
                setTimeout(() => { buttonElement.innerHTML = originalBtnContent; buttonElement.disabled = false; lucide.createIcons(); }, 2000);
            }
        }

        // Export PDF
        document.getElementById('btn-download').addEventListener('click', () => {
            const element = document.getElementById('cv-document');
            const wrapper = document.getElementById('cv-scale-wrapper');
            const fname = document.getElementById('input-firstname').value;
            const lname = document.getElementById('input-lastname').value.toUpperCase();
            
            // Enlever temporairement le zoom pour garantir la qualité du PDF
            const origTransform = wrapper.style.transform;
            const origHeight = wrapper.style.height;
            wrapper.style.transform = 'none';
            wrapper.style.height = 'auto';

            const btn = document.getElementById('btn-download');
            const originalContent = btn.innerHTML;
            btn.innerHTML = `<span class="loader"></span> <span class="hidden md:inline">Génération...</span>`;
            btn.disabled = true;

            const opt = {
                margin:       0,
                filename:     `CV_${fname}_${lname}.pdf`.replace(/\s+/g, '_'),
                image:        { type: 'jpeg', quality: 1 },
                html2canvas:  { scale: 2, useCORS: true, logging: false },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                // Restaurer UI
                wrapper.style.transform = origTransform;
                wrapper.style.height = origHeight;
                btn.innerHTML = originalContent;
                btn.disabled = false;
                lucide.createIcons();
                showMessage("Succès", "Votre CV a été téléchargé avec succès !");
            }).catch(err => {
                wrapper.style.transform = origTransform;
                wrapper.style.height = origHeight;
                btn.innerHTML = originalContent;
                btn.disabled = false;
                lucide.createIcons();
                showMessage("Erreur", "Échec de l'exportation PDF.");
            });
        });

        // Initialisation
        window.onload = () => {
            attachInputListeners();
            applyTranslations(); 
            setStyle('fr'); 
            
            // Gestion de l'affichage sur resize pour le panel mobile
            window.addEventListener('resize', () => {
                const previewPanel = document.getElementById('preview-panel');
                const editPanel = document.getElementById('edit-panel');
                const mobileBtn = document.getElementById('mobile-toggle-btn');
                
                if (window.innerWidth >= 1024) { // Breakpoint lg de tailwind
                    previewPanel.classList.remove('hidden');
                    previewPanel.classList.add('flex');
                    editPanel.classList.remove('hidden');
                    mobileBtn.classList.add('hidden');
                    // Reset state
                    isPreviewModeMobile = false; 
                } else {
                    mobileBtn.classList.remove('hidden');
                    if(isPreviewModeMobile) {
                        editPanel.classList.add('hidden');
                    } else {
                        previewPanel.classList.add('hidden');
                        previewPanel.classList.remove('flex');
                    }
                }
                scaleCV();
            });

            // Trigger manuel au démarrage
            window.dispatchEvent(new Event('resize'));
            setTimeout(scaleCV, 100); 
        };

    </script>
</body>
</html>
