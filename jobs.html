<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créateur de CV Pro - Style Français & Américain</title>
    
    <!-- Tailwind CSS pour le style -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- html2pdf.js pour l'export PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- Google Fonts (Inter pour l'interface, Roboto/Merriweather pour les CVs) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@300;400;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        
        /* Styles spécifiques pour les CVs */
        .cv-container { width: 210mm; min-height: 297mm; background: white; margin: 0 auto; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        
        /* Style Français */
        .cv-fr { font-family: 'Roboto', sans-serif; }
        .cv-fr .header { border-bottom: 4px solid #eab308; padding-bottom: 1rem; margin-bottom: 1.5rem; display: flex; gap: 2rem; align-items: center;}
        .cv-fr .section-title { color: #000000; border-bottom: 2px solid #eab308; margin-bottom: 0.75rem; padding-bottom: 0.25rem; font-weight: 700; text-transform: uppercase; font-size: 1.1rem;}
        .cv-fr .photo-container { width: 120px; height: 120px; border-radius: 50%; overflow: hidden; border: 3px solid #eab308; flex-shrink: 0;}
        .cv-fr .photo-container img { width: 100%; height: 100%; object-fit: cover; }

        /* Style Américain (Resume) ultra-professionnel */
        .cv-us { font-family: 'Inter', sans-serif; color: #111827; line-height: 1.5; }
        .cv-us .header { text-align: center; border-bottom: 2px solid #111827; padding-bottom: 1.25rem; margin-bottom: 1.25rem; }
        .cv-us .header h1 { font-size: 2.25rem; font-weight: 700; margin-bottom: 0.25rem; letter-spacing: -0.02em; text-transform: uppercase; }
        .cv-us .header-contact { font-size: 0.85rem; color: #374151; display: flex; justify-content: center; align-items: center; flex-wrap: wrap; }
        .cv-us .section-title { font-size: 1.05rem; font-weight: 700; text-transform: uppercase; border-bottom: 1px solid #111827; margin-bottom: 0.75rem; padding-bottom: 0.2rem; margin-top: 1.25rem; letter-spacing: 0.05em; color: #111827;}
        .cv-us .photo-container { display: none; }

        /* Utilitaires pour le layout du CV */
        .cv-item { margin-bottom: 1rem; }
        .cv-item-header { display: flex; justify-content: space-between; align-items: baseline; font-weight: 600;}
        .cv-item-subtitle { font-style: italic; color: #4b5563; margin-bottom: 0.25rem; }
        .cv-list { list-style-type: disc; padding-left: 1.5rem; margin-top: 0.5rem; }
        .cv-list li { margin-bottom: 0.25rem; line-height: 1.4;}

        /* Loader pour l'amélioration de texte */
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #eab308; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Pour l'impression PDF */
        @media print {
            body { background: white; }
            .no-print { display: none !important; }
            .cv-container { box-shadow: none; margin: 0; width: 100%; height: auto; }
            #cv-preview-area { padding: 0; margin: 0; }
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Navbar -->
    <nav class="bg-black border-b border-gray-800 px-6 py-3 flex justify-between items-center z-10 no-print">
        <div class="flex items-center gap-2">
            <i data-lucide="file-text" class="text-yellow-400 w-6 h-6"></i>
            <h1 class="text-xl font-bold text-white">CV MasterPro</h1>
        </div>
        <div class="flex gap-4 items-center">
            <div class="flex bg-gray-800 p-1 rounded-lg">
                <button id="btn-style-fr" class="px-4 py-1.5 text-sm font-medium rounded-md bg-yellow-400 shadow-sm text-black transition-all">Style Français</button>
                <button id="btn-style-us" class="px-4 py-1.5 text-sm font-medium rounded-md text-gray-400 hover:text-white transition-all">Style Américain</button>
            </div>
            
            <!-- Sélecteur de langue -->
            <select id="lang-selector" class="bg-gray-800 text-white border-gray-700 text-sm rounded-md px-3 py-2 outline-none focus:ring-2 focus:ring-yellow-400 font-medium cursor-pointer">
                <option value="fr">🇫🇷 FR</option>
                <option value="en">🇬🇧 EN</option>
            </select>

            <button id="btn-download" class="bg-yellow-400 hover:bg-yellow-500 text-black px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition-colors">
                <i data-lucide="download" class="w-4 h-4"></i>
                <span>Exporter PDF</span>
            </button>
        </div>
    </nav>

    <!-- Main Content Layout -->
    <div class="flex-1 flex overflow-hidden">
        
        <!-- Panneau de gauche : Formulaire (Scrollable) -->
        <div class="w-1/3 bg-white border-r border-gray-200 overflow-y-auto no-print flex flex-col">
            <div class="p-6 space-y-8 flex-1">
                
                <!-- Section Informations Personnelles -->
                <section>
                    <h2 class="text-lg font-bold text-black mb-4 flex items-center gap-2">
                        <i data-lucide="user" class="w-5 h-5 text-yellow-500"></i> Infos Personnelles
                    </h2>
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Prénom</label>
                                <input type="text" id="input-firstname" value="Jean" class="w-full border border-gray-300 rounded-md p-2 text-sm focus:ring-2 focus:ring-yellow-400 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Nom</label>
                                <input type="text" id="input-lastname" value="Dupont" class="w-full border border-gray-300 rounded-md p-2 text-sm focus:ring-2 focus:ring-yellow-400 outline-none">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">Titre Professionnel</label>
                            <input type="text" id="input-title" value="Développeur Full Stack Senior" class="w-full border border-gray-300 rounded-md p-2 text-sm focus:ring-2 focus:ring-yellow-400 outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Email</label>
                                <input type="email" id="input-email" value="jean.dupont@email.com" class="w-full border border-gray-300 rounded-md p-2 text-sm focus:ring-2 focus:ring-yellow-400 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Téléphone</label>
                                <input type="text" id="input-phone" value="+33 6 12 34 56 78" class="w-full border border-gray-300 rounded-md p-2 text-sm focus:ring-2 focus:ring-yellow-400 outline-none">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Localisation</label>
                                <input type="text" id="input-location" value="Paris, France" class="w-full border border-gray-300 rounded-md p-2 text-sm focus:ring-2 focus:ring-yellow-400 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">LinkedIn</label>
                                <input type="text" id="input-linkedin" value="linkedin.com/in/jeandupont" class="w-full border border-gray-300 rounded-md p-2 text-sm focus:ring-2 focus:ring-yellow-400 outline-none">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">Résumé / Profil</label>
                            <textarea id="input-summary" rows="3" class="w-full border border-gray-300 rounded-md p-2 text-sm focus:ring-2 focus:ring-yellow-400 outline-none">Passionné par le développement web avec 5 ans d'expérience dans la création d'applications robustes. Expertise en React et Node.js.</textarea>
                        </div>
                    </div>
                </section>

                <!-- Section Expériences -->
                <section>
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-bold text-black flex items-center gap-2">
                            <i data-lucide="briefcase" class="w-5 h-5 text-yellow-500"></i> Expériences
                        </h2>
                        <button id="add-exp-btn" class="text-sm text-yellow-600 hover:text-yellow-700 font-bold">+ Ajouter</button>
                    </div>
                    <div id="experiences-container" class="space-y-6">
                        <!-- Expérience Item (Template) -->
                        <div class="exp-item border border-gray-200 p-4 rounded-lg bg-gray-50 relative group">
                            <button class="remove-exp-btn absolute top-2 right-2 text-gray-400 hover:text-red-500 hidden group-hover:block"><i data-lucide="x" class="w-4 h-4"></i></button>
                            <div class="grid grid-cols-2 gap-3 mb-3">
                                <div><label class="text-xs text-gray-500">Poste</label><input type="text" class="exp-title w-full p-1 border rounded text-sm focus:ring-2 focus:ring-yellow-400 outline-none" value="Lead Developer"></div>
                                <div><label class="text-xs text-gray-500">Entreprise</label><input type="text" class="exp-company w-full p-1 border rounded text-sm focus:ring-2 focus:ring-yellow-400 outline-none" value="Tech Solutions Inc."></div>
                                <div><label class="text-xs text-gray-500">Dates</label><input type="text" class="exp-dates w-full p-1 border rounded text-sm focus:ring-2 focus:ring-yellow-400 outline-none" value="Jan 2020 - Présent"></div>
                                <div><label class="text-xs text-gray-500">Lieu</label><input type="text" class="exp-loc w-full p-1 border rounded text-sm focus:ring-2 focus:ring-yellow-400 outline-none" value="Paris"></div>
                            </div>
                            <div>
                                <div class="flex justify-between items-end mb-1">
                                    <label class="text-xs text-gray-500">Description (Tirets)</label>
                                    <button class="improve-text-btn text-xs bg-black text-yellow-400 px-2 py-1 rounded hover:bg-gray-800 transition-colors flex items-center gap-1 font-medium">
                                        <i data-lucide="sparkles" class="w-3 h-3"></i> Améliorer le texte (IA)
                                    </button>
                                </div>
                                <textarea class="exp-desc w-full p-2 border rounded text-sm focus:ring-2 focus:ring-yellow-400 outline-none" rows="4">- j'ai fait le site web
- gerer une equipe de 3 devs
- mis en place des api
- augmenter la vitesse du site</textarea>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Section Formations -->
                <section>
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-bold text-black flex items-center gap-2">
                            <i data-lucide="graduation-cap" class="w-5 h-5 text-yellow-500"></i> Formations
                        </h2>
                        <button id="add-edu-btn" class="text-sm text-yellow-600 hover:text-yellow-700 font-bold">+ Ajouter</button>
                    </div>
                    <div id="education-container" class="space-y-4">
                        <div class="edu-item border border-gray-200 p-4 rounded-lg bg-gray-50 relative group">
                            <button class="remove-edu-btn absolute top-2 right-2 text-gray-400 hover:text-red-500 hidden group-hover:block"><i data-lucide="x" class="w-4 h-4"></i></button>
                            <div class="grid grid-cols-2 gap-3 mb-3">
                                <div class="col-span-2"><label class="text-xs text-gray-500">Diplôme</label><input type="text" class="edu-degree w-full p-1 border rounded text-sm focus:ring-2 focus:ring-yellow-400 outline-none" value="Master en Ingénierie Informatique"></div>
                                <div><label class="text-xs text-gray-500">École</label><input type="text" class="edu-school w-full p-1 border rounded text-sm focus:ring-2 focus:ring-yellow-400 outline-none" value="Université de Technologie"></div>
                                <div><label class="text-xs text-gray-500">Dates</label><input type="text" class="edu-dates w-full p-1 border rounded text-sm focus:ring-2 focus:ring-yellow-400 outline-none" value="2015 - 2020"></div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Section Compétences -->
                <section>
                    <h2 class="text-lg font-bold text-black mb-4 flex items-center gap-2">
                        <i data-lucide="code" class="w-5 h-5 text-yellow-500"></i> <span id="title-skills-sec">Compétences</span>
                    </h2>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1" id="lbl-skills-help">Séparées par des virgules</label>
                        <textarea id="input-skills" rows="3" class="w-full border border-gray-300 rounded-md p-2 text-sm focus:ring-2 focus:ring-yellow-400 outline-none">JavaScript, React, Node.js, Python, SQL, Git, Docker, Méthodes Agiles, Gestion de projet</textarea>
                    </div>
                </section>

                <!-- Section Langues -->
                <section>
                    <h2 class="text-lg font-bold text-black mb-4 flex items-center gap-2">
                        <i data-lucide="globe" class="w-5 h-5 text-yellow-500"></i> <span id="title-lang-sec">Langues</span>
                    </h2>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1" id="lbl-lang-help">Séparées par des virgules (ex: Français (Maternel))</label>
                        <textarea id="input-languages" rows="2" class="w-full border border-gray-300 rounded-md p-2 text-sm focus:ring-2 focus:ring-yellow-400 outline-none">Français (Maternel), Anglais (Courant)</textarea>
                    </div>
                </section>

            </div>
            
            <div class="p-4 border-t border-gray-200 bg-gray-50 text-center">
                <p class="text-xs text-gray-500">Les modifications mettent à jour l'aperçu automatiquement.</p>
            </div>
        </div>

        <!-- Panneau de droite : Prévisualisation (A4) -->
        <div id="cv-preview-area" class="w-2/3 bg-gray-200 overflow-y-auto p-8 flex justify-center">
            
            <!-- Conteneur du CV (celui qui sera exporté en PDF) -->
            <div id="cv-document" class="cv-container cv-fr p-10">
                
                <!-- En-tête -->
                <div class="header" id="cv-header">
                    <!-- Rempli par JS -->
                </div>

                <!-- Résumé -->
                <div class="mb-6" id="cv-summary-section">
                    <p id="cv-summary-text" class="text-sm leading-relaxed"></p>
                </div>

                <!-- Contenu Principal (Grid pour style FR, Flex pour US) -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8" id="cv-main-layout">
                    
                    <!-- Colonne Principale (Expériences) -->
                    <div class="md:col-span-2">
                        <h3 class="section-title">Expérience Professionnelle</h3>
                        <div id="cv-experiences-list">
                            <!-- Rempli par JS -->
                        </div>
                    </div>

                    <!-- Colonne Secondaire (Formation & Compétences) -->
                    <div>
                        <div class="mb-6">
                            <h3 class="section-title">Formation</h3>
                            <div id="cv-education-list">
                                <!-- Rempli par JS -->
                            </div>
                        </div>

                        <div>
                            <h3 class="section-title" id="cv-title-skills">Compétences</h3>
                            <ul id="cv-skills-list" class="flex flex-wrap gap-2 text-sm">
                                <!-- Rempli par JS -->
                            </ul>
                        </div>

                        <div class="mt-6">
                            <h3 class="section-title" id="cv-title-lang">Langues</h3>
                            <ul id="cv-languages-list" class="space-y-1 text-sm text-gray-700">
                                <!-- Rempli par JS -->
                            </ul>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Modal d'information (remplace alert) -->
    <div id="msg-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-sm w-full">
            <h3 id="msg-title" class="text-lg font-bold mb-2">Message</h3>
            <p id="msg-text" class="text-gray-600 mb-4"></p>
            <div class="flex justify-end">
                <button onclick="closeModal()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Fermer</button>
            </div>
        </div>
    </div>

    <script>
        // Initialisation des icônes
        lucide.createIcons();

        // État de l'application
        let currentStyle = 'fr'; // 'fr' ou 'us'
        let currentLang = 'fr'; // 'fr' ou 'en'

        const i18n = {
            fr: {
                appTitle: "CV MasterPro",
                styleFr: "Style Français",
                styleUs: "Style Américain",
                exportPdf: "Exporter PDF",
                personalInfo: "Infos Personnelles",
                firstName: "Prénom",
                lastName: "Nom",
                jobTitle: "Titre Professionnel",
                email: "Email",
                phone: "Téléphone",
                location: "Localisation",
                linkedin: "LinkedIn",
                summary: "Résumé / Profil",
                experience: "Expériences",
                addBtn: "+ Ajouter",
                position: "Poste",
                company: "Entreprise",
                dates: "Dates",
                city: "Lieu",
                descTirets: "Description (Tirets)",
                education: "Formations",
                degree: "Diplôme",
                school: "École",
                skillsSec: "Compétences",
                skillsHelp: "Séparées par des virgules",
                langSec: "Langues",
                langHelp: "Séparées par des virgules (ex: Français (Maternel))",
                infoFooter: "Les modifications mettent à jour l'aperçu automatiquement.",
                cvExpTitle: "Expérience Professionnelle",
                cvEduTitle: "Formation",
                cvSkillsTitle: "Compétences",
                cvLangTitle: "Langues",
                photoAlt: "Photo de profil",
                improveBtn: "Améliorer le texte (IA)"
            },
            en: {
                appTitle: "Resume MasterPro",
                styleFr: "French Style",
                styleUs: "US Style",
                exportPdf: "Export PDF",
                personalInfo: "Personal Info",
                firstName: "First Name",
                lastName: "Last Name",
                jobTitle: "Job Title",
                email: "Email",
                phone: "Phone",
                location: "Location",
                linkedin: "LinkedIn",
                summary: "Summary / Profile",
                experience: "Experience",
                addBtn: "+ Add",
                position: "Position",
                company: "Company",
                dates: "Dates",
                city: "City",
                descTirets: "Description (Bulleted)",
                education: "Education",
                degree: "Degree",
                school: "School",
                skillsSec: "Skills",
                skillsHelp: "Comma-separated",
                langSec: "Languages",
                langHelp: "Comma-separated (e.g., English (Native))",
                infoFooter: "Changes update the preview automatically.",
                cvExpTitle: "Professional Experience",
                cvEduTitle: "Education",
                cvSkillsTitle: "Skills",
                cvLangTitle: "Languages",
                photoAlt: "Profile Photo",
                improveBtn: "Improve text (AI)"
            }
        };

        // Fonction utilitaire pour le modal (évite alert)
        function showMessage(title, message) {
            document.getElementById('msg-title').innerText = title;
            document.getElementById('msg-text').innerText = message;
            document.getElementById('msg-modal').classList.remove('hidden');
            document.getElementById('msg-modal').classList.add('flex');
        }

        function closeModal() {
            document.getElementById('msg-modal').classList.add('hidden');
            document.getElementById('msg-modal').classList.remove('flex');
        }

        // --- GESTION DU STYLE FR / US ---
        const btnFr = document.getElementById('btn-style-fr');
        const btnUs = document.getElementById('btn-style-us');
        const cvDoc = document.getElementById('cv-document');
        const cvMainLayout = document.getElementById('cv-main-layout');

        function setStyle(style) {
            currentStyle = style;
            if (style === 'fr') {
                // UI Buttons
                btnFr.className = "px-4 py-1.5 text-sm font-medium rounded-md bg-yellow-400 shadow-sm text-black transition-all";
                btnUs.className = "px-4 py-1.5 text-sm font-medium rounded-md text-gray-400 hover:text-white transition-all";
                
                // CV Classes
                cvDoc.classList.remove('cv-us');
                cvDoc.classList.add('cv-fr');
                
                // Layout (2 columns for FR)
                cvMainLayout.classList.add('md:grid-cols-3');
                cvMainLayout.children[0].classList.add('md:col-span-2');
            } else {
                // UI Buttons
                btnUs.className = "px-4 py-1.5 text-sm font-medium rounded-md bg-yellow-400 shadow-sm text-black transition-all";
                btnFr.className = "px-4 py-1.5 text-sm font-medium rounded-md text-gray-400 hover:text-white transition-all";
                
                // CV Classes
                cvDoc.classList.remove('cv-fr');
                cvDoc.classList.add('cv-us');
                
                // Layout (1 column for US, usually top to bottom)
                cvMainLayout.classList.remove('md:grid-cols-3');
                cvMainLayout.children[0].classList.remove('md:col-span-2');
            }
            updatePreview();
        }

        btnFr.addEventListener('click', () => setStyle('fr'));
        btnUs.addEventListener('click', () => setStyle('us'));

        // --- GESTION DES LANGUES ---
        const langSelector = document.getElementById('lang-selector');
        langSelector.addEventListener('change', (e) => {
            currentLang = e.target.value;
            applyTranslations();
            updatePreview();
        });

        function applyTranslations() {
            const t = i18n[currentLang];
            
            // Navbar
            document.querySelector('nav h1').textContent = t.appTitle;
            document.getElementById('btn-style-fr').textContent = t.styleFr;
            document.getElementById('btn-style-us').textContent = t.styleUs;
            const btnDl = document.getElementById('btn-download');
            if(btnDl.querySelector('span')) btnDl.querySelector('span').textContent = t.exportPdf;
            else btnDl.lastChild.textContent = " " + t.exportPdf;
            
            // Form Headers
            const sections = document.querySelectorAll('.w-1\\/3 section h2');
            if(sections.length >= 3) {
                sections[0].lastChild.textContent = " " + t.personalInfo;
                sections[1].lastChild.textContent = " " + t.experience;
                sections[2].lastChild.textContent = " " + t.education;
            }
            if(document.getElementById('title-skills-sec')) document.getElementById('title-skills-sec').textContent = t.skillsSec;
            if(document.getElementById('title-lang-sec')) document.getElementById('title-lang-sec').textContent = t.langSec;

            // Form Labels (Perso Info)
            document.getElementById('input-firstname').previousElementSibling.textContent = t.firstName;
            document.getElementById('input-lastname').previousElementSibling.textContent = t.lastName;
            document.getElementById('input-title').previousElementSibling.textContent = t.jobTitle;
            document.getElementById('input-email').previousElementSibling.textContent = t.email;
            document.getElementById('input-phone').previousElementSibling.textContent = t.phone;
            document.getElementById('input-location').previousElementSibling.textContent = t.location;
            if(document.getElementById('input-linkedin')) document.getElementById('input-linkedin').previousElementSibling.textContent = t.linkedin;
            document.getElementById('input-summary').previousElementSibling.textContent = t.summary;

            // Helps & Buttons
            if(document.getElementById('lbl-skills-help')) document.getElementById('lbl-skills-help').textContent = t.skillsHelp;
            if(document.getElementById('lbl-lang-help')) document.getElementById('lbl-lang-help').textContent = t.langHelp;
            document.getElementById('add-exp-btn').textContent = t.addBtn;
            document.getElementById('add-edu-btn').textContent = t.addBtn;

            // Footer info
            const infoFooter = document.querySelector('.border-t.bg-gray-50 p');
            if(infoFooter) infoFooter.textContent = t.infoFooter;

            // Dynamic Elements (Experiences)
            document.querySelectorAll('.exp-item').forEach(item => {
                const labels = item.querySelectorAll('label');
                if(labels.length >= 5) {
                    labels[0].textContent = t.position;
                    labels[1].textContent = t.company;
                    labels[2].textContent = t.dates;
                    labels[3].textContent = t.city;
                    labels[4].textContent = t.descTirets;
                }
                const btnImpr = item.querySelector('.improve-text-btn');
                if(btnImpr && !btnImpr.disabled) {
                    btnImpr.innerHTML = `<i data-lucide="sparkles" class="w-3 h-3"></i> ${t.improveBtn}`;
                }
            });

            // Dynamic Elements (Education)
            document.querySelectorAll('.edu-item').forEach(item => {
                const labels = item.querySelectorAll('label');
                if(labels.length >= 3) {
                    labels[0].textContent = t.degree;
                    labels[1].textContent = t.school;
                    labels[2].textContent = t.dates;
                }
            });

            // CV Titles
            const cvExpTitleEl = document.querySelector('#cv-experiences-list').previousElementSibling;
            if(cvExpTitleEl) cvExpTitleEl.textContent = t.cvExpTitle;
            
            const cvEduTitleEl = document.querySelector('#cv-education-list').previousElementSibling;
            if(cvEduTitleEl) cvEduTitleEl.textContent = t.cvEduTitle;
            
            if(document.getElementById('cv-title-skills')) document.getElementById('cv-title-skills').textContent = t.cvSkillsTitle;
            if(document.getElementById('cv-title-lang')) document.getElementById('cv-title-lang').textContent = t.cvLangTitle;

            lucide.createIcons();
        }

        // --- MISE A JOUR DE LA PREVISUALISATION ---
        function updatePreview() {
            // 1. Infos perso
            const fname = document.getElementById('input-firstname').value;
            const lname = document.getElementById('input-lastname').value;
            const title = document.getElementById('input-title').value;
            const email = document.getElementById('input-email').value;
            const phone = document.getElementById('input-phone').value;
            const loc = document.getElementById('input-location').value;
            const linkedin = document.getElementById('input-linkedin') ? document.getElementById('input-linkedin').value : '';
            const summary = document.getElementById('input-summary').value;
            const t = i18n[currentLang];

            // Header HTML selon le style
            const headerEl = document.getElementById('cv-header');
            if (currentStyle === 'fr') {
                let contactHTML = `
                    <p><i data-lucide="mail" class="inline w-3 h-3 mr-1"></i> ${email}</p>
                    <p><i data-lucide="phone" class="inline w-3 h-3 mr-1"></i> ${phone}</p>
                    <p><i data-lucide="map-pin" class="inline w-3 h-3 mr-1"></i> ${loc}</p>
                `;
                if (linkedin) contactHTML += `<p><i data-lucide="linkedin" class="inline w-3 h-3 mr-1"></i> ${linkedin}</p>`;

                headerEl.innerHTML = `
                    <div class="photo-container bg-gray-200">
                        <img src="https://placehold.co/150x150/e2e8f0/475569?text=${encodeURIComponent(t.photoAlt)}" alt="${t.photoAlt}" onerror="this.src='https://placehold.co/150x150/e2e8f0/475569?text=${encodeURIComponent(t.photoAlt)}'">
                    </div>
                    <div>
                        <h1 class="text-3xl font-bold text-gray-900 tracking-tight uppercase">${fname} <span class="text-yellow-500">${lname}</span></h1>
                        <h2 class="text-xl text-gray-600 mt-1 mb-3">${title}</h2>
                        <div class="text-sm text-gray-500 space-y-1">
                            ${contactHTML}
                        </div>
                    </div>
                `;
            } else {
                // Style US : très propre, typographie forte, séparateurs discrets
                let contactHTML = `
                    <span>${loc}</span>
                    <span class="mx-2 text-gray-400">|</span> 
                    <span>${phone}</span>
                    <span class="mx-2 text-gray-400">|</span> 
                    <span class="text-gray-800">${email}</span>
                `;
                if (linkedin) contactHTML += `<span class="mx-2 text-gray-400">|</span> <span class="text-gray-800">${linkedin}</span>`;

                headerEl.innerHTML = `
                    <h1>${fname} ${lname}</h1>
                    <div class="text-lg text-gray-800 font-semibold mb-2">${title}</div>
                    <div class="header-contact">
                        ${contactHTML}
                    </div>
                `;
            }

            // Résumé
            const summaryEl = document.getElementById('cv-summary-section');
            if (summary.trim() !== "") {
                summaryEl.style.display = "block";
                document.getElementById('cv-summary-text').innerText = summary;
                document.getElementById('cv-summary-text').className = currentStyle === 'fr' ? "text-sm leading-relaxed" : "text-[0.95rem] leading-relaxed text-gray-800";
            } else {
                summaryEl.style.display = "none";
            }

            // 2. Expériences
            const expListEl = document.getElementById('cv-experiences-list');
            expListEl.innerHTML = '';
            const expItems = document.querySelectorAll('.exp-item');
            
            expItems.forEach(item => {
                const eTitle = item.querySelector('.exp-title').value;
                const eComp = item.querySelector('.exp-company').value;
                const eDates = item.querySelector('.exp-dates').value;
                const eLoc = item.querySelector('.exp-loc').value;
                const eDesc = item.querySelector('.exp-desc').value;

                if(eTitle || eComp) {
                    const listItems = eDesc.split('\n')
                        .filter(line => line.trim() !== '')
                        .map(line => `<li>${line.replace(/^- /, '')}</li>`)
                        .join('');

                    if (currentStyle === 'fr') {
                        const html = `
                            <div class="cv-item">
                                <div class="cv-item-header">
                                    <span class="text-base">${eTitle}</span>
                                    <span class="text-sm font-normal text-gray-600">${eDates}</span>
                                </div>
                                <div class="cv-item-subtitle text-sm">
                                    ${eComp} ${eLoc ? `| ${eLoc}` : ''}
                                </div>
                                <ul class="cv-list text-sm text-gray-700">
                                    ${listItems}
                                </ul>
                            </div>
                        `;
                        expListEl.innerHTML += html;
                    } else {
                        // US Layout : Titre à gauche, Dates à droite. Sous-titre Entreprise en italique.
                        const html = `
                            <div class="mb-4">
                                <div class="flex justify-between items-baseline">
                                    <span class="font-bold text-gray-900 text-[1.05rem]">${eTitle}</span>
                                    <span class="text-[0.9rem] font-semibold text-gray-800 whitespace-nowrap">${eDates}</span>
                                </div>
                                <div class="text-[0.95rem] italic text-gray-800 mb-1">
                                    ${eComp}${eLoc ? `, ${eLoc}` : ''}
                                </div>
                                <ul class="list-disc pl-5 text-[0.9rem] text-gray-800 space-y-1 marker:text-gray-400">
                                    ${listItems}
                                </ul>
                            </div>
                        `;
                        expListEl.innerHTML += html;
                    }
                }
            });

            // 3. Formations
            const eduListEl = document.getElementById('cv-education-list');
            eduListEl.innerHTML = '';
            const eduItems = document.querySelectorAll('.edu-item');
            
            eduItems.forEach(item => {
                const eDeg = item.querySelector('.edu-degree').value;
                const eSchool = item.querySelector('.edu-school').value;
                const eDates = item.querySelector('.edu-dates').value;

                if(eDeg || eSchool) {
                    if (currentStyle === 'fr') {
                        const html = `
                            <div class="cv-item mb-3">
                                <div class="cv-item-header text-sm">
                                    <span>${eDeg}</span>
                                </div>
                                <div class="text-sm text-gray-700">${eSchool}</div>
                                <div class="text-xs text-gray-500 italic">${eDates}</div>
                            </div>
                        `;
                        eduListEl.innerHTML += html;
                    } else {
                        const html = `
                            <div class="mb-3">
                                <div class="flex justify-between items-baseline">
                                    <span class="font-bold text-gray-900 text-[1rem]">${eSchool}</span>
                                    <span class="text-[0.9rem] font-semibold text-gray-800 whitespace-nowrap">${eDates}</span>
                                </div>
                                <div class="text-[0.95rem] italic text-gray-800">${eDeg}</div>
                            </div>
                        `;
                        eduListEl.innerHTML += html;
                    }
                }
            });

            // 4. Compétences
            const skillsStr = document.getElementById('input-skills').value;
            const skillsListEl = document.getElementById('cv-skills-list');
            skillsListEl.innerHTML = '';
            
            // Adaptation de la grille de compétences selon le style
            if (currentStyle === 'fr') {
                skillsListEl.className = "flex flex-wrap gap-2 text-sm";
            } else {
                skillsListEl.className = "text-[0.95rem] text-gray-800 leading-relaxed";
            }

            if(skillsStr.trim() !== "") {
                const skills = skillsStr.split(',').map(s => s.trim()).filter(s => s !== "");
                if (currentStyle === 'fr') {
                    skills.forEach(skill => {
                        skillsListEl.innerHTML += `<li class="bg-gray-100 text-gray-800 px-2 py-1 rounded border border-gray-200">${skill}</li>`;
                    });
                } else {
                    skillsListEl.innerHTML = `<li>${skills.join(' <span class="mx-2 text-gray-400">•</span> ')}</li>`;
                }
            }

            // 5. Langues
            const langInput = document.getElementById('input-languages');
            const langListEl = document.getElementById('cv-languages-list');
            if(langListEl && langInput) {
                langListEl.innerHTML = '';
                
                if (currentStyle === 'fr') {
                    langListEl.className = "space-y-1 text-sm text-gray-700";
                } else {
                    langListEl.className = "text-[0.95rem] text-gray-800 leading-relaxed";
                }

                const langStr = langInput.value;
                if(langStr.trim() !== "") {
                    const langs = langStr.split(',').map(s => s.trim()).filter(s => s !== "");
                    if (currentStyle === 'fr') {
                        langs.forEach(lang => {
                            langListEl.innerHTML += `<li>${lang}</li>`;
                        });
                    } else {
                        langListEl.innerHTML = `<li>${langs.join(' <span class="mx-2 text-gray-400">•</span> ')}</li>`;
                    }
                }
            }

            // Ré-initialiser les icônes injectées
            lucide.createIcons();
        }

        // --- ECOUTEURS D'EVENEMENTS POUR LE FORMULAIRE ---
        // Ajouter un écouteur sur tous les inputs pour mettre à jour la vue en direct
        function attachInputListeners() {
            const inputs = document.querySelectorAll('input, textarea');
            inputs.forEach(input => {
                input.removeEventListener('input', updatePreview); // Éviter les doublons
                input.addEventListener('input', updatePreview);
            });

            // Boutons de suppression
            document.querySelectorAll('.remove-exp-btn').forEach(btn => {
                btn.onclick = function() { this.closest('.exp-item').remove(); updatePreview(); };
            });
            document.querySelectorAll('.remove-edu-btn').forEach(btn => {
                btn.onclick = function() { this.closest('.edu-item').remove(); updatePreview(); };
            });

            // Boutons d'amélioration de texte
            document.querySelectorAll('.improve-text-btn').forEach(btn => {
                btn.onclick = function() {
                    const textarea = this.closest('div').nextElementSibling;
                    improveText(textarea, this);
                };
            });
        }

        // --- AMELIORATION IA (GEMINI API) ---
        async function improveText(textareaElement, buttonElement) {
            const originalText = textareaElement.value;
            if (originalText.trim() === "") return;

            // Sauvegarder le contenu original du bouton
            const originalBtnContent = buttonElement.innerHTML;
            
            // Afficher le loader
            buttonElement.innerHTML = `<span class="loader"></span> Patientez...`;
            buttonElement.disabled = true;

            try {
                const apiKey = ""; // Laissée vide pour injection automatique
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;
                
                const prompt = currentLang === 'fr' 
                    ? `Agis comme un rédacteur de CV expert. Améliore ces puces de description de poste pour qu'elles soient professionnelles, orientées résultats et percutantes. Renvoie UNIQUEMENT les puces améliorées, en commençant chacune par un tiret (-). Ne fais pas de phrase d'introduction ni de mise en forme complexe.\n\nTexte original:\n${originalText}`
                    : `Act as an expert resume writer. Improve these job description bullet points to make them professional, action-oriented, and impactful. Return ONLY the improved bullet points, starting each with a hyphen (-). Do not include any introductory text or complex markdown.\n\nOriginal text:\n${originalText}`;

                const payload = {
                    contents: [{ parts: [{ text: prompt }] }],
                };

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                
                if (result.candidates && result.candidates.length > 0 && result.candidates[0].content) {
                    const improvedText = result.candidates[0].content.parts[0].text;
                    textareaElement.value = improvedText.trim();
                    updatePreview();
                    
                    buttonElement.innerHTML = `<i data-lucide="check" class="w-3 h-3 text-green-600"></i> Amélioré`;
                } else {
                    throw new Error("Réponse de l'API invalide");
                }
            } catch (error) {
                console.error("Erreur IA :", error);
                showMessage("Erreur", currentLang === 'fr' ? "L'amélioration de texte a échoué. Veuillez réessayer." : "Text improvement failed. Please try again.");
                buttonElement.innerHTML = `<i data-lucide="alert-circle" class="w-3 h-3 text-red-600"></i> Erreur`;
            } finally {
                lucide.createIcons();
                setTimeout(() => {
                    buttonElement.innerHTML = originalBtnContent;
                    buttonElement.disabled = false;
                    lucide.createIcons();
                }, 3000);
            }
        }

        // --- AJOUT DE SECTIONS DYNAMIQUES ---
        document.getElementById('add-exp-btn').addEventListener('click', () => {
            const container = document.getElementById('experiences-container');
            const newExp = document.createElement('div');
            const t = i18n[currentLang];
            newExp.className = 'exp-item border border-gray-200 p-4 rounded-lg bg-gray-50 relative group';
            newExp.innerHTML = `
                <button class="remove-exp-btn absolute top-2 right-2 text-gray-400 hover:text-red-500 hidden group-hover:block"><i data-lucide="x" class="w-4 h-4"></i></button>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div><label class="text-xs text-gray-500">${t.position}</label><input type="text" class="exp-title w-full p-1 border rounded text-sm focus:ring-2 focus:ring-yellow-400 outline-none" placeholder=""></div>
                    <div><label class="text-xs text-gray-500">${t.company}</label><input type="text" class="exp-company w-full p-1 border rounded text-sm focus:ring-2 focus:ring-yellow-400 outline-none" placeholder=""></div>
                    <div><label class="text-xs text-gray-500">${t.dates}</label><input type="text" class="exp-dates w-full p-1 border rounded text-sm focus:ring-2 focus:ring-yellow-400 outline-none" placeholder=""></div>
                    <div><label class="text-xs text-gray-500">${t.city}</label><input type="text" class="exp-loc w-full p-1 border rounded text-sm focus:ring-2 focus:ring-yellow-400 outline-none" placeholder=""></div>
                </div>
                <div>
                    <div class="flex justify-between items-end mb-1">
                        <label class="text-xs text-gray-500">${t.descTirets}</label>
                        <button class="improve-text-btn text-xs bg-black text-yellow-400 px-2 py-1 rounded hover:bg-gray-800 transition-colors flex items-center gap-1 font-medium">
                            <i data-lucide="sparkles" class="w-3 h-3"></i> ${t.improveBtn}
                        </button>
                    </div>
                    <textarea class="exp-desc w-full p-2 border rounded text-sm focus:ring-2 focus:ring-yellow-400 outline-none" rows="3" placeholder="- Mission 1\n- Mission 2"></textarea>
                </div>
            `;
            container.appendChild(newExp);
            lucide.createIcons();
            attachInputListeners();
        });

        document.getElementById('add-edu-btn').addEventListener('click', () => {
            const container = document.getElementById('education-container');
            const newEdu = document.createElement('div');
            const t = i18n[currentLang];
            newEdu.className = 'edu-item border border-gray-200 p-4 rounded-lg bg-gray-50 relative group';
            newEdu.innerHTML = `
                <button class="remove-edu-btn absolute top-2 right-2 text-gray-400 hover:text-red-500 hidden group-hover:block"><i data-lucide="x" class="w-4 h-4"></i></button>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div class="col-span-2"><label class="text-xs text-gray-500">${t.degree}</label><input type="text" class="edu-degree w-full p-1 border rounded text-sm focus:ring-2 focus:ring-yellow-400 outline-none" placeholder=""></div>
                    <div><label class="text-xs text-gray-500">${t.school}</label><input type="text" class="edu-school w-full p-1 border rounded text-sm focus:ring-2 focus:ring-yellow-400 outline-none" placeholder=""></div>
                    <div><label class="text-xs text-gray-500">${t.dates}</label><input type="text" class="edu-dates w-full p-1 border rounded text-sm focus:ring-2 focus:ring-yellow-400 outline-none" placeholder=""></div>
                </div>
            `;
            container.appendChild(newEdu);
            lucide.createIcons();
            attachInputListeners();
        });

        // --- EXPORT PDF ---
        document.getElementById('btn-download').addEventListener('click', () => {
            const element = document.getElementById('cv-document');
            const name = document.getElementById('input-lastname').value.toUpperCase() || 'CV';
            const firstName = document.getElementById('input-firstname').value || '';
            const filename = `CV_${firstName}_${name}.pdf`;

            // Options pour html2pdf
            const opt = {
                margin:       [0, 0, 0, 0], // Marges nulles car on gère le padding dans .cv-container
                filename:     filename,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true }, // scale 2 pour une meilleure résolution
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // Afficher un message de chargement
            const btn = document.getElementById('btn-download');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<span class="loader" style="width:14px;height:14px;border-width:2px;"></span> Création...`;
            btn.disabled = true;

            // Génération
            html2pdf().set(opt).from(element).save().then(() => {
                // Restaurer le bouton
                btn.innerHTML = originalText;
                btn.disabled = false;
                lucide.createIcons();
            }).catch(err => {
                console.error("Erreur lors de la génération du PDF :", err);
                showMessage("Erreur", "Une erreur est survenue lors de la création du PDF.");
                btn.innerHTML = originalText;
                btn.disabled = false;
                lucide.createIcons();
            });
        });

        // Initialisation au chargement
        window.onload = () => {
            attachInputListeners();
            applyTranslations(); // Appliquer la langue par défaut
            setStyle('fr'); // Style par défaut
        };

    </script>
</body>
</html>
